<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
  --bg-light:#f5f0e6;
  --text-light:#1e2a3a;
  --bg-dark:#2b261c;
  --text-dark:#e6dcc6;
  --glass:rgba(255,255,255,0.15);
  --glass-border:rgba(255,255,255,0.25);
  --accent:#b38b5d;
  --transition:.25s cubic-bezier(.22,1,.36,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Amiri',serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg-light);
  color:var(--text-light);
  transition:background .3s ease,color .3s ease;
}

body[data-theme="dark"]{
  background:var(--bg-dark);
  color:var(--text-dark);
}

body[data-theme="dark"] .mushaf-img{
  filter:brightness(.95) contrast(1.05);
}

/* ================= HEADER ================= */

header{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(20px);
  background:var(--glass);
  border-bottom:1px solid var(--glass-border);
  z-index:10;
  transition:transform .25s ease;
}

body.focus header{
  transform:translateY(-100%);
}

.header-center{
  text-align:center;
  flex:1;
}

#surahName{
  font-weight:bold;
  font-size:16px;
}

#pageMeta{
  font-size:13px;
  opacity:.75;
}

button{
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
  color:inherit;
}

/* ================= MAIN ================= */

main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.page-frame{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  overflow-x:auto;
  overflow-y:hidden;
  direction:rtl;
  transition:transform var(--transition),opacity var(--transition);
}

.page-frame.slide-next{
  transform:translateX(-15%);
  opacity:0;
}

.page-frame.slide-prev{
  transform:translateX(15%);
  opacity:0;
}

/* DEFAULT CROPPED VIEW */

.mushaf-img{
  height:100%;
  width:auto;
  max-width:none;
  min-width:120%;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
}

/* ================= SETTINGS MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:50;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  width:340px;
  max-width:90%;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(25px);
  background:var(--glass);
  border:1px solid var(--glass-border);
}

.modal-item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.2);
  cursor:pointer;
}

.modal-item:last-child{
  border-bottom:none;
}

</style>
</head>
<body data-theme="light">

<header>
<button onclick="prevPage()">⟨</button>

<div class="header-center">
<div id="surahName"></div>
<div id="pageMeta"></div>
</div>

<button onclick="openSettings()">⚙️</button>
</header>

<main id="viewer">
<div class="page-frame" id="frame">
<img id="img" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<!-- SETTINGS -->
<div class="modal" id="settingsModal" onclick="outsideClick(event)">
<div class="modal-content">
<div class="modal-item" onclick="toggleTheme()">تبديل الوضع الليلي</div>
<div class="modal-item" onclick="goToPagePrompt()">الذهاب إلى صفحة</div>
</div>
</div>

<script>

/* ================= DATA ================= */

const totalPages=604;

const SURAH_MAP=[
{number:1,name:'الفاتحة',page:1},
{number:2,name:'البقرة',page:2},
{number:3,name:'آل عمران',page:50},
{number:4,name:'النساء',page:77},
{number:5,name:'المائدة',page:106},
{number:6,name:'الأنعام',page:128},
{number:7,name:'الأعراف',page:151},
{number:8,name:'الأنفال',page:177},
{number:9,name:'التوبة',page:187}
];

const JUZ_MAP=[
{number:1,page:1},{number:2,page:22},{number:3,page:42},
{number:4,page:62},{number:5,page:82},{number:6,page:102},
{number:7,page:122},{number:8,page:142},{number:9,page:162},
{number:10,page:182},{number:11,page:202},{number:12,page:222},
{number:13,page:242},{number:14,page:262},{number:15,page:282},
{number:16,page:302},{number:17,page:322},{number:18,page:342},
{number:19,page:362},{number:20,page:382},{number:21,page:402},
{number:22,page:422},{number:23,page:442},{number:24,page:462},
{number:25,page:482},{number:26,page:502},{number:27,page:522},
{number:28,page:542},{number:29,page:562},{number:30,page:582}
];

/* ================= LOGIC ================= */

let currentPage=1;

const img=document.getElementById("img");
const frame=document.getElementById("frame");

window.onload=()=>{
const saved=localStorage.getItem("lastPage");
if(saved)currentPage=parseInt(saved);
render();
initSwipe();
};

function render(){
img.src=`mushaf/${currentPage}.png`;
localStorage.setItem("lastPage",currentPage);
updateMeta();
}

function updateMeta(){
const surah=[...SURAH_MAP].reverse().find(s=>currentPage>=s.page);
const juz=[...JUZ_MAP].reverse().find(j=>currentPage>=j.page);
document.getElementById("surahName").innerText=surah?`سورة ${surah.name}`:"";
document.getElementById("pageMeta").innerText=juz?`الجزء ${juz.number} | صفحة ${currentPage}`:`صفحة ${currentPage}`;
}

function nextPage(){
if(currentPage>=totalPages)return;
frame.classList.add("slide-next");
setTimeout(()=>{
currentPage++;
render();
frame.classList.remove("slide-next");
},200);
}

function prevPage(){
if(currentPage<=1)return;
frame.classList.add("slide-prev");
setTimeout(()=>{
currentPage--;
render();
frame.classList.remove("slide-prev");
},200);
}

/* ================= SWIPE ================= */

function initSwipe(){
let startX=0;
document.getElementById("viewer").addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});
document.getElementById("viewer").addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].screenX;
if(Math.abs(diff)<50)return;
if(diff>0)prevPage(); else nextPage();
});
}

/* ================= SETTINGS ================= */

function openSettings(){
document.getElementById("settingsModal").classList.add("active");
}

function outsideClick(e){
if(e.target.id==="settingsModal"){
document.getElementById("settingsModal").classList.remove("active");
}
}

function toggleTheme(){
const body=document.body;
body.setAttribute("data-theme",
body.getAttribute("data-theme")==="light"?"dark":"light");
}

function goToPagePrompt(){
let page=prompt("أدخل رقم الصفحة (1 - 604)");
if(page){
page=parseInt(page);
if(page>=1 && page<=604){
currentPage=page;
render();
document.getElementById("settingsModal").classList.remove("active");
}
}
}

</script>

</body>
</html>
