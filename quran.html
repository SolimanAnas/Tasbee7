<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المصحف الشريف - صورة</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0e6">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
  /* ========== SLIM HEADER LAYOUT ========== */
header#appHeader {
  position: absolute; top: 0; left: 0; right: 0;
  /* Removed top 4px padding, kept safe area, minimized bottom to 1px */
  padding: env(safe-area-inset-top) 4px 1px;
  display: flex; justify-content: space-between; align-items: center;
  background: var(--glass-bg, rgba(248, 243, 232, 0.85)); 
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border, rgba(179, 139, 93, 0.22)); 
  z-index: 20;
  /* Forced height to be very short */
  height: 40px; 
}

[data-theme="dark"] header#appHeader { 
  background: rgba(30, 41, 59, 0.85); 
  border-bottom: 1px solid rgba(255, 255, 255, 0.15); 
}

.header-right, .header-left { display: flex; gap: 0px; align-items: center; flex-shrink: 0; }

.header-center { 
  flex: 1 1 auto; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; min-width: 0; padding: 0 2px; 
}

#surahName { 
  font-size: 0.9rem; /* Reduced from 1.05rem */
  font-weight: 700; 
  color: var(--accent, #10b981); 
  margin-bottom: -2px; /* Pulls meta-row closer */
  line-height: 1; 
}

.meta-row { 
  display: flex; justify-content: center; align-items: center; 
  gap: 3px; width: 100%; 
  font-size: 0.65rem; /* Reduced from 0.75rem */
  color: var(--text-secondary); opacity: 0.8; 
}

.nav-item { 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  max-width: 100%; cursor: pointer; padding: 1px 4px; border-radius: 4px; 
}

.icon-btn { 
  background: none; border: none; color: inherit; cursor: pointer; 
  width: 30px; /* Reduced from 36px */
  height: 30px; /* Reduced from 36px */
  border-radius: 50%; display: flex; align-items: center; justify-content: center; 
  font-size: 0.9rem; transition: background 0.2s; flex-shrink: 0; 
}

/* Added specific size for SVG icons inside the buttons */
.icon-btn svg {
  width: 18px;
  height: 18px;
}


    /* Settings UI */
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--glass-border); }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 1.05rem; font-weight: bold; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .offline-btn { width: 100%; padding: 14px; margin-top: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-family: 'Tajawal', sans-serif; cursor: pointer; font-size: 1rem; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .offline-btn:active { transform: scale(0.96); opacity: 0.9; }

    /* ========== FLOATING EXACT SEARCH OVERLAY ========== */
    .search-overlay { position: fixed; top: calc(70px + env(safe-area-inset-top)); left: 10px; right: 10px; margin: 0 auto; max-width: 500px; width: auto; background: var(--glass-bg, rgba(248, 243, 232, 0.95)); backdrop-filter: blur(30px); border: 1px solid var(--glass-border, rgba(179, 139, 93, 0.3)); border-radius: 20px; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; transform: translateY(-20px) scale(0.95); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 65vh; }
    [data-theme="dark"] .search-overlay { background: rgba(30, 41, 59, 0.95); border-color: rgba(255, 255, 255, 0.15); }
    .search-overlay.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
    .search-bar-row { display: flex; gap: 8px; align-items: center; width: 100%; box-sizing: border-box; }
    .search-bar-row input { flex: 1 1 auto; min-width: 0; height: 45px; padding: 0 15px; border-radius: 25px; border: 1px solid var(--glass-border, rgba(179, 139, 93, 0.3)); background: rgba(128, 128, 128, 0.1); color: inherit; font-family: inherit; font-size: 1rem; outline: none; }
    .search-bar-row input:focus { border-color: var(--accent, #10b981); background: rgba(128, 128, 128, 0.15); }
    .close-search-btn { flex: 0 0 45px; width: 45px; height: 45px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
    .search-results-container { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .search-results-container::-webkit-scrollbar { display: none; }
    .search-result-item { background: rgba(128, 128, 128, 0.05); padding: 14px; border-radius: 16px; cursor: pointer; border: 1px solid var(--glass-border, rgba(179, 139, 93, 0.3)); transition: 0.2s; }
    .search-result-item:active { background: rgba(128, 128, 128, 0.1); transform: scale(0.98); }
    .res-meta { font-size: 0.85rem; color: var(--accent, #10b981); margin-bottom: 8px; font-weight: bold; }
    .res-text { font-family: 'Amiri', serif; font-size: 1.3rem; line-height: 1.8; color: var(--text-primary); }
    .search-highlight { background-color: rgba(255, 213, 79, 0.6); color: #000; border-radius: 4px; padding: 0 4px; }

    /* ========== NATIVE TOAST ========== */
    .custom-toast { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(100px); background: var(--glass-bg, rgba(248, 243, 232, 0.95)); backdrop-filter: blur(15px); color: var(--text-primary); border: 1px solid var(--glass-border, rgba(179, 139, 93, 0.3)); padding: 12px 24px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; font-weight: bold; text-align: center; opacity: 0; transition: all 0.4s; pointer-events: none; }
    [data-theme="dark"] .custom-toast { background: rgba(30, 41, 59, 0.95); border-color: rgba(255, 255, 255, 0.15); }
    .custom-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ========== VERSION SELECTOR MODAL ========== */
    .version-modal-content {
      max-width: 320px;
      width: 90%;
    }
    .version-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
      margin: 8px 0;
      border-radius: 16px;
      background: rgba(128,128,128,0.05);
      border: 1px solid var(--glass-border, rgba(179,139,93,0.3));
      cursor: pointer;
      transition: 0.2s;
    }
    .version-item:active {
      transform: scale(0.98);
      background: rgba(128,128,128,0.1);
    }
    .version-thumb {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 12px;
      background: #ddd;
    }
    .version-info {
      flex: 1;
    }
    .version-name {
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .version-desc {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    
    /* ========== DYNAMIC ZOOM FOR MUSHRAF VERSIONS ========== */
    /* General settings for all pages */
    .mushaf-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transform-origin: center;
      transition: transform 0.3s ease;
      display: block;
    }

    /* Specific zoom for: بدون إطار (mushaf) */
    .mushaf-img[data-ver="mushaf"] {
      transform: scale(1.14, 1.1);
    }

    /* Specific zoom for: إطار بني (mushaf-2) */
    .mushaf-img[data-ver="mushaf-2"] {
      transform: scale(1.2, 1.25);
    }
  </style>
</head>

  <script src="js/quran-common.js"></script>

  <script>
    // ========== VERSION MANAGEMENT ==========
    const versions = [
      { id: 'mushaf', name: 'مصحف المدينة', path: 'mushaf/', thumb: 'mushaf/thumbnail.png', desc: ' بدون إطار' },
      { id: 'mushaf-2', name: 'مصحف المدينة 2', path: 'mushaf-2/', thumb: 'mushaf-2/thumbnail.png', desc: ' إطار بني' }
    ];

    let currentVersion = localStorage.getItem('quranVersion') || 'mushaf';
    let currentVersionPath = getVersionPath(currentVersion);

    function getVersionPath(versionId) {
      const ver = versions.find(v => v.id === versionId);
      return ver ? ver.path : 'mushaf/';
    }

    function setVersion(versionId) {
      currentVersion = versionId;
      currentVersionPath = getVersionPath(versionId);
      localStorage.setItem('quranVersion', versionId);
      // Reload current page image
      if (typeof updateContent === 'function') updateContent();
      // Also reload adjacent preload
      if (typeof preloadAdjacentPages === 'function') preloadAdjacentPages();
      showCustomToast(`تم التبديل إلى ${versions.find(v => v.id === versionId).name}`);
    }

    function openVersionSelectorModal() {
      const modal = document.getElementById('versionSelectorModal');
      if (!modal) return;
      const container = document.getElementById('versionList');
      if (!container) return;
      
      container.innerHTML = '';
      versions.forEach(ver => {
        const item = document.createElement('div');
        item.className = 'version-item';
        item.onclick = () => {
          setVersion(ver.id);
          closeModal('versionSelectorModal');
        };
        
        const thumb = document.createElement('img');
        thumb.className = 'version-thumb';
        thumb.src = ver.thumb;
        thumb.onerror = () => { thumb.src = 'mushaf/placeholder.png'; };
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'version-info';
        infoDiv.innerHTML = `<div class="version-name">${ver.name}</div><div class="version-desc">${ver.desc}</div>`;
        
        item.appendChild(thumb);
        item.appendChild(infoDiv);
        container.appendChild(item);
      });
      modal.classList.add('active');
    }

    // ========== IMAGE LOADING WITH PADDED & UNPADDED FALLBACK ==========
    function formatPageNumber(pageNum) {
      return String(pageNum).padStart(3, '0');
    }

    function loadPageImage(imgElement, pageNum) {
      if (!imgElement) return;
      const padded = formatPageNumber(pageNum);
      const unpadded = pageNum.toString();
      const basePath = currentVersionPath;
      
      let attempt = 0;
      const urls = [
        `${basePath}${padded}.png`,
        `${basePath}${unpadded}.png`
      ];
      
      function tryNext() {
        if (attempt >= urls.length) {
          imgElement.src = `${basePath}placeholder.png`;
          console.warn(`Failed to load page ${pageNum} from any format`);
          return;
        }
        const url = urls[attempt];
        imgElement.src = url;
        imgElement.onload = () => {
          console.log(`Loaded: ${url}`);
        };
        imgElement.onerror = () => {
          attempt++;
          tryNext();
        };
      }
      tryNext();
    }

    // Core update function (UPDATED: adds data-ver attribute)
    function updateContent() {
      const img = document.getElementById('pageImg');
      if (img && currentPage) {
        loadPageImage(img, currentPage);
        // Set the data-ver attribute to apply version-specific zoom
        img.setAttribute('data-ver', currentVersion);
      }
      if (typeof updateMeta === 'function') updateMeta();
      if (typeof updateBookmarkStar === 'function') updateBookmarkStar();
      if (typeof updateToggleLink === 'function') updateToggleLink();
      localStorage.setItem('lastPage', currentPage);
    }

    // Expose globally
    window.updateContent = updateContent;

    function updateToggleLink() {
      const toggleBtn = document.getElementById('viewToggleBtn');
      if (toggleBtn) toggleBtn.href = `quran-text.html?page=${currentPage}`;
    }

    // Override preloadAdjacentPages to try both formats
    const originalPreload = window.preloadAdjacentPages;
    window.preloadAdjacentPages = function() {
      if (!currentPage) return;
      const pages = [currentPage - 1, currentPage + 1];
      pages.forEach(p => {
        if (p >= 1 && p <= totalPages) {
          const padded = formatPageNumber(p);
          const unpadded = p.toString();
          const base = currentVersionPath;
          const img1 = new Image();
          img1.src = `${base}${padded}.png`;
          const img2 = new Image();
          img2.src = `${base}${unpadded}.png`;
        }
      });
    };

    // Override cacheAllPages to cache both formats
    window.cacheAllPages = async function() {
      const versionName = versions.find(v => v.id === currentVersion).name;
      showCustomToast(`🔄 بدء تحميل جميع صفحات ${versionName}...`);
      try {
        const cache = await caches.open(`quran-pages-${currentVersion}`);
        let successCount = 0;
        for (let i = 1; i <= 604; i++) {
          const padded = formatPageNumber(i);
          const unpadded = i.toString();
          const base = currentVersionPath;
          const urls = [`${base}${padded}.png`, `${base}${unpadded}.png`];
          let pageCached = false;
          for (let url of urls) {
            try {
              const response = await fetch(url);
              if (response.ok) {
                await cache.put(url, response);
                successCount++;
                pageCached = true;
                break;
              }
            } catch (err) {
              // continue to next format
            }
          }
          if (successCount % 50 === 0 && successCount > 0) showCustomToast(`✅ تم تخزين ${successCount} صفحة`);
        }
        showCustomToast(`🎉 اكتمل التحميل! تم تخزين ${successCount} صفحة بنجاح.`);
      } catch (err) {
        showCustomToast("❌ حدث خطأ أثناء التحميل، تأكد من الاتصال بالإنترنت.");
        console.error(err);
      }
    };

    // Ensure goToPage works with new version
    const originalGoToPage = window.goToPage;
    window.goToPage = function(pageNum) {
      if (pageNum >= 1 && pageNum <= totalPages) {
        currentPage = pageNum;
        updateContent();
        if (typeof preloadAdjacentPages === 'function') preloadAdjacentPages();
        updateToggleLink();
      }
    };

    // Adjust navigateTo
    const originalNavigateTo = typeof navigateTo === 'function' ? navigateTo : function(){};
    window.navigateTo = function(newPage, direction) { 
      originalNavigateTo(newPage, direction); 
      setTimeout(updateToggleLink, 300);
    };

    // ========== EXISTING FUNCTIONS ==========
    function showCustomToast(message) {
        const toast = document.getElementById('customToast');
        if(!toast) return;
        toast.innerHTML = message; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function openSettingsModal() {
        const modal = document.getElementById('settingsModal');
        if (modal) modal.classList.add('active');
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) modal.classList.remove('active');
    }

    function handleOverlayClick(event, modalId) {
        if (event.target === event.currentTarget) closeModal(modalId);
    }

    function openBookmarksModal() {
        const modal = document.getElementById('bookmarksModal');
        if (modal) modal.classList.add('active');
        if (typeof loadBookmarks === 'function') loadBookmarks();
    }

    // ========== GLOBAL QURAN SEARCH LOGIC ==========
    let searchOverlayActive = false; let searchTimeout = null;

    function toggleSearchOverlay(action = 'toggle') {
      const overlay = document.getElementById('searchOverlay');
      if (action === 'close') searchOverlayActive = false;
      else if (action === 'jump') searchOverlayActive = false; 
      else searchOverlayActive = !searchOverlayActive;
      overlay.classList.toggle('active', searchOverlayActive);
      if (searchOverlayActive) { document.getElementById('searchInput').focus(); } 
      else if (action === 'close') {
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '<div style="text-align:center; padding:20px; opacity:0.6; font-size:14px;">اكتب كلمة للبحث في جميع السور...</div>';
      }
    }

    function handleGlobalSearch(query) {
      query = query.trim();
      const resultsDiv = document.getElementById('searchResults');
      if (!query) { resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.6; font-size:14px;">اكتب كلمة للبحث (مطابقة تامة)...</div>'; return; }
      resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; font-size:14px; color: var(--accent);">جاري البحث في القرآن الكريم... ⏳</div>';

      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
          fetch(`https://api.alquran.cloud/v1/search/${query}/all/quran-simple-clean`)
          .then(res => res.json())
          .then(data => {
              if (data.code === 200 && data.data.count > 0) {
                  const exactRegex = new RegExp('(^|[^\\p{L}])' + query + '([^\\p{L}]|$)', 'ui');
                  const exactMatches = data.data.matches.filter(m => exactRegex.test(m.text));
                  if (exactMatches.length > 0) {
                      let html = `<div style="text-align:center; margin-bottom: 10px; color: var(--accent); font-weight: bold; font-size: 14px;">تم العثور على ${exactMatches.length} نتيجة</div>`;
                      html += exactMatches.map(m => `
                          <div class="search-result-item" onclick="jumpToSearchResult(${m.number})">
                              <div class="res-meta">سورة ${m.surah.name.replace(/سورة|سُورَةُ|سُورَةِ/g, '').trim()} - آية ${m.numberInSurah}</div>
                              <div class="res-text">${m.text.replace(new RegExp('(^|[^\\p{L}])(' + query + ')([^\\p{L}]|$)', 'gui'), '$1<span class="search-highlight">$2</span>$3')}</div>
                          </div>
                      `).join('');
                      resultsDiv.innerHTML = html;
                  } else resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; font-size:14px;">لا توجد كلمة مطابقة تماماً لـ "'+ query +'"</div>';
              } else resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; font-size:14px;">لا توجد نتائج لـ "'+ query +'"</div>';
          }).catch(err => { resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; font-size:14px; color:#ef4444;">تعذر البحث، تأكد من الاتصال 🌐</div>'; });
      }, 500); 
    }

    function jumpToSearchResult(ayahNumber) {
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<div style="text-align:center; padding:30px; font-size:16px; color: var(--accent); font-weight:bold;">جاري الانتقال للصفحة... ⏳</div>';
        let cachedPage = localStorage.getItem('ayah_page_v1_' + ayahNumber);
        if (cachedPage) { executeJump(parseInt(cachedPage)); } 
        else {
            fetch(`https://api.alquran.cloud/v1/ayah/${ayahNumber}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 200) {
                        const targetPage = data.data.page;
                        localStorage.setItem('ayah_page_v1_' + ayahNumber, targetPage);
                        executeJump(targetPage);
                    }
                }).catch(() => { resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#ef4444;">حدث خطأ.</div>'; });
        }
    }

    function executeJump(targetPage) {
        toggleSearchOverlay('jump'); 
        if (typeof goToPage === 'function') { goToPage(targetPage); } else { currentPage = targetPage; updateContent(); }
        showCustomToast(`تم الانتقال إلى صفحة ${targetPage}`);
    }

    // ========== INITIALIZATION ==========
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const pageParam = urlParams.get('page');
      if (pageParam) { const page = parseInt(pageParam); if (page >= 1 && page <= totalPages) { currentPage = page; } }
      const savedTheme = localStorage.getItem('quranTheme') || 'light'; document.body.setAttribute('data-theme', savedTheme);
      
      if(typeof commonInit === 'function') commonInit();
      
      updateToggleLink(); updateContent();
      if(typeof preloadAdjacentPages === 'function') preloadAdjacentPages();
    };

    function goHome() { window.location.href = 'index.html'; }
  </script>
  <script> if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(console.warn); } </script>
</body>
