<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
  --bg-light:#f5f0e6;
  --text-light:#1e2a3a;
  --bg-dark:#2b261c;          /* soft sepia */
  --text-dark:#e6dcc6;
  --glass:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.18);
  --accent:#b38b5d;
  --transition:0.28s cubic-bezier(.22,1,.36,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Amiri',serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg-light);
  color:var(--text-light);
  transition:background .3s ease,color .3s ease;
}

/* ================= DARK MODE (SEPIA) ================= */

body[data-theme="dark"]{
  background:var(--bg-dark);
  color:var(--text-dark);
}

body[data-theme="dark"] .mushaf-img{
  filter:brightness(.95) contrast(1.05);
}

/* ================= HEADER ================= */

header{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(18px);
  background:var(--glass);
  border-bottom:1px solid var(--glass-border);
  z-index:10;
  transition:transform .25s ease;
}

body.focus header{
  transform:translateY(-100%);
}

.header-center{
  text-align:center;
  flex:1;
}

#surahName{
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

#pageMeta{
  font-size:13px;
  opacity:.7;
  cursor:pointer;
}

button{
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
  color:inherit;
}

/* ================= MAIN ================= */

main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

.page-frame{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform var(--transition),opacity var(--transition);
}

.page-frame.slide-next{
  transform:translateX(-20%);
  opacity:0;
}

.page-frame.slide-prev{
  transform:translateX(20%);
  opacity:0;
}

.mushaf-img{
  height:100%;
  width:auto;
  max-height:100vh;
  object-fit:contain;
  user-select:none;
  -webkit-user-drag:none;
}

/* ================= FIXED ZOOM (NO CROP) ================= */

body.zoom .page-frame{
  overflow-x:auto;
  overflow-y:hidden;
  justify-content:flex-start;
  direction:rtl;
}

body.zoom .mushaf-img{
  height:100%;
  width:auto;
  max-width:none;
  min-width:120%;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
  z-index:50;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-content{
  width:360px;
  max-width:90%;
  max-height:80%;
  overflow-y:auto;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(24px);
  background:var(--glass);
  border:1px solid var(--glass-border);
}

.modal-item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.15);
  cursor:pointer;
}

/* ================= CONTEXT ================= */

.context{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  padding:16px;
  border-radius:20px;
  backdrop-filter:blur(24px);
  background:var(--glass);
  border:1px solid var(--glass-border);
  transform:translateY(120%);
  transition:.3s ease;
  z-index:60;
}

.context.active{
  transform:translateY(0);
}

.context button{
  display:block;
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:40px;
  border:1px solid var(--glass-border);
  background:rgba(255,255,255,.1);
}

</style>
</head>
<body data-theme="light">

<header>
<button onclick="prevPage()">⟨</button>

<div class="header-center">
<div id="surahName"></div>
<div id="pageMeta"></div>
</div>

<button onclick="toggleBookmark()" id="bookmarkBtn">☆</button>
</header>

<main id="viewer">
<div class="page-frame" id="frame">
<img id="img" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<!-- PAGE SELECTOR -->
<div class="modal" id="pageModal">
<div class="modal-content" id="pageList"></div>
</div>

<!-- SETTINGS -->
<div class="modal" id="settingsModal">
<div class="modal-content">
<div class="modal-item" onclick="toggleTheme()">الوضع الليلي</div>
<div class="modal-item" onclick="openPageSelector()">الذهاب لصفحة</div>
<div class="modal-item" onclick="openBookmarks()">المفضلة</div>
</div>
</div>

<!-- CONTEXT MENU -->
<div class="context" id="contextMenu">
<button onclick="toggleBookmark()">إضافة/إزالة من المفضلة</button>
<button onclick="openPageSelector()">الذهاب لصفحة</button>
<button onclick="toggleTheme()">الوضع الليلي</button>
<button onclick="closeContext()">إلغاء</button>

const JUZ_MAP=[
{number:1,page:1},{number:2,page:22},{number:3,page:42},{number:4,page:62},

{number:29,page:562},{number:30,page:582}

/* ================= LOGIC ================= */

let currentPage=1;
let bookmarks=new Set();

const img=document.getElementById("img");
const frame=document.getElementById("frame");

window.onload=()=>{
const saved=localStorage.getItem("lastPage");
if(saved)currentPage=parseInt(saved);
loadBookmarks();
render();
initSwipe();
initTap();
initLongPress();
};

function render(){
img.src=`mushaf/${currentPage}.png`;
localStorage.setItem("lastPage",currentPage);
updateMeta();
updateBookmarkStar();
}

function updateMeta(){
const surah=[...SURAH_MAP].reverse().find(s=>currentPage>=s.page);
const juz=[...JUZ_MAP].reverse().find(j=>currentPage>=j.page);
document.getElementById("surahName").innerText=surah?`سورة ${surah.name}`:"";
document.getElementById("pageMeta").innerText=juz?`الجزء ${juz.number} | صفحة ${currentPage}`:`صفحة ${currentPage}`;
}

function nextPage(){
if(currentPage>=totalPages)return;
frame.classList.add("slide-next");
setTimeout(()=>{
currentPage++;
render();
frame.classList.remove("slide-next");
},200);
}

function prevPage(){
if(currentPage<=1)return;
frame.classList.add("slide-prev");
setTimeout(()=>{
currentPage--;
render();
frame.classList.remove("slide-prev");
},200);
}

/* ================= SWIPE ================= */

function initSwipe(){
let startX=0;
document.getElementById("viewer").addEventListener("touchstart",e=>{
startX=e.changedTouches[0].screenX;
});
document.getElementById("viewer").addEventListener("touchend",e=>{
let diff=startX-e.changedTouches[0].screenX;
if(Math.abs(diff)<50)return;
if(diff>0)prevPage(); else nextPage();
});
}

/* ================= TAP ================= */

function initTap(){
let tapTimer=null;
document.getElementById("viewer").addEventListener("touchend",e=>{
if(tapTimer){
clearTimeout(tapTimer);
tapTimer=null;
document.body.classList.toggle("zoom");
}else{
tapTimer=setTimeout(()=>{
document.body.classList.toggle("focus");
tapTimer=null;
},250);
}
});
}

/* ================= LONG PRESS ================= */

function initLongPress(){
let timer;
document.getElementById("viewer").addEventListener("touchstart",()=>{
timer=setTimeout(()=>openContext(),600);
});
document.getElementById("viewer").addEventListener("touchend",()=>clearTimeout(timer));
}

function openContext(){
document.getElementById("contextMenu").classList.add("active");
}
function closeContext(){
document.getElementById("contextMenu").classList.remove("active");
}

/* ================= BOOKMARKS ================= */

function toggleBookmark(){
if(bookmarks.has(currentPage))bookmarks.delete(currentPage);
else bookmarks.add(currentPage);
saveBookmarks();
updateBookmarkStar();
}

function updateBookmarkStar(){
document.getElementById("bookmarkBtn").innerText=
bookmarks.has(currentPage)?"★":"☆";
}

function saveBookmarks(){
localStorage.setItem("qBookmarks",JSON.stringify([...bookmarks]));
}

function loadBookmarks(){
const saved=localStorage.getItem("qBookmarks");
if(saved)bookmarks=new Set(JSON.parse(saved));
}

/* ================= THEME ================= */

function toggleTheme(){
const body=document.body;
body.setAttribute("data-theme",
body.getAttribute("data-theme")==="light"?"dark":"light");
}

/* ================= PAGE SELECTOR ================= */

function openPageSelector(){
const modal=document.getElementById("pageModal");
const list=document.getElementById("pageList");
list.innerHTML="";
for(let i=1;i<=604;i++){
const div=document.createElement("div");
div.className="modal-item";
div.innerText="صفحة "+i;
div.onclick=()=>{currentPage=i;render();modal.classList.remove("active");};
list.appendChild(div);
}
modal.classList.add("active");
}

function openBookmarks(){
const modal=document.getElementById("pageModal");
const list=document.getElementById("pageList");
list.innerHTML="";
[...bookmarks].sort((a,b)=>a-b).forEach(p=>{
const div=document.createElement("div");
div.className="modal-item";
div.innerText="صفحة "+p;
div.onclick=()=>{currentPage=p;render();modal.classList.remove("active");};
list.appendChild(div);
});
modal.classList.add("active");
}

</script>
