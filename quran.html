<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= THEME ================= */

:root{
    --bg:#f4ecd8;
    --text:#222;
    --glass:rgba(255,255,255,0.08);
    --glass-border:rgba(255,255,255,0.15);
    --accent:#10b981;
}

body.dark{
    --bg:#1c1b16;
    --text:#f5f5f5;
}

/* ================= BASE ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Amiri',serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:background 0.4s ease;
}

/* ================= HEADER ================= */

header{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    padding:12px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    z-index:10;
    transition:0.4s ease;
}

body.focus header{
    transform:translateY(-150%);
}

.header-center{
    text-align:center;
    flex:1;
}

#surahName,
#pageMeta{
    cursor:pointer;
}

#surahName{
    font-size:16px;
    font-weight:bold;
}

#pageMeta{
    font-size:13px;
    opacity:.8;
}

button{
    background:none;
    border:none;
    font-size:18px;
    cursor:pointer;
    color:var(--text);
}

/* ================= MAIN ================= */

main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* ================= PAGE ================= */

.page-frame{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .35s cubic-bezier(0.22,1,0.36,1), opacity .35s ease;
}

.mushaf-img{
    max-height:100vh;
    width:auto;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
    transition:filter 0.3s ease;
}

body.dark .mushaf-img{
    filter:brightness(.93) contrast(1.04);
}

/* ================= TRANSITION ================= */

.slide-next{
    transform:translateX(-15%);
    opacity:.5;
}

.slide-prev{
    transform:translateX(15%);
    opacity:.5;
}

/* ================= ZOOM ================= */

body.zoom .mushaf-img{
    width:110%;
    max-width:none;
}

/* ================= GLASS POPUP ================= */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s ease;
}

.popup.active{
    opacity:1;
    pointer-events:auto;
}

.popup-content{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:25px;
    color:#fff;
}

.popup-content h3{
    margin-bottom:15px;
}

.popup-content button{
    display:block;
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:#fff;
}

/* ================= BOOKMARK ACTIVE ================= */

.bookmarked{
    color:var(--accent);
}

</style>
</head>

<body>

<header>
<button onclick="prevPage()">⟨</button>

<div class="header-center">
<div id="surahName" onclick="openSurahSelector()">سورة الفاتحة</div>
<div id="pageMeta" onclick="openPageSelector()">صفحة ١</div>
</div>

<button id="bookmarkBtn" onclick="toggleBookmark()">🔖</button>
<button onclick="openSettings()">⚙️</button>
<button onclick="nextPage()">⟩</button>
</header>

<main id="reader">
<div class="page-frame" id="pageFrame">
<img id="pageImg" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<!-- SETTINGS POPUP -->
<div class="popup" id="settingsPopup">
<div class="popup-content">
<h3>الإعدادات</h3>
<button onclick="toggleTheme()">تبديل الوضع الليلي</button>
<button onclick="openBookmarks()">العلامات المرجعية</button>
<button onclick="downloadAllPages()">تحميل جميع الصفحات</button>
<button onclick="closePopup()">إغلاق</button>
</div>
</div>

<!-- GENERIC SELECTOR POPUP -->
<div class="popup" id="selectorPopup">
<div class="popup-content" id="selectorContent"></div>
</div>

<script src="js/surah-map.js"></script>
<script src="js/juz-map.js"></script>
<script src="js/quran-app.js"></script>

</body>
</html>
