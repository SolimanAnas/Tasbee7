<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المصحف الشريف</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0e6">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ================= ROOT ================= */
    :root {
      --bg-light: #f5f0e6;
      --text-light: #1e2a3a;
      --bg-dark: #1c1b16;
      --text-dark: #d9cdb3;
      --accent: #b38b5d;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Amiri', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body[data-theme="light"] {
      background: var(--bg-light);
      color: var(--text-light);
    }

    body[data-theme="dark"] {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    /* Dark mode image filter to reduce white halo */
    body[data-theme="dark"] .mushaf-img {
      filter: brightness(0.95) contrast(1.05);
    }

    /* ================= HEADER (GLASS) ================= */
    header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 20;
      transition: transform 0.25s ease;
      color: inherit;
    }

    body.focus-mode header {
      transform: translateY(-100%);
    }

    .header-center {
      text-align: center;
      flex: 1;
    }

    #surahName {
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    #pageMeta {
      font-size: 13px;
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #surahName:hover, #pageMeta:hover {
      opacity: 1;
    }

    button {
      background: none;
      border: none;
      color: inherit;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.1);
    }

    .bookmark-btn {
      font-size: 20px;
    }

    .bookmark-star.active {
      color: #f5b342;
      text-shadow: 0 0 8px #f5b342;
    }

    /* ================= MAIN ================= */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .page-frame {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .page-frame.next-exit {
      transform: translateX(-30%);
      opacity: 0;
    }

    .page-frame.prev-exit {
      transform: translateX(30%);
      opacity: 0;
    }

    .mushaf-img {
      height: 100%;
      width: auto;
      max-height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transition: filter 0.3s;
    }

    /* ================= ZOOM MODE ================= */
    body.zoomed .page-frame {
      overflow-x: auto;
      justify-content: flex-start;
    }

    body.zoomed .mushaf-img {
      height: 100%;
      width: auto;
      max-width: none;
      transform: scaleX(1.2);  /* stretch horizontally */
      transform-origin: right center;
    }

    /* ================= GLASS MODALS ================= */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      max-width: 90%;
      max-height: 80%;
      overflow-y: auto;
      box-shadow: var(--shadow);
      color: inherit;
      transform: scale(0.95);
      transition: transform 0.25s ease;
      width: 360px;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: inherit;
      padding: 0;
    }

    .modal-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-item:hover {
      background: rgba(255,255,255,0.05);
    }

    /* ================= CONTEXT MENU ================= */
    .context-menu {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 16px;
      z-index: 200;
      box-shadow: var(--shadow);
      transform: translateY(120%);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      color: inherit;
    }

    .context-menu.active {
      transform: translateY(0);
    }

    .context-info {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1rem;
      opacity: 0.9;
    }

    .context-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .context-buttons button {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: 12px;
      font-size: 1rem;
      color: inherit;
      width: 100%;
      transition: background 0.2s;
    }

    .context-buttons button:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ================= PAGE SELECTOR ================= */
    .page-selector {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .page-input-group {
      display: flex;
      gap: 8px;
    }

    .page-input-group input {
      flex: 1;
      padding: 12px;
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2);
      color: inherit;
      font-size: 1rem;
      text-align: center;
    }

    .page-input-group button {
      padding: 12px 20px;
      border-radius: 40px;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 1rem;
    }

    .current-info {
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.8;
      margin: 8px 0;
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      max-height: 250px;
      overflow-y: auto;
      padding: 4px;
    }

    .page-grid div {
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .page-grid div:hover {
      background: rgba(255,255,255,0.15);
    }

    /* ================= BOOKMARKS LIST ================= */
    .bookmarks-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .bookmark-item {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s;
    }

    .bookmark-item:hover {
      background: rgba(255,255,255,0.05);
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 480px) {
      header {
        padding: 8px 12px;
      }
      .modal-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body data-theme="light">

      <div class="modal-item" onclick="openBookmarksModal()">المفضلة</div>
    </div>
  </div>

  <!-- Page Selector Modal -->
  <div class="modal-overlay" id="pageSelectorModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>الذهاب إلى صفحة</span>

        </div>

    </div>
  </div>

  <!-- Bookmarks Modal -->

      <div class="modal-header">
        <span>المفضلة</span>
        <button class="close-btn" onclick="closeModal('bookmarksModal')">✕</button>

      <div class="bookmarks-list" id="bookmarksList"></div>
    </div>
  </div>

  <!-- Context Menu (long press) -->

    <div class="context-info" id="contextInfo"></div>
    <div class="context-buttons">
      <button onclick="contextToggleBookmark()" id="contextBookmarkBtn">☆ أضف للمفضلة</button>
      <button onclick="openPageSelector()">الذهاب لصفحة</button>
      <button onclick="openSurahSelector()">الذهاب لسورة</button>
      <button onclick="openJuzSelector()">الذهاب لجزء</button>
      <button onclick="openSettingsModal()">الإعدادات</button>
      <button onclick="closeContextMenu()">إلغاء</button>

  </div>

    const JUZ_MAP = [
      { number: 1, page: 1 },

      { number: 25, page: 482 },
      { number: 26, page: 502 },
      { number: 27, page: 522 },
      { number: 28, page: 542 },
      { number: 29, page: 562 },
      { number: 30, page: 582 }
    ];

    // ==================== GLOBAL STATE ====================
    let currentPage = 1;
    const totalPages = 604;
    let bookmarks = new Set();
    let touchStartX = 0;
    let tapTimeout = null;
    let longPressTimer = null;
    let isLongPress = false;

    const img = document.getElementById('pageImg');
    const frame = document.getElementById('pageFrame');
    const surahName = document.getElementById('surahName');
    const pageMeta = document.getElementById('pageMeta');
    const swipeArea = document.getElementById('swipeArea');
    const bookmarkBtn = document.getElementById('bookmarkBtn');

    // ==================== INIT ====================
    window.onload = function() {
      loadBookmarks();
      const saved = localStorage.getItem('lastPage');
      if (saved) currentPage = parseInt(saved);
      renderPage();
      initSwipe();
      initTapHandlers();
      initLongPress();
      disableImageContextMenu();
    };

    function disableImageContextMenu() {
      img.addEventListener('contextmenu', e => e.preventDefault());
    }

    // ==================== RENDER PAGE ====================
    function renderPage() {
      img.src = `mushaf/${currentPage}.png`;
      localStorage.setItem('lastPage', currentPage);
      updateSurahAndJuz();
      updateBookmarkStar();
    }

    function updateSurahAndJuz() {
      const surah = [...SURAH_MAP].reverse().find(s => currentPage >= s.page);
      const juz = [...JUZ_MAP].reverse().find(j => currentPage >= j.page);
      surahName.innerText = surah ? 'سورة ' + surah.name : '';
      pageMeta.innerText = juz ? `الجزء ${juz.number} | صفحة ${currentPage}` : `صفحة ${currentPage}`;
    }

    // ==================== PAGE NAVIGATION ====================
    function nextPage() {
      if (currentPage >= totalPages) return;
      frame.classList.add('next-exit');
      setTimeout(() => {
        currentPage++;
        renderPage();
        frame.classList.remove('next-exit');
      }, 250);
    }

    function prevPage() {
      if (currentPage <= 1) return;
      frame.classList.add('prev-exit');
      setTimeout(() => {
        currentPage--;
        renderPage();
        frame.classList.remove('prev-exit');
      }, 250);
    }

    function goToPage(pageNum) {
      if (pageNum < 1 || pageNum > totalPages) return;
      currentPage = pageNum;
      renderPage();
      closeModal('pageSelectorModal');
    }

    // ==================== SWIPE GESTURE ====================
    function initSwipe() {
      swipeArea.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
      });

      swipeArea.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) < 50) return;
        if (diff > 0) {
          prevPage(); // RTL: left swipe → previous
        } else {
          nextPage();
        }
      });
    }

    // ==================== TAP HANDLERS ====================
    function initTapHandlers() {
      swipeArea.addEventListener('touchend', e => {
        if (tapTimeout) {
          // double tap
          clearTimeout(tapTimeout);
          tapTimeout = null;
          document.body.classList.toggle('zoomed');
          e.preventDefault();
        } else {
          tapTimeout = setTimeout(() => {
            // single tap
            document.body.classList.toggle('focus-mode');
            tapTimeout = null;
          }, 250);
        }
      });
    }

    // ==================== LONG PRESS ====================
    function initLongPress() {
      swipeArea.addEventListener('touchstart', () => {
        isLongPress = false;
        longPressTimer = setTimeout(() => {
          isLongPress = true;
          openContextMenu();
        }, 600);
      });

      swipeArea.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
      });

      swipeArea.addEventListener('touchcancel', () => {
        clearTimeout(longPressTimer);
      });
    }

    function openContextMenu() {
      const surah = [...SURAH_MAP].reverse().find(s => currentPage >= s.page);
      const juz = [...JUZ_MAP].reverse().find(j => currentPage >= j.page);
      const info = `صفحة ${currentPage} | ${surah ? 'سورة ' + surah.name : ''} | ${juz ? 'جزء ' + juz.number : ''}`;
      document.getElementById('contextInfo').innerText = info;
      const bookmarkText = bookmarks.has(currentPage) ? '★ إزالة من المفضلة' : '☆ أضف للمفضلة';
      document.getElementById('contextBookmarkBtn').innerText = bookmarkText;
      document.getElementById('contextMenu').classList.add('active');
    }

    function closeContextMenu() {
      document.getElementById('contextMenu').classList.remove('active');
    }

    function contextToggleBookmark() {
      toggleBookmark();
      closeContextMenu();
    }

    // ==================== BOOKMARKS ====================
    function loadBookmarks() {
      const saved = localStorage.getItem('quranBookmarks');
      if (saved) {
        bookmarks = new Set(JSON.parse(saved));
      }
    }

    function saveBookmarks() {
      localStorage.setItem('quranBookmarks', JSON.stringify([...bookmarks]));
    }

    function toggleBookmark() {
      if (bookmarks.has(currentPage)) {
        bookmarks.delete(currentPage);
      } else {
        bookmarks.add(currentPage);
      }
      saveBookmarks();
      updateBookmarkStar();
    }

    function updateBookmarkStar() {
      if (bookmarks.has(currentPage)) {
        bookmarkBtn.innerText = '★';
        bookmarkBtn.classList.add('active');
      } else {
        bookmarkBtn.innerText = '☆';
        bookmarkBtn.classList.remove('active');
      }
    }

    function openBookmarksModal() {
      const list = document.getElementById('bookmarksList');
      list.innerHTML = '';
      if (bookmarks.size === 0) {
        list.innerHTML = '<div class="bookmark-item">لا توجد صفحات مفضلة</div>';
      } else {
        const sorted = [...bookmarks].sort((a,b) => a - b);
        sorted.forEach(page => {
          const div = document.createElement('div');
          div.className = 'bookmark-item';
          div.innerText = `صفحة ${page}`;
          div.onclick = () => {
            currentPage = page;
            renderPage();
            closeModal('bookmarksModal');
          };
          list.appendChild(div);
        });
      }
      openModal('bookmarksModal');
    }

    // ==================== MODALS ====================
    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function openSettingsModal() {
      closeContextMenu();
      openModal('settingsModal');
    }

    function openPageSelector() {
      const surah = [...SURAH_MAP].reverse().find(s => currentPage >= s.page);
      const juz = [...JUZ_MAP].reverse().find(j => currentPage >= j.page);
      const info = `الصفحة ${currentPage} | ${surah ? 'سورة ' + surah.name : ''} | ${juz ? 'جزء ' + juz.number : ''}`;
      document.getElementById('currentPageInfo').innerText = info;

      const grid = document.getElementById('pageGrid');
      grid.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const div = document.createElement('div');
        div.innerText = i;
        div.onclick = () => goToPage(i);
        grid.appendChild(div);
      }
      openModal('pageSelectorModal');
    }

    function goToPageInput() {
      const input = document.getElementById('gotoPageInput');
      const page = parseInt(input.value);
      if (page && page >= 1 && page <= totalPages) {
        goToPage(page);
      } else {
        alert('رقم صفحة غير صحيح');
      }
    }

    function openSurahSelector() {
      closeContextMenu();
      alert('سيتم فتح قائمة السور قريبًا'); // Placeholder – you can implement later
    }

    function openJuzSelector() {
      closeContextMenu();
      alert('سيتم فتح قائمة الأجزاء قريبًا'); // Placeholder
    }

    // ==================== SETTINGS ====================
    function toggleTheme() {
      const body = document.body;
      if (body.getAttribute('data-theme') === 'light') {
        body.setAttribute('data-theme', 'dark');
      } else {
        body.setAttribute('data-theme', 'light');
      }
    }

    async function cacheAllPages() {
      if (!('caches' in window)) {
        alert('المتصفح لا يدعم التخزين المؤقت');
        return;
      }
      const cache = await caches.open('quran-pages-v1');
      let loaded = 0;
      alert('جاري تخزين الصفحات... قد تستغرق بضع دقائق');
      for (let i = 1; i <= totalPages; i++) {
        const url = `mushaf/${i}.png`;
        try {
          await cache.add(url);
          loaded++;
        } catch (err) {
          console.warn(`فشل تخزين الصفحة ${i}:`, err);
        }
      }
      alert(`تم تخزين ${loaded} من ${totalPages} صفحة بنجاح`);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
