<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
    --bg:#000;
    --text:#fff;
    --accent:#10b981;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Amiri',serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ================= HEADER ================= */

header{
    position:absolute;
    top:0;
    left:0;
    right:0;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px);
    z-index:10;
    transition:0.3s;
}

body.focus-mode header{
    transform:translateY(-100%);
}

.header-center{
    text-align:center;
    flex:1;
}

#surahName{
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#pageMeta{
    font-size:13px;
    opacity:.8;
    cursor:pointer;
}

button{
    background:none;
    border:none;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

/* ================= MAIN ================= */

main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:1200px;
    overflow:hidden;
}

/* ================= PAGE FRAME ================= */

.page-frame{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.25s ease, opacity 0.25s ease;
}

.mushaf-img{
    height:100%;
    max-height:100vh;
    width:auto;
    object-fit:contain;
    user-select:none;
    -webkit-user-drag:none;
}

/* ================= SIMPLE PERSPECTIVE SWIPE ================= */

.swipe-next{
    transform:translateX(-30%) rotateY(-10deg);
    opacity:0;
}

.swipe-prev{
    transform:translateX(30%) rotateY(10deg);
    opacity:0;
}

/* ================= ZOOM MODE ================= */

.zoomed .mushaf-img{
    height:115%;
    transform:translateY(-5%);
}

/* ================= PANELS ================= */

.panel{
    position:fixed;
    bottom:-100%;
    left:0;
    right:0;
    height:60%;
    background:#111;
    color:#fff;
    padding:20px;
    overflow:auto;
    transition:0.4s;
    z-index:20;
}

.panel.open{
    bottom:0;
}

.panel h3{
    margin-bottom:15px;
}

.panel div{
    padding:8px 0;
    border-bottom:1px solid #333;
    cursor:pointer;
}

/* ================= SETTINGS PANEL ================= */

#settingsPanel button{
    display:block;
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#222;
    color:#fff;
    border-radius:8px;
}

</style>
</head>

<body>

<header>
<button onclick="prevPage()">⟨</button>

<div class="header-center">
<div id="surahName" onclick="openSurahSelector()">سورة الفاتحة</div>
<div id="pageMeta" onclick="openJuzSelector()">الجزء ١ | صفحة ١</div>
</div>

<button onclick="nextPage()">⟩</button>
<button onclick="openSettings()">⚙️</button>
</header>

<main id="swipeArea">
<div class="page-frame" id="pageFrame">
<img id="pageImg" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<div class="panel" id="selectorPanel"></div>

<div class="panel" id="settingsPanel">
<h3>الإعدادات</h3>
<button onclick="toggleTheme()">تبديل الوضع الليلي</button>
<button onclick="downloadAllPages()">تحميل جميع الصفحات</button>
</div>

<script src="js/surah-map.js"></script>
<script src="js/juz-map.js"></script>
<script src="js/quran-app.js"></script>

<script>
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
