<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
    --bg:#f4ecd8;
    --text:#222;
    --accent:#10b981;
    --dim:rgba(0,0,0,0);
    --transition:0.35s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"]{
    --bg:#121212;
    --text:#f5f5f5;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Amiri',serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* ================= HEADER ================= */
header{
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(0,0,0,0.08);
    background:var(--bg);
    z-index:10;
}

.header-center{
    text-align:center;
    flex:1;
}

#surahName{
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

#pageMeta{
    font-size:14px;
    opacity:.8;
    cursor:pointer;
}

#progressBar{
    height:4px;
    width:0%;
    background:var(--accent);
    transition:0.3s;
}

button{
    background:none;
    border:none;
    font-size:20px;
    cursor:pointer;
}

/* ================= MAIN ================= */
main{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:2000px;
    overflow:hidden;
}

.page-frame{
    width:100%;
    max-width:600px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    transform-style:preserve-3d;
    transition:var(--transition);
}

.mushaf-img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    border-radius:6px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    user-select:none;
    -webkit-user-drag:none;
}

/* ================= CURL ANIMATION ================= */
.page-frame::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    width:50px;
    height:100%;
    background:linear-gradient(to left, rgba(0,0,0,.25), transparent);
    transform-origin:right center;
    transition:0.3s;
}

.curl-next{
    transform:rotateY(-15deg);
}
.curl-next::after{
    transform:rotateY(-35deg);
}

.curl-prev{
    transform:rotateY(15deg);
}
.curl-prev::after{
    transform:rotateY(35deg);
}

/* ================= DIM OVERLAY ================= */
.dim-layer{
    position:absolute;
    inset:0;
    background:var(--dim);
    pointer-events:none;
    transition:.4s;
}

/* ================= BOOKMARK ================= */
.bookmark-indicator{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--accent);
    color:#fff;
    padding:4px 10px;
    border-radius:12px;
    font-size:12px;
    display:none;
}
.bookmark-indicator.visible{
    display:block;
}

/* ================= SELECTOR PANEL ================= */
.selector-panel{
    position:fixed;
    bottom:-100%;
    left:0;
    right:0;
    height:60%;
    background:#111;
    color:#fff;
    overflow:auto;
    padding:20px;
    transition:.4s;
    z-index:999;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
}

.selector-panel.open{
    bottom:0;
}

.selector-panel h3{
    margin-bottom:15px;
}

/* ================= TAFSIR PANEL ================= */
.tafsir-panel{
    position:fixed;
    bottom:-100%;
    left:0;
    right:0;
    height:60%;
    background:#1a1a1a;
    color:#fff;
    padding:20px;
    overflow:auto;
    transition:.4s;
    z-index:999;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
}

.tafsir-panel.open{
    bottom:0;
}

/* ================= ZOOM MODE ================= */
.zoomed .page-frame{
    max-width:95% !important;
}

</style>
</head>

<body data-theme="light">

<header>
<button onclick="goHome()">🏠</button>

<div class="header-center">
<div id="surahName" onclick="openSurahSelector()">سورة الفاتحة</div>
<div id="pageMeta" onclick="openJuzSelector()">الجزء ١ | صفحة ١</div>
<div id="progressBar"></div>
</div>

<button onclick="toggleDim()">🌙</button>
<button onclick="toggleBookmark()">🔖</button>
<button onclick="toggleTafsir()">📘</button>
</header>

<main id="swipeArea">
<div class="bookmark-indicator" id="bookmarkLabel">🔖 محفوظة</div>
<div class="dim-layer" id="dimLayer"></div>
<div class="page-frame" id="pageFrame">
<img id="pageImg" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<div class="selector-panel" id="selectorPanel"></div>
<div class="tafsir-panel" id="tafsirPanel"></div>

<script src="js/surah-map.js"></script>
<script src="js/juz-map.js"></script>
<script src="js/quran-app.js"></script>

<script>
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
