<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المصحف الشريف</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0e6">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ================= ROOT ================= */
    :root {
      --bg-light: #f5f0e6;
      --text-light: #1e2a3a;
      --bg-dark: #1e1a16;  /* deep sepia */
      --text-dark: #e0d6c0;
      --accent: #b38b5d;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Amiri', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body[data-theme="light"] {
      background: var(--bg-light);
      color: var(--text-light);
    }

    body[data-theme="dark"] {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    /* ================= HEADER (GLASS) ================= */
    header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 20;
      transition: transform 0.3s ease;
    }

    body.focus-mode header {
      transform: translateY(-100%);
    }

    .header-center {
      text-align: center;
      flex: 1;
    }

    #surahName {
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #pageMeta {
      font-size: 13px;
      opacity: 0.8;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #surahName:hover, #pageMeta:hover {
      opacity: 1;
    }

    button {
      background: none;
      border: none;
      color: inherit;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.1);
    }

    .bookmark-btn {
      font-size: 20px;
    }

    /* ================= MAIN ================= */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      overflow: hidden;
      position: relative;
    }

    .page-frame {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .mushaf-img {
      height: 100%;
      width: auto;
      max-height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    /* ================= SWIPE ANIMATIONS ================= */
    .swipe-next {
      transform: translateX(-30%) rotateY(-10deg);
      opacity: 0;
    }

    .swipe-prev {
      transform: translateX(30%) rotateY(10deg);
      opacity: 0;
    }

    /* ================= ZOOM MODE ================= */
    body.zoomed .mushaf-img {
      transform: scale(1.2);
      cursor: zoom-out;
    }

    body.zoomed main {
      overflow: auto;
    }

    /* ================= GLASS MODALS ================= */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      max-width: 90%;
      max-height: 80%;
      overflow-y: auto;
      box-shadow: var(--shadow);
      color: inherit;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: inherit;
    }

    .modal-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-item:hover {
      background: rgba(255,255,255,0.05);
    }

    /* ================= CONTEXT MENU (GLASS) ================= */
    .context-menu {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 16px;
      z-index: 200;
      box-shadow: var(--shadow);
      transform: translateY(120%);
      transition: transform 0.3s ease;
      color: inherit;
    }

    .context-menu.active {
      transform: translateY(0);
    }

    .context-menu .info {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1rem;
      opacity: 0.9;
    }

    .context-menu .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .context-menu button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 12px;
      font-size: 1rem;
      color: inherit;
      width: 100%;
    }

    .context-menu button:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ================= BOOKMARKS ================= */
    .bookmark-star {
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .bookmark-star.active {
      color: gold;
      text-shadow: 0 0 10px gold;
    }

    .bookmark-star:hover {
      transform: scale(1.1);
    }

    /* ================= PAGE SELECTOR ================= */
    .page-selector {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .page-selector input {
      padding: 12px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.2);
      color: inherit;
      font-size: 1rem;
      text-align: center;
    }

    .page-selector .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .page-selector .grid div {
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
    }

    .page-selector .grid div:hover {
      background: rgba(255,255,255,0.2);
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 480px) {
      header {
        padding: 8px 12px;
      }
      .modal-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body data-theme="light">
  <header>
    <button onclick="prevPage()">⟨</button>
    <div class="header-center">
      <div id="surahName" onclick="openSurahSelector()">سورة الفاتحة</div>
      <div id="pageMeta" onclick="openPageSelector()">الجزء ١ | صفحة ١</div>
    </div>
    <button onclick="nextPage()">⟩</button>
    <button class="bookmark-btn" onclick="toggleBookmark()" id="bookmarkBtn">☆</button>
  </header>

  <main id="swipeArea">
    <div class="page-frame" id="pageFrame">
      <img id="pageImg" class="mushaf-img" src="mushaf/1.png" alt="صفحة القرآن" onerror="this.src='mushaf/placeholder.png'">
    </div>
  </main>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>الإعدادات</span>
        <button class="close-btn" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="modal-item" onclick="toggleTheme()">تبديل الوضع الليلي</div>
      <div class="modal-item" onclick="cacheAllPages()">تحميل جميع الصفحات</div>
      <div class="modal-item" onclick="openBookmarksModal()">عرض المفضلة</div>
    </div>
  </div>

  <!-- Page Selector Modal -->
  <div class="modal-overlay" id="pageSelectorModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>اختر صفحة</span>
        <button class="close-btn" onclick="closeModal('pageSelectorModal')">✕</button>
      </div>
      <div class="page-selector">
        <input type="number" id="gotoPageInput" min="1" max="604" placeholder="أدخل رقم الصفحة">
        <button onclick="goToPage()">انتقال</button>
        <div class="grid" id="pageGrid"></div>
      </div>
    </div>
  </div>

  <!-- Bookmarks Modal -->
  <div class="modal-overlay" id="bookmarksModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>المفضلة</span>
        <button class="close-btn" onclick="closeModal('bookmarksModal')">✕</button>
      </div>
      <div id="bookmarksList"></div>
    </div>
  </div>

  <!-- Context Menu (long press) -->
  <div class="context-menu" id="contextMenu">
    <div class="info" id="contextInfo"></div>
    <div class="buttons">
      <button onclick="toggleBookmark()" id="contextBookmark">☆ أضف للمفضلة</button>
      <button onclick="openPageSelector()">الذهاب لصفحة</button>
      <button onclick="openSurahSelector()">الذهاب لسورة</button>
      <button onclick="openJuzSelector()">الذهاب لجزء</button>
      <button onclick="openSettingsModal()">الإعدادات</button>
      <button onclick="closeContextMenu()">إلغاء</button>
    </div>
  </div>

  <script src="js/surah-map.js"></script>
  <script src="js/juz-map.js"></script>
  <script src="js/quran-app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
