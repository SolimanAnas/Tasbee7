<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>المصحف الشريف</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f0e6">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ================= ROOT & THEME ================= */
    :root {
      --bg-light:          #f5f0e6;
      --text-light:        #1e2a3a;
      
      /* وضع القراءة المريح (Parchment/Sepia) */
      --bg-dark:           #e5d5b5; 
      --text-dark:         #2a1f14; 
      
      --accent:            #b38b5d;
      --radius-modal:      20px;
      --shadow:            0 12px 48px rgba(0, 0, 0, 0.28);
      --cb:                cubic-bezier(0.22, 1, 0.36, 1);
      --transition-speed:  0.28s;
    }

    body[data-theme="light"] {
      --glass-bg:     rgba(248, 243, 232, 0.82);
      --glass-border: rgba(179, 139, 93, 0.22);
    }
    body[data-theme="dark"] {
      --glass-bg:     rgba(229, 213, 181, 0.85);
      --glass-border: rgba(179, 139, 93, 0.25);
    }

    /* ================= RESET ================= */
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Amiri', serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.35s ease, color 0.35s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    body[data-theme="light"] { background: var(--bg-light); color: var(--text-light); }
    body[data-theme="dark"]  { background: var(--bg-dark);  color: var(--text-dark);  }

    /* ================= HEADER & NAVIGATORS ================= */
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 20;
      transition: transform var(--transition-speed) var(--cb),
                  opacity var(--transition-speed) var(--cb);
    }

    body.focus-mode header {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    .header-center {
      text-align: center;
      flex: 1;
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav-item {
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .nav-item:active {
      background: rgba(128,128,128,0.15);
    }

    #surahName {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .meta-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      opacity: 0.85;
    }

    .divider {
      opacity: 0.4;
      font-size: 12px;
      pointer-events: none;
    }

    .icon-btn {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      min-height: 38px;
    }

    .icon-btn:active { background: rgba(128,128,128,0.15); }

    #bookmarkBtn.active { color: #f5b342; text-shadow: 0 0 10px rgba(245,179,66,0.6); }

    /* ================= MAIN / READER ================= */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding-top: 56px;
    }

    .page-frame {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 25px; 
      will-change: transform, opacity;
    }

    .mushaf-img {
      max-height: 96%; 
      max-width: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      -webkit-user-drag: none;
      pointer-events: none;
      transform: scale(1.16) translateY(-2%);
      transform-origin: center center;
      transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1),
                  filter 0.35s ease;
    }

    body.full-view .mushaf-img {
      transform: scale(1) translateY(0); 
    }

    body[data-theme="dark"] .mushaf-img {
      mix-blend-mode: multiply;
      filter: brightness(0.95) sepia(0.3) contrast(1.05);
    }

    /* ================= GLASSMORPHISM MODAL BASE ================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--glass-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-modal);
      padding: 22px 20px;
      width: min(360px, 94vw);
      max-height: 85dvh;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: var(--shadow);
      color: inherit;
      transform: scale(0.93) translateY(8px);
      transition: transform 0.22s var(--cb);
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: inherit;
      opacity: 0.6;
      padding: 2px 6px;
      border-radius: 50%;
      transition: opacity 0.2s, background 0.2s;
      line-height: 1;
    }

    .close-btn:hover { opacity: 1; background: rgba(128,128,128,0.12); }

    /* ================= SETTINGS MODAL ================= */
    .modal-item {
      padding: 13px 6px;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.18s;
      font-size: 1rem;
    }

    .modal-item:last-child { border-bottom: none; }
    .modal-item:active     { background: rgba(128,128,128,0.1); }

    /* ================= ROLLER PAGE SELECTOR ================= */
    .picker-container {
      position: relative;
      height: 150px;
      margin: 10px 0 20px;
      mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    }

    .picker-scroll {
      height: 100%;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }
    .picker-scroll::-webkit-scrollbar { display: none; }

    .picker-item {
      height: 50px;
      line-height: 50px;
      text-align: center;
      scroll-snap-align: center;
      font-size: 1.4rem;
      opacity: 0.3;
      transition: all 0.15s ease;
      font-family: inherit;
      cursor: pointer;
    }

    .picker-item.active {
      opacity: 1;
      font-size: 1.9rem;
      color: var(--accent);
      font-weight: 700;
    }

    .picker-highlight {
      position: absolute;
      top: 50px; 
      left: 10%; right: 10%;
      height: 50px;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      pointer-events: none;
      background: rgba(128,128,128,0.06);
      border-radius: 10px;
    }

    .manual-input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .manual-input-group input {
      flex: 1;
      min-width: 0; 
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(128,128,128,0.08);
      color: inherit;
      font-size: 1.1rem;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .manual-input-group input:focus { border-color: var(--accent); }

    .btn-go {
      padding: 12px 26px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-go:active { opacity: 0.8; }

    /* ================= SELECTOR LIST (Surah & Juz) ================= */
    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid var(--glass-border);
      background: rgba(128,128,128,0.08);
      color: inherit;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }

    .selector-scroll {
      max-height: 55dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .selector-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 6px;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
      font-size: 0.97rem;
    }

    .selector-item:last-child { border-bottom: none; }
    .selector-item:active     { background: rgba(128,128,128,0.1); }

    .selector-item .num-badge {
      min-width: 28px;
      height: 28px;
      background: rgba(179,139,93,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    .selector-item .name { flex: 1; }

    .selector-item .page-tag {
      font-size: 0.75rem;
      opacity: 0.55;
      background: rgba(128,128,128,0.1);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .empty-state {
      text-align: center;
      opacity: 0.5;
      padding: 20px;
      font-size: 0.95rem;
    }

    /* ================= BOOKMARKS LIST ================= */
    .bookmark-item {
      padding: 12px 6px;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .bookmark-item:last-child { border-bottom: none; }
    .bookmark-item:active     { background: rgba(128,128,128,0.1); }

    .bookmark-item .bm-page    { font-weight: 700; font-size: 0.95rem; }
    .bookmark-item .bm-surah   { font-size: 0.82rem; opacity: 0.65; margin-top: 2px; }

    /* ================= CONTEXT MENU ================= */
    .context-menu {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--glass-border);
      border-radius: 24px 24px 0 0;
      padding: 20px 18px 30px;
      z-index: 200;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.25);
      transform: translateY(110%);
      transition: transform 0.32s var(--cb);
    }

    .context-menu.active { transform: translateY(0); }

    .context-handle {
      width: 40px;
      height: 4px;
      background: rgba(128,128,128,0.3);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .context-info {
      text-align: center;
      margin-bottom: 18px;
      font-size: 0.95rem;
      opacity: 0.85;
      background: rgba(128,128,128,0.07);
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .context-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .context-btn {
      background: rgba(128,128,128,0.1);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 13px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: inherit;
      cursor: pointer;
      width: 100%;
      transition: background 0.18s;
      text-align: center;
    }

    .context-btn:active { background: rgba(128,128,128,0.2); }

    .context-btn.danger { color: #e57373; border-color: rgba(229,115,115,0.2); }
    .context-btn.primary { background: rgba(179,139,93,0.15); border-color: rgba(179,139,93,0.3); color: var(--accent); }

    @media (max-width: 380px) {
      .context-buttons { grid-template-columns: 1fr; }
      .modal-content   { padding: 16px 14px; }
    }
  </style>
</head>

<body data-theme="light">

  <header id="appHeader">
    <button class="icon-btn" onclick="goHome()" title="الرئيسية">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>

    <div class="header-center">
      <div id="surahName" class="nav-item surah-nav" onclick="openSurahSelector()">سورة الفاتحة</div>
      <div class="meta-row">
        <span id="juzName" class="nav-item juz-nav" onclick="openJuzSelector()">الجزء ١</span>
        <span class="divider">|</span>
        <span id="pageName" class="nav-item page-nav" onclick="openPageSelector()">صفحة ١</span>
      </div>
    </div>

    <button class="icon-btn" id="bookmarkBtn" onclick="toggleBookmark()" title="إضافة علامة">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
    </button>
  </header>

  <main id="swipeArea">
    <div class="page-frame" id="pageFrame">
      <img
        id="pageImg"
        class="mushaf-img"
        src="mushaf/1.png"
        alt="صفحة القرآن"
        draggable="false"
        onerror="this.src='mushaf/placeholder.png'"
      >
    </div>
  </main>

  <div class="modal-overlay" id="settingsModal" onclick="handleOverlayClick(event,'settingsModal')">
    <div class="modal-content">
      <div class="modal-header">
        <span>الإعدادات</span>
        <button class="close-btn" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="modal-item" onclick="toggleTheme()">👓 وضع القراءة المريح</div>
      <div class="modal-item" onclick="openBookmarksModal()">🔖 المفضلة</div>
      <div class="modal-item" onclick="cacheAllPages()">⬇ تحميل جميع الصفحات</div>
    </div>
  </div>

  <div class="modal-overlay" id="pageSelectorModal" onclick="handleOverlayClick(event,'pageSelectorModal')">
    <div class="modal-content">
      <div class="modal-header">
        <span>الذهاب إلى صفحة</span>
        <button class="close-btn" onclick="closeModal('pageSelectorModal')">✕</button>
      </div>
      
      <div class="picker-container">
        <div class="picker-highlight"></div>
        <div class="picker-scroll" id="pagePickerScroll" onscroll="updatePickerInput()">
          </div>
      </div>

      <div class="manual-input-group">
        <input
          type="number"
          id="gotoPageInput"
          min="1" max="604"
          placeholder="رقم الصفحة"
          oninput="syncPickerWithInput()"
          onkeydown="if(event.key==='Enter') confirmPageSelection()"
        >
        <button class="btn-go" onclick="confirmPageSelection()">انتقال</button>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="bookmarksModal" onclick="handleOverlayClick(event,'bookmarksModal')">
    <div class="modal-content">
      <div class="modal-header">
        <span>المفضلة</span>
        <button class="close-btn" onclick="closeModal('bookmarksModal')">✕</button>
      </div>
      <div class="selector-scroll" id="bookmarksList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="surahSelectorModal" onclick="handleOverlayClick(event,'surahSelectorModal')">
    <div class="modal-content">
      <div class="modal-header">
        <span>اختر سورة</span>
        <button class="close-btn" onclick="closeModal('surahSelectorModal')">✕</button>
      </div>
      <input
        class="search-input"
        id="surahSearch"
        type="search"
        placeholder="ابحث عن سورة..."
        oninput="filterSurahs(this.value)"
        autocomplete="off"
      >
      <div class="selector-scroll" id="surahList"></div>
    </div>
  </div>

  <div class="modal-overlay" id="juzSelectorModal" onclick="handleOverlayClick(event,'juzSelectorModal')">
    <div class="modal-content">
      <div class="modal-header">
        <span>اختر جزءًا</span>
        <button class="close-btn" onclick="closeModal('juzSelectorModal')">✕</button>
      </div>
      <div class="selector-scroll" id="juzList"></div>
    </div>
  </div>

  <div class="context-menu" id="contextMenu">
    <div class="context-handle"></div>
    <div class="context-info" id="contextInfo"></div>
    <div class="context-buttons">
      <button class="context-btn primary" id="contextBookmarkBtn" onclick="contextToggleBookmark()">☆ إضافة للمفضلة</button>
      <button class="context-btn" onclick="closeContextMenu(); openPageSelector();">↗ الذهاب لصفحة</button>
      <button class="context-btn" onclick="closeContextMenu(); openSurahSelector();">📖 الذهاب لسورة</button>
      <button class="context-btn" onclick="closeContextMenu(); openJuzSelector();">🗂 الذهاب لجزء</button>
      <button class="context-btn" onclick="closeContextMenu(); openSettingsModal();">⚙ الإعدادات</button>
      <button class="context-btn danger" onclick="closeContextMenu()">✕ إلغاء</button>
    </div>
  </div>

  <div id="contextOverlay"
    style="display:none;position:fixed;inset:0;z-index:199;"
    onclick="closeContextMenu()"
  ></div>

    // ============================================================

    // ============================================================
    let currentPage      = 1;

    let bookmarks        = new Set();

    // Cached DOM refs

    // ============================================================

    // ============================================================
    window.onload = function () {
      const savedTheme = localStorage.getItem('quranTheme') || 'light';
      document.body.setAttribute('data-theme', savedTheme);

      const savedPage = parseInt(localStorage.getItem('lastPage'));
      if (savedPage && savedPage >= 1 && savedPage <= totalPages) {
        currentPage = savedPage;
      }

      loadBookmarks();
      initPageRoller();

      fullView = localStorage.getItem('quranFullView') === 'true';
      if (fullView) document.body.classList.add('full-view');

      renderPageContent();
      initGestures();
      disableNativeLongPress();
      preloadAdjacentPages();
    };

    function goHome() {
      // توجيه لصفحة الاندكس الخاصة بتطبيقاتك
      window.location.href = 'index.html';
    }

    // ============================================================
    //  RENDER PAGE CONTENT
    // ============================================================
    function renderPageContent() {
      img.src = `mushaf/${currentPage}.png`;
      localStorage.setItem('lastPage', currentPage);
      updateMeta();
      updateBookmarkStar();
    }

    function updateMeta() {
      const surah = getCurrentSurah();
      const juz   = getCurrentJuz();
      surahName.textContent = surah ? 'سورة ' + surah.name : '';
      juzName.textContent   = juz ? `الجزء ${juz.number}` : '';
      pageName.textContent  = `صفحة ${currentPage}`;
    }

    // ============================================================
    //  PAGE TRANSITION
    // ============================================================
    function navigateTo(newPage, direction) {
      if (isTransitioning) return;
      if (newPage < 1 || newPage > totalPages) return;
      if (newPage === currentPage) return;

      isTransitioning = true;

      const CB   = 'cubic-bezier(0.22, 1, 0.36, 1)';
      const DUR  = '0.28s';
      const TRANS = `transform ${DUR} ${CB}, opacity ${DUR} ${CB}`;

      const exitX  = direction === 'next' ? '30%'  : '-30%';
      const enterX = direction === 'next' ? '-30%' : '30%';

      frame.style.transition = TRANS;
      frame.style.transform  = `translateX(${exitX})`;
      frame.style.opacity    = '0';

      setTimeout(() => {
        currentPage = newPage;
        renderPageContent();

        frame.style.transition = 'none';
        frame.style.transform  = `translateX(${enterX})`;
        frame.style.opacity    = '0';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            frame.style.transition = TRANS;
            frame.style.transform  = 'translateX(0)';
            frame.style.opacity    = '1';

            setTimeout(() => {
              frame.style.cssText  = '';
              isTransitioning = false;
              preloadAdjacentPages();
            }, 300);
          });
        });
      }, 260);
    }

    function nextPage() { navigateTo(currentPage + 1, 'next'); }
    function prevPage() { navigateTo(currentPage - 1, 'prev'); }

    function goToPage(pageNum) {
      if (pageNum < 1 || pageNum > totalPages) return;
      const dir = pageNum > currentPage ? 'next' : 'prev';
      navigateTo(pageNum, dir);
    }

    function preloadAdjacentPages() {
      if (currentPage > 1)          new Image().src = `mushaf/${currentPage - 1}.png`;
      if (currentPage < totalPages) new Image().src = `mushaf/${currentPage + 1}.png`;
    }

    // ============================================================
    //  UNIFIED GESTURE HANDLER
    // ============================================================
    function initGestures() {
      const LONG_PRESS_MS      = 600;
      const SWIPE_THRESHOLD    = 48;   
      const MOVE_CANCEL_THRES  = 10;   
      const DOUBLE_TAP_MS      = 280;  

      let startX       = 0, startY = 0;
      let didMove      = false;
      let lpFired      = false;
      let lastTapTime  = 0;
      let tapTimer     = null;
      let lpTimer      = null;

      swipeArea.addEventListener('touchstart', e => {
        const t = e.changedTouches[0];
        startX   = t.clientX;
        startY   = t.clientY;
        didMove  = false;
        lpFired  = false;
        clearTimeout(lpTimer);

        lpTimer = setTimeout(() => {
          if (!didMove) {
            lpFired = true;
            openContextMenu();
          }
        }, LONG_PRESS_MS);
      }, { passive: true });

      swipeArea.addEventListener('touchmove', e => {
        if (didMove) return;
        const t  = e.changedTouches[0];
        const dx = Math.abs(t.clientX - startX);
        const dy = Math.abs(t.clientY - startY);
        if (dx > MOVE_CANCEL_THRES || dy > MOVE_CANCEL_THRES) {
          didMove = true;
          clearTimeout(lpTimer);
        }
      }, { passive: true });

      swipeArea.addEventListener('touchend', e => {
        clearTimeout(lpTimer);

        if (lpFired) return;

        const t    = e.changedTouches[0];
        const dx   = t.clientX - startX;
        const dy   = Math.abs(t.clientY - startY);
        const absDx = Math.abs(dx);

        if (didMove && absDx > SWIPE_THRESHOLD && absDx > dy) {
          if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
          lastTapTime = 0;

          if (dx < 0) prevPage();
          else        nextPage();
          return;
        }

        if (!didMove) {
          const now           = Date.now();
          const sinceLastTap  = now - lastTapTime;

          if (sinceLastTap < DOUBLE_TAP_MS && tapTimer !== null) {
            clearTimeout(tapTimer);
            tapTimer    = null;
            lastTapTime = 0;

            fullView = !fullView;
            document.body.classList.toggle('full-view', fullView);
            localStorage.setItem('quranFullView', fullView);

          } else {
            lastTapTime = now;
            if (tapTimer) clearTimeout(tapTimer);
            tapTimer = setTimeout(() => {
              tapTimer = null;
              document.body.classList.toggle('focus-mode');
            }, DOUBLE_TAP_MS);
          }
        }
      });

      swipeArea.addEventListener('touchcancel', () => {
        clearTimeout(lpTimer);
        clearTimeout(tapTimer);
        tapTimer = null;
        lpFired  = false;
      });
    }

    function disableNativeLongPress() {
      img.addEventListener('contextmenu',  e => e.preventDefault());
      swipeArea.addEventListener('contextmenu', e => e.preventDefault());
      img.style.webkitTouchCallout = 'none';
    }

    // ============================================================
    //  CONTEXT MENU
    // ============================================================
    function openContextMenu() {
      const surah = getCurrentSurah();
      const juz   = getCurrentJuz();

      document.getElementById('contextInfo').innerHTML =
        `<strong>صفحة ${currentPage}</strong><br>` +
        (surah ? `سورة ${surah.name}` : '') +
        (juz   ? ` | الجزء ${juz.number}` : '');

      const isBookmarked = bookmarks.has(currentPage);
      const btn = document.getElementById('contextBookmarkBtn');
      btn.textContent = isBookmarked ? '★ إزالة من المفضلة' : '☆ إضافة للمفضلة';
      btn.style.color = isBookmarked ? '#f5b342' : '';

      document.getElementById('contextMenu').classList.add('active');
      document.getElementById('contextOverlay').style.display = 'block';
    }

    function closeContextMenu() {
      document.getElementById('contextMenu').classList.remove('active');
      document.getElementById('contextOverlay').style.display = 'none';
    }

    function contextToggleBookmark() {
      toggleBookmark();
      closeContextMenu();
    }

    // ============================================================
    //  BOOKMARKS
    // ============================================================
    function loadBookmarks() {
      try {
        const saved = localStorage.getItem('quranBookmarks');
        bookmarks = saved ? new Set(JSON.parse(saved)) : new Set();
      } catch { bookmarks = new Set(); }
    }

    function saveBookmarks() {
      localStorage.setItem('quranBookmarks', JSON.stringify([...bookmarks]));
    }

    function toggleBookmark() {
      if (bookmarks.has(currentPage)) bookmarks.delete(currentPage);
      else                             bookmarks.add(currentPage);
      saveBookmarks();
      updateBookmarkStar();
    }

    function updateBookmarkStar() {
      const isBookmarked = bookmarks.has(currentPage);
      bookmarkBtn.classList.toggle('active', isBookmarked);
    }

    function openBookmarksModal() {
      closeModal('settingsModal');
      const list = document.getElementById('bookmarksList');
      list.innerHTML = '';

      if (bookmarks.size === 0) {
        list.innerHTML = '<div class="empty-state">لا توجد صفحات في المفضلة</div>';
      } else {
        [...bookmarks].sort((a, b) => a - b).forEach(page => {
          const surah = [...SURAH_MAP].reverse().find(s => page >= s.page);
          const juz   = [...JUZ_MAP].reverse().find(j => page >= j.page);

          const div = document.createElement('div');
          div.className = 'bookmark-item';
          div.innerHTML = `
            <div class="bm-page">صفحة ${page}</div>
            <div class="bm-surah">
              ${surah ? 'سورة ' + surah.name : ''}
              ${juz   ? ' | الجزء ' + juz.number : ''}
            </div>`;

          div.onclick = () => {
            goToPage(page);
            closeModal('bookmarksModal');
          };
          list.appendChild(div);
        });
      }
      openModal('bookmarksModal');
    }

    // ============================================================
    //  SURAH SELECTOR
    // ============================================================
    function openSurahSelector() {
      closeContextMenu();
      const searchEl = document.getElementById('surahSearch');
      if (searchEl) searchEl.value = '';
      buildSurahList(SURAH_MAP);
      openModal('surahSelectorModal');
      setTimeout(() => { if (searchEl) searchEl.focus(); }, 200);
    }

    function buildSurahList(surahs) {
      const list = document.getElementById('surahList');
      list.innerHTML = '';

      if (surahs.length === 0) {
        list.innerHTML = '<div class="empty-state">لا توجد نتائج</div>';
        return;
      }

      const fragment = document.createDocumentFragment();
      surahs.forEach(s => {
        const div = document.createElement('div');
        div.className = 'selector-item';
        div.innerHTML = `
          <span class="num-badge">${s.number}</span>
          <span class="name">سورة ${s.name}</span>
          <span class="page-tag">ص ${s.page}</span>`;

        div.onclick = () => {
          goToPage(s.page);
          closeModal('surahSelectorModal');
        };
        fragment.appendChild(div);
      });
      list.appendChild(fragment);
    }

    function filterSurahs(query) {
      const q = query.trim();
      if (!q) { buildSurahList(SURAH_MAP); return; }
      const filtered = SURAH_MAP.filter(s =>
        s.name.includes(q) ||
        s.number.toString().includes(q)
      );
      buildSurahList(filtered);
    }

    // ============================================================
    //  JUZ SELECTOR
    // ============================================================
    function openJuzSelector() {
      closeContextMenu();
      const list = document.getElementById('juzList');
      list.innerHTML = '';

      const fragment = document.createDocumentFragment();
      JUZ_MAP.forEach(j => {
        const surah = [...SURAH_MAP].reverse().find(s => j.page >= s.page);

        const div = document.createElement('div');
        div.className = 'selector-item';
        div.innerHTML = `
          <span class="num-badge">${j.number}</span>
          <span class="name">الجزء ${j.number}${surah ? ' — ' + surah.name : ''}</span>
          <span class="page-tag">ص ${j.page}</span>`;

        div.onclick = () => {
          goToPage(j.page);
          closeModal('juzSelectorModal');
        };
        fragment.appendChild(div);
      });
      list.appendChild(fragment);
      openModal('juzSelectorModal');
    }

    // ============================================================
    //  PAGE SELECTOR MODAL (WHEEL PICKER)
    // ============================================================
    let lastActivePickerIndex = -1;

    function initPageRoller() {
      const scroll = document.getElementById('pagePickerScroll');
      scroll.innerHTML = '';
      
      const topSpacer = document.createElement('div');
      topSpacer.style.height = '50px';
      scroll.appendChild(topSpacer);

      for(let i = 1; i <= totalPages; i++) {
        const div = document.createElement('div');
        div.className = 'picker-item';
        div.id = 'picker-item-' + i;
        div.textContent = i;
        // النقر على الرقم يضعه في المنتصف فوراً
        div.onclick = () => { scroll.scrollTop = (i - 1) * 50; };
        scroll.appendChild(div);
      }

      const botSpacer = document.createElement('div');
      botSpacer.style.height = '50px';
      scroll.appendChild(botSpacer);
    }

    function openPageSelector() {
      closeContextMenu();
      openModal('pageSelectorModal');
      
      // التمرير التلقائي ليكون العرض على الصفحة الحالية عند فتح النافذة
      setTimeout(() => {
        const scroll = document.getElementById('pagePickerScroll');
        scroll.scrollTop = (currentPage - 1) * 50;
        updatePickerInput();
      }, 10);
    }

    function updatePickerInput() {
      const scroll = document.getElementById('pagePickerScroll');
      let index = Math.round(scroll.scrollTop / 50) + 1;
      
      if (index < 1) index = 1;
      if (index > totalPages) index = totalPages;

      document.getElementById('gotoPageInput').value = index;

      // تحديث مظهر العنصر النشط (تكبيره وتلوينه) بشكل سلس دون التأثير على الأداء
      if (index !== lastActivePickerIndex) {
        if (lastActivePickerIndex !== -1) {
          const oldItem = document.getElementById('picker-item-' + lastActivePickerIndex);
          if (oldItem) oldItem.classList.remove('active');
        }
        const newItem = document.getElementById('picker-item-' + index);
        if (newItem) newItem.classList.add('active');
        
        lastActivePickerIndex = index;
      }
    }

    // يتزامن السحب (الرولر) عند كتابة الرقم يدوياً في المربع
    function syncPickerWithInput() {
      let val = parseInt(document.getElementById('gotoPageInput').value);
      if (val >= 1 && val <= totalPages) {
        const scroll = document.getElementById('pagePickerScroll');
        scroll.scrollTop = (val - 1) * 50;
      }
    }

    function confirmPageSelection() {
      const page = parseInt(document.getElementById('gotoPageInput').value);
      if (page >= 1 && page <= totalPages) {
        goToPage(page);
        closeModal('pageSelectorModal');
      }
    }

    // ============================================================
    //  MODAL SYSTEM
    // ============================================================
    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function handleOverlayClick(event, modalId) {
      if (event.target === document.getElementById(modalId)) {
        closeModal(modalId);
      }
    }

    function openSettingsModal() {
      closeContextMenu();
      openModal('settingsModal');
    }

    // ============================================================
    //  SETTINGS
    // ============================================================
    function toggleTheme() {
      const body     = document.body;
      const current  = body.getAttribute('data-theme');
      const next     = current === 'light' ? 'dark' : 'light';
      body.setAttribute('data-theme', next);
      localStorage.setItem('quranTheme', next);
    }

    async function cacheAllPages() {
      closeModal('settingsModal');
      if (!('caches' in window)) {
        alert('المتصفح لا يدعم التخزين المؤقت');
        return;
      }
      alert('جاري تخزين الصفحات للاستخدام بدون إنترنت...\nقد يستغرق ذلك بضع دقائق.');
      const cache  = await caches.open('quran-mushaf-v1');
      let loaded   = 0;

      for (let i = 1; i <= totalPages; i++) {
        try {
          await cache.add(`mushaf/${i}.png`);
          loaded++;
        } catch (err) {
          console.warn(`فشل تخزين الصفحة ${i}:`, err);
        }
      }
      alert(`✓ تم تخزين ${loaded} من ${totalPages} صفحة بنجاح`);
    }
  </script>
