<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المصحف الشريف</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<style>
:root{
    --bg:#f4ecd8;
    --text:#222;
    --accent:#8d6e63;
    --dim:rgba(0,0,0,0);
    --transition:0.5s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"]{
    --bg:#121212;
    --text:#e0e0e0;
    --accent:#81c784;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Amiri',serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    padding:10px 15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--bg);
    border-bottom:1px solid #ddd;
    z-index:10;
}

.header-center{
    text-align:center;
}

button{
    background:none;
    border:none;
    font-size:20px;
    cursor:pointer;
}

/* MAIN */
main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:2000px;
    position:relative;
    overflow:hidden;
}

.page-frame{
    width:100%;
    max-width:600px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:var(--transition);
}

.mushaf-img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    border-radius:6px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    user-select:none;
    -webkit-user-drag:none;
}

/* 3D FLIP */
.flip-next{
    transform:rotateY(-25deg) translateX(-50%);
    opacity:0;
}

.flip-prev{
    transform:rotateY(25deg) translateX(50%);
    opacity:0;
}

/* DIM OVERLAY */
.dim-overlay{
    position:absolute;
    inset:0;
    background:var(--dim);
    pointer-events:none;
    transition:0.4s;
}

/* BOOKMARK */
.bookmark-indicator{
    position:absolute;
    top:10px;
    left:10px;
    background:var(--accent);
    color:#fff;
    padding:4px 8px;
    border-radius:12px;
    font-size:12px;
    display:none;
}

.bookmark-indicator.visible{
    display:block;
}
</style>
</head>
<body data-theme="light">

<header>
<button onclick="goHome()">🏠</button>
<div class="header-center">
<div id="surahName">سورة الفاتحة</div>
<div id="pageMeta">الجزء ١ | صفحة ١</div>
</div>
<button onclick="toggleDim()">🌙</button>
</header>

<main id="swipeArea">
<div class="bookmark-indicator" id="bookmarkLabel">🔖 محفوظة</div>
<div class="dim-overlay" id="dimLayer"></div>
<div class="page-frame" id="pageFrame">
<img id="pageImg" class="mushaf-img" src="mushaf/1.png">
</div>
</main>

<script src="js/surah-map.js"></script>
<script src="js/juz-map.js"></script>
<script src="js/quran-app.js"></script>

<script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
