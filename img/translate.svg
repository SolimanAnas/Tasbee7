<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#000"/>
  <!-- Back bubble (larger, top-left) -->
  <rect x="90" y="60" width="260" height="220" rx="30" fill="#fff"/>
  <polygon points="90,230 50,290 140,230" fill="#fff"/>
  <!-- Letter A in back bubble -->
  <text x="185" y="200" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="central">A</text>
  <!-- Front bubble (smaller, bottom-right) -->
  <rect x="200" y="250" width="230" height="190" rx="26" fill="#fff"/>
  <polygon points="380,390 430,450 350,390" fill="#fff"/>
  <!-- Character 文 in front bubble -->
  <text x="315" y="370" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="central">文</text>
</svg>
