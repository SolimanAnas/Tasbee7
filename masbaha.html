<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسبيح - الاستماع للقرآن</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121821;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 360px;
            height: 740px;
            background-color: #1a222f;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            direction: rtl;
        }

        /* Status Bar (approximation) */
        .status-bar {
            height: 24px;
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: #ccc;
        }

        /* Header with Controls */
        header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background-color: #273142;
            border: none;
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #8fa3b0;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .battery-icon {
            color: #8fa3b0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dhikr-selector {
            background-color: #273142;
            border: none;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .dhikr-selector .arrow {
            margin-right: 8px;
            color: #8fa3b0;
            font-size: 12px;
        }

        /* Main Counter Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .counter-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-circle-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-circle-back {
            fill: none;
            stroke: #273142;
            stroke-width: 10;
        }

        .progress-circle-prog {
            fill: none;
            stroke: #10b981;
            /* Green from target text */
            stroke-width: 10;
            stroke-dasharray: 660;
            /* Circumference of a 105px radius circle */
            stroke-dashoffset: 660;
            /* Initially empty */
            transition: stroke-dashoffset 0.3s ease-out;
            stroke-linecap: round;
        }

        .counter-values {
            position: absolute;
            text-align: center;
        }

        .counter-label {
            font-size: 16px;
            color: #8fa3b0;
            margin-bottom: 4px;
        }

        .counter-number {
            font-size: 64px;
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        .target-text {
            color: #10b981;
            margin-top: 8px;
            font-size: 14px;
        }

        .reset-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: #273142;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #8fa3b0;
        }

        .reset-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Bottom "Virtue of Dhikr" Card */
        .virtue-card {
            background-color: #1a222f;
            padding: 24px;
            border-radius: 20px 20px 0 0;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            direction: rtl;
        }

        .virtue-title {
            color: #10b981;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .virtue-text {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
        }

        .virtue-text p {
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <div class="status-bar">
            <span>4:54 🌙 0 K/s</span>
            <span>du du du</span>
            <span>VOLTE1 VOLTE2 4G+ [32%]</span>
        </div>

        <header>
            <div class="controls-row">
                <button class="icon-btn" title="الإعدادات">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm9-3a9 9 0 0 0-9-9 9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9Z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" title="الرئيسية">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                    </svg>
                </button>
                <div class="battery-icon" title="البطارية">
                    <svg viewBox="0 0 16 24" width="16" height="24">
                        <path fill="currentColor" d="M11 2H5c-.55 0-1 .45-1 1v1h8V3c0-.55-.45-1-1-1Z"></path>
                        <path fill="none" stroke="currentColor" stroke-width="2"
                            d="M2 5h12v16c0 .55-.45 1-1 1H3c-.55 0-1-.45-1-1V5Z"></path>
                        <rect fill="currentColor" x="4" y="10" width="8" height="10" rx="1"></rect>
                    </svg>
                    <span>[32%]</span>
                </div>
            </div>
            <div class="dhikr-selector">
                <span class="arrow">▼</span>
                <span>سبحان الله</span>
            </div>
        </header>

        <div class="main-content">
            <div class="counter-container">
                <svg class="progress-circle-svg" viewBox="0 0 220 220">
                    <circle class="progress-circle-back" cx="110" cy="110" r="105"></circle>
                    <circle id="progressCircle" class="progress-circle-prog" cx="110" cy="110" r="105"></circle>
                </svg>
                <div class="counter-values">
                    <p class="counter-label">عدد التكرار</p>
                    <p id="counterValue" class="counter-number">105</p>
                    <p class="target-text">الهدف: 100</p>
                </div>
            </div>
            <button id="resetBtn" class="reset-btn" title="إعادة تعيين">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z">
                    </path>
                </svg>
            </button>
        </div>

        <div class="virtue-card">
            <div class="virtue-title">فضل الذكر</div>
            <div class="virtue-text">
                <p>قال ﷺ: «أحب الكلام إلى الله أربع: سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر»</p>
            </div>
        </div>
    </div>

    <script>
        // Simple counter script
        let count = 0;
        const maxCount = 100;
        const counterElement = document.getElementById('counterValue');
        const progressCircle = document.getElementById('progressCircle');
        const circumference = 660; // Approximate circumference for r=105

        function updateDisplay() {
            counterElement.innerText = count;
            const percentage = count / maxCount;
            const offset = circumference * (1 - Math.min(percentage, 1));
            progressCircle.style.strokeDashoffset = offset;
        }

        // Increment counter on click
        document.querySelector('.progress-circle-svg').addEventListener('click', () => {
            count++;
            updateDisplay();
        });

        // Reset counter
        document.getElementById('resetBtn').addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents counting as well
            count = 0;
            updateDisplay();
        });

        // Initial update
        count = 105; // Set initial count as shown in images
        updateDisplay();
    </script>
</body>

</html>
