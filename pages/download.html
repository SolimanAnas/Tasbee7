<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>تحميل | زاد المسلم</title>
<link rel="icon" href="../icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-image: url('../images/Background-light.webp');
  --bg-surface: rgba(255,255,255,0.45);
  --text-primary: #0F172A; --text-secondary: #475569;
  --accent-main: #10B981; --accent-muted: rgba(16,185,129,0.15);
  --glass: rgba(255,255,255,0.6); --glass-border: rgba(255,255,255,0.6);
  --glass-shadow: 0 8px 32px 0 rgba(31,38,135,0.07);
  --overlay: rgba(255,255,255,0.2); --modal-overlay: rgba(0,0,0,0.3);
  --list-hover: rgba(0,0,0,0.05); --gold: #9a7b1f; --gold-soft: rgba(154,123,31,.12);
  --danger: #ef4444;
}
[data-theme="dark"] {
  --bg-image: url('../images/Background-dark.webp');
  --bg-surface: rgba(15,23,42,0.5);
  --text-primary: #F8FAFC; --text-secondary: #CBD5E1;
  --accent-main: #10B981; --accent-muted: rgba(255,255,255,0.1);
  --glass: rgba(30,41,59,0.6); --glass-border: rgba(255,255,255,0.1);
  --glass-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
  --overlay: rgba(15,23,42,0.5); --modal-overlay: rgba(0,0,0,0.7);
  --list-hover: rgba(255,255,255,0.05); --gold: #e6c068; --gold-soft: rgba(230,192,104,.15);
  --danger: #f87171;
}
[data-theme="sepia"] {
  --bg-image: url('../images/background-sepia.webp');
  --bg-surface: rgba(244,236,216,0.55);
  --text-primary: #3c2a18; --text-secondary: #7a6244;
  --accent-main: #8a5a1c; --accent-muted: rgba(138,90,28,0.12);
  --glass: rgba(252,247,234,0.65); --glass-border: rgba(244,236,216,0.7);
  --glass-shadow: 0 8px 32px 0 rgba(90,60,20,0.1);
  --overlay: rgba(244,236,216,0.2); --modal-overlay: rgba(0,0,0,0.3);
  --list-hover: rgba(122,84,24,0.06); --gold: #9a6b1f; --gold-soft: rgba(154,107,31,.12);
  --danger: #c0392b;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body {
  margin:0; font-family:'Tajawal',sans-serif;
  background-color:var(--bg-surface); background-image:var(--bg-image);
  background-size:cover; background-position:center; background-attachment:fixed;
  color:var(--text-primary); display:flex; justify-content:center;
  padding:calc(max(12px,env(safe-area-inset-top))+30px) 20px 100px;
  min-height:100dvh; transition:color .4s, background-image .4s;
}
body::before { content:''; position:fixed; inset:0; background:var(--overlay); z-index:-1; }

.app { width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px; }

/* Header */
.header {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:16px; padding:12px 16px;
  position:relative;
}
.header-title { font-weight:bold; font-size:18px; }
.icon-btn {
  background:none; border:none; color:var(--text-primary); cursor:pointer;
  padding:5px; display:flex; align-items:center; justify-content:center; transition:.2s; font-size:18px;
}
.icon-btn:active { opacity:.7; transform:scale(.9); }

/* Cards */
.card {
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:20px; padding:15px;
  display:flex; flex-direction:column; gap:8px;
}
label { font-size:14px; color:var(--accent-main); font-weight:bold; }

/* URL Input */
.url-input-wrap {
  display:flex; gap:8px; align-items:stretch;
}
.url-input {
  flex:1; padding:14px 16px; border-radius:14px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-family:inherit;
  font-size:15px; outline:none; transition:.2s; direction:ltr; text-align:left;
}
.url-input:focus { border-color:var(--accent-main); }
.url-input::placeholder { color:var(--text-secondary); direction:rtl; text-align:right; }
.paste-btn {
  padding:14px 16px; border-radius:14px; border:1px solid var(--glass-border);
  background:var(--accent-muted); color:var(--accent-main); font-family:inherit;
  font-size:14px; font-weight:700; cursor:pointer; transition:.2s; white-space:nowrap;
}
.paste-btn:active { transform:scale(.95); background:var(--accent-main); color:#fff; }

/* Preview */
.preview-card {
  display:none; overflow:hidden;
}
.preview-card.visible { display:flex; flex-direction:column; gap:10px; animation:fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
.preview-thumb {
  width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden;
  background:var(--list-hover); position:relative;
}
.preview-thumb img { width:100%; height:100%; object-fit:cover; }
.preview-duration {
  position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.8);
  color:#fff; font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px;
}
.preview-title {
  font-size:15px; font-weight:700; line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.preview-channel {
  font-size:12px; color:var(--text-secondary); font-weight:500;
}

/* Format Grid */
.format-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.format-card {
  padding:14px 12px; border-radius:14px; border:2px solid var(--glass-border);
  background:var(--list-hover); cursor:pointer; transition:.25s; text-align:center;
}
.format-card:active { transform:scale(.96); }
.format-card.selected {
  border-color:var(--accent-main); background:var(--accent-muted);
}
.format-icon { font-size:28px; margin-bottom:4px; }
.format-label { font-size:14px; font-weight:700; color:var(--text-primary); }
.format-desc { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* Quality Chips */
.quality-grid { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
.quality-chip {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700;
  background:var(--list-hover); border:1px solid var(--glass-border);
  color:var(--text-secondary); cursor:pointer; transition:.2s;
}
.quality-chip:active { transform:scale(.92); }
.quality-chip.active {
  background:var(--accent-main); color:#fff; border-color:var(--accent-main);
}

/* Download Button */
.download-btn {
  padding:16px; border-radius:16px; border:none;
  background:var(--accent-main); color:#fff; font-family:inherit;
  font-size:16px; font-weight:700; cursor:pointer; transition:.2s;
  box-shadow:0 6px 20px rgba(16,185,129,.4); display:flex; align-items:center;
  justify-content:center; gap:8px;
}
.download-btn:active { transform:scale(.97); }
.download-btn:disabled { opacity:.4; cursor:default; transform:none; }
.download-btn .spinner {
  width:20px; height:20px; border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; display:none;
}
.download-btn.loading .spinner { display:block; }
.download-btn.loading .dl-text { display:none; }
@keyframes spin { to{transform:rotate(360deg);} }

/* Status */
.status-msg {
  text-align:center; font-size:13px; font-weight:600; color:var(--text-secondary);
  padding:8px; display:none;
}
.status-msg.visible { display:block; animation:fadeIn .3s ease; }
.status-msg.error { color:var(--danger); }
.status-msg.success { color:var(--accent-main); }

/* History */
.history-header {
  display:flex; justify-content:space-between; align-items:center;
}
.history-clear {
  font-size:12px; color:var(--danger); cursor:pointer; font-weight:600;
  background:none; border:none; font-family:inherit; padding:4px 8px; border-radius:8px;
  transition:.2s;
}
.history-clear:active { background:rgba(239,68,68,.1); }
.history-list { display:flex; flex-direction:column; gap:6px; }
.history-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:12px; background:var(--list-hover); border:1px solid var(--glass-border);
  cursor:pointer; transition:.2s;
}
.history-item:active { transform:scale(.98); }
.history-thumb {
  width:48px; height:36px; border-radius:6px; overflow:hidden; flex-shrink:0;
  background:var(--list-hover);
}
.history-thumb img { width:100%; height:100%; object-fit:cover; }
.history-info { flex:1; min-width:0; }
.history-title {
  font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.history-meta { font-size:11px; color:var(--text-secondary); }
.history-badge {
  padding:3px 8px; border-radius:8px; font-size:10px; font-weight:700;
  background:var(--accent-muted); color:var(--accent-main); flex-shrink:0;
}

/* Empty state */
.empty-state {
  text-align:center; padding:30px 20px; color:var(--text-secondary);
}
.empty-icon { font-size:48px; margin-bottom:8px; opacity:.5; }
.empty-text { font-size:14px; }

/* Copy button */
.copy-btn {
  width:100%; padding:12px; border-radius:14px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--accent-main); font-family:inherit;
  font-size:14px; font-weight:700; cursor:pointer; transition:.2s;
}
.copy-btn:active { transform:scale(.96); background:var(--accent-muted); }

/* Toast */
.toast {
  position:fixed; top:20px; left:50%; transform:translate(-50%,-120px);
  background:var(--accent-main); color:#fff; padding:12px 24px; border-radius:30px;
  font-size:14px; font-weight:bold; z-index:100000; transition:.4s;
  box-shadow:0 4px 15px rgba(0,0,0,.2); max-width:90vw; text-align:center;
}
.toast.show { transform:translate(-50%,0); }
.toast.error { background:var(--danger); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <a href="/Tasbee7/index.html" class="icon-btn" title="الرئيسية" style="text-decoration:none;"><img src="../img/SVG/home.svg" width="20" height="20" alt=""></a>
    <div class="header-title" style="position:absolute;left:50%;transform:translateX(-50%);">التحميل</div>
    <button class="icon-btn" onclick="cycleTheme()" title="المظهر"><img src="../img/SVG/moon.svg" width="20" height="20" alt=""></button>
  </div>

  <!-- URL Input -->
  <div class="card">
    <label>رابط الفيديو</label>
    <div class="url-input-wrap">
      <input type="url" class="url-input" id="urlInput" placeholder="الصق رابط YouTube هنا..." oninput="onUrlChange()">
      <button class="paste-btn" onclick="pasteFromClipboard()"><img src="../img/SVG/copy.svg" width="16" height="16" style="vertical-align:middle;margin-left:4px;" alt=""> لصق</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="card preview-card" id="previewCard">
    <div class="preview-thumb" id="previewThumb">
      <img id="previewImg" src="" alt="">
      <span class="preview-duration" id="previewDuration"></span>
    </div>
    <div class="preview-title" id="previewTitle"></div>
    <div class="preview-channel" id="previewChannel"></div>
  </div>

  <!-- Format Selection -->
  <div class="card" id="formatCard" style="display:none;">
    <label>صيغة التحميل</label>
    <div class="format-grid">
      <div class="format-card selected" onclick="selectFormat('mp3')" id="fmtMp3">
        <div class="format-icon"><img src="../img/SVG/music.svg" width="28" height="28" alt=""></div>
        <div class="format-label">MP3</div>
        <div class="format-desc">صوت فقط</div>
      </div>
      <div class="format-card" onclick="selectFormat('mp4')" id="fmtMp4">
        <div class="format-icon"><img src="../img/SVG/play.svg" width="28" height="28" alt=""></div>
        <div class="format-label">MP4</div>
        <div class="format-desc">فيديو + صوت</div>
      </div>
    </div>
  </div>

  <!-- Quality Selection -->
  <div class="card" id="qualityCard" style="display:none;">
    <label>الجودة</label>
    <div class="quality-grid" id="qualityGrid"></div>
  </div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Copy URL -->
  <div id="copyRow" style="display:none;">
    <button class="copy-btn" onclick="copyUrl()"><img src="../img/SVG/copy.svg" width="16" height="16" style="vertical-align:middle;margin-left:4px;" alt=""> نسخ الرابط</button>
  </div>

  <!-- Download Button -->
  <button class="download-btn" id="downloadBtn" style="display:none;" onclick="startDownload()">
    <span class="dl-text"><img src="../img/SVG/download.svg" width="18" height="18" style="vertical-align:middle;margin-left:4px;" alt=""> فتح صفحة التحميل</span>
    <span class="spinner"></span>
  </button>

  <!-- History -->
  <div class="card" id="historyCard">
    <div class="history-header">
      <label>التحميلات السابقة</label>
      <button class="history-clear" onclick="clearHistory()">مسح</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
/* ---------- Theme ---------- */
const THEMES=['dark','light','sepia'];
let tIdx=parseInt(localStorage.getItem('appThemeIdx'))||0;
function applyTheme(){document.documentElement.setAttribute('data-theme',THEMES[tIdx]);localStorage.setItem('appThemeIdx',tIdx);}
function cycleTheme(){tIdx=(tIdx+1)%THEMES.length;applyTheme();}
applyTheme();

/* ---------- Toast ---------- */
function showToast(m,e){const t=document.getElementById('toast');t.textContent=m;t.classList.toggle('error',!!e);t.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('show'),3000);}

/* ---------- State ---------- */
let selectedFormat='mp3';
let selectedQuality='192';
let videoData=null;

const MP3_QUALITIES=['128','192','256','320'];
const MP4_QUALITIES=['360','480','720','1080'];

/* ---------- Paste ---------- */
async function pasteFromClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    document.getElementById('urlInput').value=text;
    onUrlChange();
  }catch(e){
    showToast('الصق الرابط يدوياً',true);
  }
}

/* ---------- URL Change ---------- */
let fetchTimer=null;
function onUrlChange(){
  clearTimeout(fetchTimer);
  const url=document.getElementById('urlInput').value.trim();
  if(!url){hidePreview();return;}
  if(!isYouTubeUrl(url)){hidePreview();return;}
  fetchTimer=setTimeout(()=>fetchVideoInfo(url),600);
}

function isYouTubeUrl(url){
  return /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)/.test(url);
}

function extractVideoId(url){
  const m=url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

/* ---------- Fetch Video Info (YouTube oembed → noembed fallback) ---------- */
async function fetchVideoInfo(url){
  showStatus('جاري تحميل المعلومات...','');
  const vid=extractVideoId(url);
  if(!vid){hidePreview();showStatus('رابط YouTube غير صالح','error');return;}

  let data=null;
  // Try YouTube oembed first (most reliable)
  try{
    const r1=await fetch('https://www.youtube.com/oembed?url='+encodeURIComponent(url)+'&format=json');
    if(r1.ok){const d=await r1.json();if(!d.error)data=d;}
  }catch{}
  // Fallback to noembed
  if(!data){
    try{
      const r2=await fetch('https://noembed.com/embed?url='+encodeURIComponent(url));
      if(r2.ok){const d=await r2.json();if(!d.error)data=d;}
    }catch{}
  }
  // Last resort: construct from video ID (thumbnail always works)
  if(!data){
    data={title:'فيديو',author_name:'',thumbnail_url:'https://i.ytimg.com/vi/'+vid+'/hqdefault.jpg'};
  }

  videoData={
    title:data.title||'فيديو',
    channel:data.author_name||'',
    thumbnail:data.thumbnail_url||`https://i.ytimg.com/vi/${vid}/hqdefault.jpg`,
    url:url,
    id:vid
  };
  showPreview(videoData);
  showStatus('','');
  document.getElementById('formatCard').style.display='';
  document.getElementById('qualityCard').style.display='';
  document.getElementById('downloadBtn').style.display='';
  updateQualityGrid();
}

/* ---------- Preview ---------- */
function showPreview(v){
  const card=document.getElementById('previewCard');
  card.classList.add('visible');
  document.getElementById('previewImg').src=v.thumbnail;
  document.getElementById('previewTitle').textContent=v.title;
  document.getElementById('previewChannel').textContent=v.channel;
  document.getElementById('previewDuration').textContent='';
  document.getElementById('copyRow').style.display='';
}
function hidePreview(){
  document.getElementById('previewCard').classList.remove('visible');
  document.getElementById('formatCard').style.display='none';
  document.getElementById('qualityCard').style.display='none';
  document.getElementById('downloadBtn').style.display='none';
  document.getElementById('copyRow').style.display='none';
  videoData=null;
}

/* ---------- Copy URL ---------- */
function copyUrl(){
  if(!videoData)return;
  navigator.clipboard.writeText(videoData.url).then(()=>{
    showToast('تم نسخ الرابط');
    const btn=document.querySelector('.copy-btn');
    btn.innerHTML='<img src="../img/SVG/check.svg" width="16" height="16" style="vertical-align:middle;margin-left:4px;" alt=""> تم النسخ';
    setTimeout(()=>{btn.innerHTML='<img src="../img/SVG/copy.svg" width="16" height="16" style="vertical-align:middle;margin-left:4px;" alt=""> نسخ الرابط';},1500);
  }).catch(()=>{
    showToast('لم يتم النسخ',true);
  });
}

/* ---------- Format ---------- */
function selectFormat(fmt){
  selectedFormat=fmt;
  document.getElementById('fmtMp3').classList.toggle('selected',fmt==='mp3');
  document.getElementById('fmtMp4').classList.toggle('selected',fmt==='mp4');
  updateQualityGrid();
}

function updateQualityGrid(){
  const quals=selectedFormat==='mp3'?MP3_QUALITIES:MP4_QUALITIES;
  const grid=document.getElementById('qualityGrid');
  grid.innerHTML=quals.map(q=>
    `<div class="quality-chip ${q===selectedQuality?'active':''}" onclick="selectQuality('${q}')">${q}${selectedFormat==='mp3'?'kbps':'p'}</div>`
  ).join('');
  if(!quals.includes(selectedQuality)) selectedQuality=quals[1]||quals[0];
  grid.querySelector(`.quality-chip:nth-child(${quals.indexOf(selectedQuality)+1})`)?.classList.add('active');
}

function selectQuality(q){
  selectedQuality=q;
  document.querySelectorAll('.quality-chip').forEach(c=>c.classList.remove('active'));
  event.target.closest('.quality-chip')?.classList.add('active');
}

/* ---------- Status ---------- */
function showStatus(msg,type){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;
  el.className='status-msg'+(msg?' visible':'')+(type==='error'?' error':'')+(type==='success'?' success':'');
}

/* ---------- Download ---------- */
function startDownload(){
  if(!videoData)return;
  const vid=videoData.id;
  const btn=document.getElementById('downloadBtn');
  const fmt=selectedFormat;

  // Build download service URL based on format
  // cobalt.tools is the most reliable free service — opens in new tab
  const cobaltUrl='https://cobalt.tools/';

  btn.classList.add('loading');
  btn.disabled=true;
  showStatus('جاري الفتح...','success');

  // Save to history
  saveToHistory(videoData,fmt,selectedQuality);

  // Open cobalt.tools — user pastes the URL there
  // (cobalt.tools blocks direct API calls from browsers due to bot protection)
  setTimeout(()=>{
    window.open(cobaltUrl,'_blank');
    btn.classList.remove('loading');
    btn.disabled=false;
    showToast('الصق الرابط في cobalt.tools وحمّل');
    showStatus('الصق الرابط في cobalt.tools والصق الصيغة المطلوبة','success');
  },500);
}

/* ---------- History ---------- */
function getHistory(){
  try{return JSON.parse(localStorage.getItem('dlHistory')||'[]');}catch(e){return[];}
}
function saveToHistory(video,fmt,qual){
  const h=getHistory();
  h.unshift({title:video.title,channel:video.channel,thumbnail:video.thumbnail,url:video.url,format:fmt,quality:qual,time:Date.now()});
  if(h.length>20)h.length=20;
  localStorage.setItem('dlHistory',JSON.stringify(h));
  renderHistory();
}
function clearHistory(){
  localStorage.removeItem('dlHistory');
  renderHistory();
}
function renderHistory(){
  const h=getHistory();
  const list=document.getElementById('historyList');
  const card=document.getElementById('historyCard');
  if(!h.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon"><img src="../img/SVG/download.svg" width="48" height="48" alt=""></div><div class="empty-text">لا توجد تحميلات بعد</div></div>';
    return;
  }
  list.innerHTML=h.map(item=>{
    const timeAgo=formatTimeAgo(item.time);
    return `<div class="history-item" onclick="window.open('${item.url}','_blank')">
      <div class="history-thumb"><img src="${item.thumbnail}" alt=""></div>
      <div class="history-info">
        <div class="history-title">${escHtml(item.title)}</div>
        <div class="history-meta">${escHtml(item.channel)} · ${timeAgo}</div>
      </div>
      <div class="history-badge">${item.format.toUpperCase()} ${item.quality}${item.format==='mp3'?'kbps':'p'}</div>
    </div>`;
  }).join('');
}

function formatTimeAgo(ts){
  const diff=Date.now()-ts;
  const m=Math.floor(diff/60000);
  if(m<1) return 'الآن';
  if(m<60) return m+' دقيقة';
  const h=Math.floor(m/60);
  if(h<24) return h+' ساعة';
  const d=Math.floor(h/24);
  return d+' يوم';
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ---------- Init ---------- */
renderHistory();
</script>
</body>
</html>
