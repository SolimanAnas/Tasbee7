<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-image: url('../images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.45);
  --text-primary: #0F172A; --text-secondary: #475569;
  --accent-main: #10B981; --accent-muted: rgba(16, 185, 129, 0.15);
  --glass: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
  --overlay: rgba(255, 255, 255, 0.2); --modal-overlay: rgba(0, 0, 0, 0.3);
  --list-hover: rgba(0, 0, 0, 0.05); --gold: #9a7b1f; --gold-soft: rgba(154,123,31,.12);
}
[data-theme="dark"] {
  --bg-image: url('../images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5);
  --text-primary: #F8FAFC; --text-secondary: #CBD5E1;
  --accent-main: #10B981; --accent-muted: rgba(255, 255, 255, 0.1);
  --glass: rgba(30, 41, 59, 0.6); --glass-border: rgba(255, 255, 255, 0.1);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.5); --modal-overlay: rgba(0, 0, 0, 0.7);
  --list-hover: rgba(255, 255, 255, 0.05); --gold: #e6c068; --gold-soft: rgba(230,192,104,.15);
}
[data-theme="sepia"] {
  --bg-image: url('../images/Background-light.png');
  --bg-surface: rgba(244, 236, 216, 0.55);
  --text-primary: #3c2a18; --text-secondary: #7a6244;
  --accent-main: #8a5a1c; --accent-muted: rgba(138, 90, 28, 0.12);
  --glass: rgba(252, 247, 234, 0.65); --glass-border: rgba(244, 236, 216, 0.7);
  --glass-shadow: 0 8px 32px 0 rgba(90, 60, 20, 0.1);
  --overlay: rgba(244, 236, 216, 0.2); --modal-overlay: rgba(0, 0, 0, 0.3);
  --list-hover: rgba(122, 84, 24, 0.06); --gold: #9a6b1f; --gold-soft: rgba(154,107,31,.12);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface); background-image: var(--bg-image);
  background-size: cover; background-position: center; background-attachment: fixed;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: calc(max(12px, env(safe-area-inset-top)) + 30px) 20px 100px;
  min-height: 100dvh; transition: color 0.4s, background-image 0.4s;
}
body::before { content:''; position:fixed; inset:0; background:var(--overlay); z-index:-1; }

.app { width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px; }

/* Header */
.header {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:16px; padding:12px 16px;
}
.header-title { font-weight:bold; font-size:18px; }
.header-sub { font-size:11px; color:var(--accent-main); font-weight:700; letter-spacing:1px; }
.icon-btn {
  background:none; border:none; color:var(--text-primary); cursor:pointer;
  padding:5px; display:flex; align-items:center; justify-content:center; transition:.2s;
}
.icon-btn:active { opacity:.7; transform:scale(.9); }

/* Cards */
.card {
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:20px; padding:15px;
  display:flex; flex-direction:column; gap:8px;
}
label { font-size:14px; color:var(--accent-main); font-weight:bold; }

/* Picker Button */
.custom-select-btn {
  padding:14px 16px; border-radius:12px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-size:15px;
  font-family:inherit; cursor:pointer; display:flex; justify-content:space-between;
  align-items:center; font-weight:500; transition:.3s;
}
.custom-select-btn:after { content:'▼'; font-size:12px; opacity:.6; }
.custom-select-btn.has-value { border-color:var(--accent-main); color:var(--accent-main); }

/* Range Row */
.range-row { display:flex; gap:10px; }
.range-row .custom-select-btn { flex:1; }

/* Stepper */
.stepper { display:flex; align-items:center; gap:20px; justify-content:center; }
.stepper-btn {
  width:44px; height:44px; border-radius:50%; background:var(--accent-muted);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:22px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s;
}
.stepper-btn:active { transform:scale(.88); background:var(--accent-main); color:#fff; }
.stepper-val { font-size:28px; font-weight:800; min-width:50px; text-align:center; direction:ltr; font-variant-numeric:tabular-nums; }
.stepper-lbl { font-size:12px; color:var(--text-secondary); text-align:center; margin-top:-4px; }

/* Speed Presets */
.speed-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; justify-content:center; }
.speed-chip {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700;
  background:var(--list-hover); border:1px solid var(--glass-border);
  color:var(--text-secondary); cursor:pointer; transition:.2s;
}
.speed-chip:active { transform:scale(.92); }
.speed-chip.active { background:var(--accent-main); color:#fff; border-color:var(--accent-main); }

/* Ayah Text Display */
.ayah-display {
  background:var(--glass); border:1px solid var(--gold-soft);
  backdrop-filter:blur(16px); border-radius:20px; padding:20px;
  text-align:center; min-height:80px; display:none;
  box-shadow:var(--glass-shadow);
}
.ayah-display.visible { display:block; }
.ayah-arabic {
  font-family:'Amiri', serif; font-size:24px; line-height:2;
  color:var(--text-primary); word-spacing:2px;
}
.ayah-ref {
  font-size:12px; color:var(--gold); font-weight:700; margin-top:10px;
  padding:4px 12px; border-radius:12px; background:var(--gold-soft); display:inline-block;
}
.ayah-loading { color:var(--text-secondary); font-size:14px; padding:20px; }

/* Status */
.status-bar {
  text-align:center; padding:8px 16px; border-radius:30px;
  background:var(--list-hover); border:1px solid var(--glass-border);
  font-size:12px; font-weight:700; color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.status-bar.playing { background:var(--accent-muted); border-color:var(--accent-main); color:var(--accent-main); }
.status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.status-bar.playing .status-dot { animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* Progress */
.progress-wrap { display:none; width:100%; }
.progress-wrap.visible { display:block; }
.progress-container { display:flex; align-items:center; gap:12px; width:100%; direction:ltr; }
.time { font-size:12px; color:var(--text-secondary); width:45px; text-align:center; font-variant-numeric:tabular-nums; }
.progress-bar { flex:1; height:6px; background:rgba(0,0,0,.15); border-radius:3px; position:relative; cursor:pointer; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent-main); border-radius:3px; width:0%; transition:width .2s; }

/* Play Button */
.play-area { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:8px; }
.play-pause-btn {
  width:68px; height:68px; border-radius:50%; background:var(--accent-main); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 4px 15px rgba(16,185,129,.4); transition:transform .2s;
}
.play-pause-btn:active { transform:scale(.92); }
.play-pause-btn svg { width:28px; height:28px; fill:currentColor; }
.play-pause-btn.stop-mode { background:#ef4444; box-shadow:0 4px 15px rgba(239,68,68,.4); }

/* Repeat Counter */
.repeat-counter {
  font-size:13px; font-weight:700; color:var(--gold);
  background:var(--gold-soft); padding:6px 16px; border-radius:20px;
  display:none; align-items:center; gap:6px;
}
.repeat-counter.visible { display:flex; }

/* Toast */
.toast {
  position:fixed; top:20px; left:50%; transform:translate(-50%,-100px);
  background:var(--accent-main); color:#fff; padding:12px 24px; border-radius:30px;
  font-size:14px; font-weight:bold; z-index:100000; transition:.4s;
  box-shadow:0 4px 15px rgba(0,0,0,.2);
}
.toast.show { transform:translate(-50%,0); }

/* Bottom Sheet */
.sheet-overlay {
  position:fixed; inset:0; background:var(--modal-overlay);
  backdrop-filter:blur(8px); z-index:9998; opacity:0; pointer-events:none; transition:.3s;
}
.sheet-overlay.active { opacity:1; pointer-events:all; }
.bottom-sheet {
  position:fixed; bottom:0; left:0; right:0; max-height:85vh;
  background:var(--glass); backdrop-filter:blur(35px); -webkit-backdrop-filter:blur(35px);
  border-top:1px solid var(--glass-border); border-radius:30px 30px 0 0;
  transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.9,.4,1.1);
  z-index:10000; display:flex; flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,20px); box-shadow:0 -10px 40px rgba(0,0,0,.2);
}
.bottom-sheet.active { transform:translateY(0); }
.drag-handle { width:40px; height:5px; background:rgba(150,150,150,.4); border-radius:10px; margin:12px auto; flex-shrink:0; }
.sheet-header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px 15px; border-bottom:1px solid var(--glass-border); flex-shrink:0; }
.sheet-header h2 { font-size:1.4rem; margin:0; font-weight:800; }
.sheet-content { padding:15px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; flex:1; }
.sheet-search {
  width:100%; padding:14px; border-radius:14px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-family:inherit;
  font-size:15px; outline:none; transition:.2s; margin-bottom:5px;
}
.sheet-search:focus { border-color:var(--accent-main); }
.sheet-item {
  padding:16px 15px; border-radius:16px; background:var(--list-hover);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:16px;
  font-weight:bold; cursor:pointer; transition:.2s; text-align:center;
}
.sheet-item:active { transform:scale(.98); }
.sheet-item.selected { background:var(--accent-main); color:#fff; border-color:var(--accent-main); box-shadow:0 4px 15px rgba(16,185,129,.3); }
.sheet-item .sub { font-size:11px; color:var(--text-secondary); font-weight:400; margin-top:2px; }
.sheet-item.selected .sub { color:rgba(255,255,255,.8); }

/* Ayah Grid */
.ayah-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
.ayah-cell {
  padding:10px 4px; border-radius:10px; background:var(--list-hover);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:13px;
  font-weight:600; cursor:pointer; text-align:center; transition:.15s;
}
.ayah-cell:active { transform:scale(.9); }
.ayah-cell.selected { background:var(--accent-main); color:#fff; border-color:var(--accent-main); }
.ayah-cell.in-range { background:var(--accent-muted); border-color:var(--accent-main); }
</style>
</head>
<body>

function fmtTime(s){const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('show'),2500);}
function normalize(t){return(t||'').replace(/[\u064B-\u065F\u0670]/g,'').replace(/[أإآ]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي').replace(/ـ/g,'');}

// Sheets
let curSheet=null;
function openSheet(type){
  curSheet=type;
  document.getElementById('sheetOverlay').classList.add('active');
  document.getElementById(type+'Sheet').classList.add('active');
  if(type==='reciter') renderReciters();
  else if(type==='surah') renderSurahs();
  else if(type==='ayah') renderAyahs();
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('active');
  if(curSheet) document.getElementById(curSheet+'Sheet').classList.remove('active');
  curSheet=null;
}

// Reciters
function renderReciters(){
  document.getElementById('reciterList').innerHTML=RECITERS.map(r=>
    `<div class="sheet-item ${S.reciter&&S.reciter.id===r.id?'selected':''}" onclick="pickReciter('${r.id}')">${r.name}</div>`
  ).join('');
}
function pickReciter(id){
  S.reciter=RECITERS.find(r=>r.id===id);
  const btn=document.getElementById('reciterBtn');
  btn.classList.add('has-value');
  btn.querySelector('span').textContent=S.reciter.name;
  closeSheet();
}

// Surahs
function renderSurahs(f=''){
  const n=normalize(f);
  document.getElementById('surahList').innerHTML=SURAH_NAMES
    .map((nm,i)=>({nm,num:i+1})).filter(s=>!n||normalize(s.nm).includes(n))
    .map(s=>`<div class="sheet-item ${S.surah===s.num?'selected':''}" onclick="pickSurah(${s.num})"><span style="color:var(--accent-main);font-weight:800;margin-inline-start:8px;">${s.num}</span>${s.nm}</div>`).join('');
}
function filterSurahs(){renderSurahs(document.getElementById('surahSearch').value);}
function pickSurah(n){
  S.surah=n; S.ayahFrom=1; S.ayahTo=1;
  const btn=document.getElementById('surahBtn');
  btn.classList.add('has-value');
  btn.querySelector('span').textContent=SURAH_NAMES[n-1];
  document.getElementById('ayahBtn').classList.remove('has-value');
  document.getElementById('ayahBtn').querySelector('span').textContent='اختر بداية ونهاية التلاوة...';
  closeSheet();
}

// Ayah Range
function renderAyahs(){
  if(!S.surah){showToast('اختر السورة أولاً');return;}
  const cnt=AYAH_COUNTS[S.surah-1]||1;
  const mk=(arrId,pickFn)=>{
    document.getElementById(arrId).innerHTML=Array.from({length:cnt},(_,i)=>{
      const n=i+1; const sel=n===S.ayahFrom?'selected':(n>=S.ayahFrom&&n<=S.ayahTo?'in-range':'');
      return `<div class="ayah-cell ${sel}" onclick="${pickFn}(${n})">${n}</div>`;
    }).join('');
  };
  mk('ayahFromGrid','pickFrom');
  mk('ayahToGrid','pickTo');
}
function pickFrom(n){S.ayahFrom=n;if(S.ayahTo<n)S.ayahTo=n;renderAyahs();updateAyahBtn();}
function pickTo(n){S.ayahTo=n;if(S.ayahFrom>n)S.ayahFrom=n;renderAyahs();updateAyahBtn();}
function updateAyahBtn(){
  const b=document.getElementById('ayahBtn');
  b.classList.add('has-value');
  b.querySelector('span').textContent=`من آية ${S.ayahFrom} إلى آية ${S.ayahTo}`;
}

// Repeat / Speed
function adjustRepeat(d){S.repeat=Math.max(1,Math.min(99,S.repeat+d));document.getElementById('repeatVal').textContent=S.repeat;}
function adjustSpeed(d){S.speed=Math.max(0.5,Math.min(3,Math.round((S.speed+d)*10)/10));updateSpeedUI();}
function setSpeed(v){S.speed=v;audio.playbackRate=v;updateSpeedUI();}
function updateSpeedUI(){
  document.getElementById('speedVal').textContent=S.speed.toFixed(1)+'x';
  document.querySelectorAll('.speed-chip').forEach(b=>b.classList.toggle('active',parseFloat(b.textContent)===S.speed));
}

// Ayah Text Cache & Fetch
const ayahCache={};
async function fetchAyahText(surah,ayah){
  const key=surah+':'+ayah;
  if(ayahCache[key]) return ayahCache[key];
  try{
    const r=await fetch(`https://api.quran.com/api/v4/verses/by_key/${surah}:${ayah}?language=ar&fields=text_uthmani`);
    if(!r.ok) throw 0;
    const d=await r.json();
    const text=d.verse&&d.verse.text_uthmani?d.verse.text_uthmani:'';
    ayahCache[key]=text;
    return text;
  }catch(e){return'';}
}
async function showAyahText(surah,ayah){
  const disp=document.getElementById('ayahDisplay');
  const txt=document.getElementById('ayahText');
  const ref=document.getElementById('ayahRef');
  disp.classList.add('visible');
  txt.innerHTML='<div class="ayah-loading">جاري تحميل الآية...</div>';
  ref.textContent=`${SURAH_NAMES[surah-1]} - آية ${ayah}`;
  const text=await fetchAyahText(surah,ayah);
  txt.textContent=text||'';
}

// Queue
function buildQueue(){
  const q=[];
  for(let r=0;r<S.repeat;r++) for(let a=S.ayahFrom;a<=S.ayahTo;a++) q.push({surah:S.surah,ayah:a,repeat:r+1});
  return q;
}

function togglePlay(){
  if(S.playing){stopPlay();return;}
  if(!S.reciter||!S.surah){showToast('اختر القارئ والسورة أولاً');return;}
  S.playing=true; queue=buildQueue(); qIdx=0;
  playItem();
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('repeatCounter').classList.add('visible');
  document.getElementById('statusBar').classList.add('playing');
  document.getElementById('statusText').textContent='جاري التشغيل...';
  updatePlayBtn();
}
function stopPlay(){
  S.playing=false; audio.pause(); audio.src='';
  document.getElementById('progressWrap').classList.remove('visible');
  document.getElementById('repeatCounter').classList.remove('visible');
  document.getElementById('statusBar').classList.remove('playing');
  document.getElementById('statusText').textContent='جاهز للتشغيل';
  document.getElementById('ayahDisplay').classList.remove('visible');
  document.getElementById('progressFill').style.width='0%';
  updatePlayBtn();
}
function playItem(){
  if(qIdx>=queue.length){stopPlay();showToast('انتهت التلاوة');return;}
  const item=queue[qIdx];
  document.getElementById('repeatText').textContent=item.repeat+' / '+S.repeat;
  audio.src=`https://everyayah.com/data/${S.reciter.folder}/${pad(item.surah)}${pad(item.ayah)}.mp3`;
  audio.playbackRate=S.speed;
  audio.play().catch(()=>{});
  showAyahText(item.surah,item.ayah);
}
audio.onended=function(){if(!S.playing)return;qIdx++;playItem();};
audio.ontimeupdate=function(){
  if(!audio.duration)return;
  document.getElementById('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('curTime').textContent=fmtTime(audio.currentTime);
  document.getElementById('durTime').textContent=fmtTime(audio.duration);
};
function seek(e){
  const r=document.getElementById('progressBar').getBoundingClientRect();
  audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
}
function updatePlayBtn(){
  const b=document.getElementById('playBtn');
  const p=document.getElementById('iconPlay');
  const s=document.getElementById('iconStop');
  if(S.playing){b.classList.add('stop-mode');p.style.display='none';s.style.display='block';}
  else{b.classList.remove('stop-mode');p.style.display='block';s.style.display='none';}
}
</script>
