<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>التكرار | زاد المسلم</title>
<link rel="icon" href="../icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-image: url('../images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.45);
  --text-primary: #0F172A; --text-secondary: #475569;
  --accent-main: #10B981; --accent-muted: rgba(16, 185, 129, 0.15);
  --glass: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
  --overlay: rgba(255, 255, 255, 0.2); --modal-overlay: rgba(0, 0, 0, 0.3);
  --list-hover: rgba(0, 0, 0, 0.05); --gold: #9a7b1f; --gold-soft: rgba(154,123,31,.12);
  --danger: #ef4444;
}
[data-theme="dark"] {
  --bg-image: url('../images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5);
  --text-primary: #F8FAFC; --text-secondary: #CBD5E1;
  --accent-main: #10B981; --accent-muted: rgba(255, 255, 255, 0.1);
  --glass: rgba(30, 41, 59, 0.6); --glass-border: rgba(255, 255, 255, 0.1);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.5); --modal-overlay: rgba(0, 0, 0, 0.7);
  --list-hover: rgba(255, 255, 255, 0.05); --gold: #e6c068; --gold-soft: rgba(230,192,104,.15);
  --danger: #f87171;
}
[data-theme="sepia"] {
  --bg-image: url('../images/background-sepia.png');
  --bg-surface: rgba(244, 236, 216, 0.55);
  --text-primary: #3c2a18; --text-secondary: #7a6244;
  --accent-main: #8a5a1c; --accent-muted: rgba(138, 90, 28, 0.12);
  --glass: rgba(252, 247, 234, 0.65); --glass-border: rgba(244, 236, 216, 0.7);
  --glass-shadow: 0 8px 32px 0 rgba(90, 60, 20, 0.1);
  --overlay: rgba(244, 236, 216, 0.2); --modal-overlay: rgba(0, 0, 0, 0.3);
  --list-hover: rgba(122, 84, 24, 0.06); --gold: #9a6b1f; --gold-soft: rgba(154,107,31,.12);
  --danger: #c0392b;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface); background-image: var(--bg-image);
  background-size: cover; background-position: center; background-attachment: fixed;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: calc(max(12px, env(safe-area-inset-top)) + 30px) 20px 100px;
  min-height: 100dvh; transition: color 0.4s, background-image 0.4s;
}
body::before { content:''; position:fixed; inset:0; background:var(--overlay); z-index:-1; }

.app { width:100%; max-width:480px; display:flex; flex-direction:column; gap:12px; }

/* Header */
.header {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:16px; padding:12px 16px;
}
.header-title { font-weight:bold; font-size:18px; }
.icon-btn {
  background:none; border:none; color:var(--text-primary); cursor:pointer;
  padding:5px; display:flex; align-items:center; justify-content:center; transition:.2s;
  font-size:18px;
}
.icon-btn:active { opacity:.7; transform:scale(.9); }

/* Cards */
.card {
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow); border-radius:20px; padding:15px;
  display:flex; flex-direction:column; gap:8px;
  transition: opacity .3s, border-color .3s;
}
.card.disabled { opacity:.45; pointer-events:none; }
label { font-size:14px; color:var(--accent-main); font-weight:bold; }

/* Toggle Row */
.toggle-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.toggle-label { font-size:14px; font-weight:700; color:var(--text-primary); }
.toggle-desc { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.switch {
  position:relative; width:50px; height:28px; flex-shrink:0;
  background:rgba(150,150,150,.3); border-radius:32px;
  cursor:pointer; transition:.3s;
}
.switch.active { background:var(--accent-main); }
.switch::after {
  content:''; width:22px; height:22px; background:#fff; border-radius:50%;
  position:absolute; top:3px; left:3px; transition:transform .3s;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.switch.active::after { transform:translateX(22px); }

/* Picker Button */
.custom-select-btn {
  padding:14px 16px; border-radius:12px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-size:15px;
  font-family:inherit; cursor:pointer; display:flex; justify-content:space-between;
  align-items:center; font-weight:500; transition:.3s; gap:10px;
}
.custom-select-btn span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.custom-select-btn:after { content:'\25BC'; font-size:12px; opacity:.6; flex-shrink:0; }
.custom-select-btn.has-value { border-color:var(--accent-main); color:var(--accent-main); }

/* Stepper */
.stepper { display:flex; align-items:center; gap:20px; justify-content:center; }
.stepper-btn {
  width:44px; height:44px; border-radius:50%; background:var(--accent-muted);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:22px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s;
}
.stepper-btn:active { transform:scale(.88); background:var(--accent-main); color:#fff; }
.stepper-val { font-size:28px; font-weight:800; min-width:50px; text-align:center; direction:ltr; font-variant-numeric:tabular-nums; }
.stepper-lbl { font-size:12px; color:var(--text-secondary); text-align:center; margin-top:-4px; }

/* Speed Presets */
.speed-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; justify-content:center; }
.speed-chip {
  padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700;
  background:var(--list-hover); border:1px solid var(--glass-border);
  color:var(--text-secondary); cursor:pointer; transition:.2s;
}
.speed-chip:active { transform:scale(.92); }
.speed-chip.active { background:var(--accent-main); color:#fff; border-color:var(--accent-main); }

/* Ayah Text Display */
.ayah-display {
  background:var(--glass); border:1px solid var(--gold-soft);
  backdrop-filter:blur(16px); border-radius:20px; padding:20px;
  text-align:center; min-height:80px; display:none;
  box-shadow:var(--glass-shadow);
}
.ayah-display.visible { display:block; animation:fadeIn .4s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
.ayah-arabic {
  font-family:'Amiri', serif; font-size:26px; line-height:2;
  color:var(--text-primary); word-spacing:2px;
}
.ayah-ref {
  font-size:12px; color:var(--gold); font-weight:700; margin-top:10px;
  padding:4px 12px; border-radius:12px; background:var(--gold-soft); display:inline-block;
}
.ayah-loading { color:var(--text-secondary); font-size:14px; padding:20px; }

/* Status */
.status-bar {
  text-align:center; padding:8px 16px; border-radius:30px;
  background:var(--list-hover); border:1px solid var(--glass-border);
  font-size:12px; font-weight:700; color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:.3s;
}
.status-bar.playing { background:var(--accent-muted); border-color:var(--accent-main); color:var(--accent-main); }
.status-bar.error { background:rgba(239,68,68,.12); border-color:var(--danger); color:var(--danger); }
.status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.status-bar.playing .status-dot { animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* Progress */
.progress-wrap { display:none; width:100%; }
.progress-wrap.visible { display:block; }
.progress-container { display:flex; align-items:center; gap:12px; width:100%; direction:ltr; }
.time { font-size:12px; color:var(--text-secondary); width:45px; text-align:center; font-variant-numeric:tabular-nums; }
.progress-bar { flex:1; height:18px; display:flex; align-items:center; position:relative; cursor:pointer; }
.progress-track { width:100%; height:6px; background:rgba(128,128,128,.25); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent-main); border-radius:3px; width:0%; transition:width .15s linear; }

/* Play */
.play-area { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:8px; }
.play-controls { display:flex; align-items:center; justify-content:center; gap:22px; }
.play-pause-btn {
  width:72px; height:72px; border-radius:50%; background:var(--accent-main); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 6px 20px rgba(16,185,129,.45); transition:transform .2s, box-shadow .3s;
}
.play-pause-btn:active { transform:scale(.92); }
.play-pause-btn svg { width:30px; height:30px; fill:currentColor; }
.ctrl-btn {
  width:46px; height:46px; border-radius:50%; background:var(--list-hover);
  border:1px solid var(--glass-border); color:var(--text-primary);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:opacity .25s, transform .2s; opacity:0; pointer-events:none; transform:scale(.7);
}
.ctrl-btn.visible { opacity:1; pointer-events:auto; transform:scale(1); }
.ctrl-btn svg { width:20px; height:20px; fill:currentColor; }
.ctrl-btn:active { transform:scale(.9); }
.ctrl-spacer { width:46px; height:46px; }
.spinner { width:28px; height:28px; border:3px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{ transform:rotate(360deg); } }

/* Repeat Counter */
.repeat-counter {
  font-size:13px; font-weight:700; color:var(--gold);
  background:var(--gold-soft); padding:6px 16px; border-radius:20px;
  display:none; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
}
.repeat-counter.visible { display:flex; }
.repeat-badge {
  padding:2px 8px; border-radius:8px; font-size:11px; font-weight:700;
  background:var(--accent-muted); color:var(--accent-main);
}

/* Toast */
.toast {
  position:fixed; top:20px; left:50%; transform:translate(-50%,-120px);
  background:var(--accent-main); color:#fff; padding:12px 24px; border-radius:30px;
  font-size:14px; font-weight:bold; z-index:100000; transition:.4s;
  box-shadow:0 4px 15px rgba(0,0,0,.2); max-width:90vw; text-align:center;
}
.toast.show { transform:translate(-50%,0); }
.toast.error { background:var(--danger); }

/* Bottom Sheet */
.sheet-overlay {
  position:fixed; inset:0; background:var(--modal-overlay);
  backdrop-filter:blur(8px); z-index:9998; opacity:0; pointer-events:none; transition:.3s;
}
.sheet-overlay.active { opacity:1; pointer-events:all; }
.bottom-sheet {
  position:fixed; bottom:0; left:0; right:0; max-height:85vh;
  background:var(--glass); backdrop-filter:blur(35px); -webkit-backdrop-filter:blur(35px);
  border-top:1px solid var(--glass-border); border-radius:30px 30px 0 0;
  transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.9,.4,1.1);
  z-index:10000; display:flex; flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,20px); box-shadow:0 -10px 40px rgba(0,0,0,.2);
}
.bottom-sheet.active { transform:translateY(0); }
.drag-handle { width:40px; height:5px; background:rgba(150,150,150,.4); border-radius:10px; margin:12px auto; flex-shrink:0; }
.sheet-header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px 15px; border-bottom:1px solid var(--glass-border); flex-shrink:0; }
.sheet-header h2 { font-size:1.4rem; margin:0; font-weight:800; }
.sheet-content { padding:15px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; flex:1; }
.sheet-search {
  width:100%; padding:14px; border-radius:14px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-family:inherit;
  font-size:15px; outline:none; transition:.2s; margin-bottom:5px;
}
.sheet-search:focus { border-color:var(--accent-main); }
.sheet-item {
  padding:16px 15px; border-radius:16px; background:var(--list-hover);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:16px;
  font-weight:bold; cursor:pointer; transition:.2s; text-align:center;
}
.sheet-item:active { transform:scale(.98); }
.sheet-item.selected { background:var(--accent-main); color:#fff; border-color:var(--accent-main); box-shadow:0 4px 15px rgba(16,185,129,.3); }

/* Ayah Picker Inline */
.ayah-picker-inline { display:none; }
.ayah-picker-inline.visible { display:flex; flex-direction:column; gap:10px; }
.ayah-input-row { display:flex; align-items:center; gap:10px; }
.ayah-input-row label { font-size:13px; color:var(--accent-main); font-weight:700; white-space:nowrap; }
.ayah-num-input {
  width:60px; padding:10px 8px; border-radius:10px; border:1px solid var(--glass-border);
  background:var(--list-hover); color:var(--text-primary); font-size:16px; font-weight:700;
  text-align:center; font-family:inherit; outline:none; transition:.2s; direction:ltr;
}
.ayah-num-input:focus { border-color:var(--accent-main); }
.ayah-range-label { font-size:13px; color:var(--text-secondary); font-weight:600; }
.ayah-grid-unified { display:grid; grid-template-columns:repeat(8,1fr); gap:5px; max-height:200px; overflow-y:auto; }
.ayah-grid-unified::-webkit-scrollbar { width:4px; }
.ayah-grid-unified::-webkit-scrollbar-thumb { background:var(--accent-main); border-radius:4px; }
.ayah-cell-unified {
  padding:8px 2px; border-radius:8px; background:var(--list-hover);
  border:1px solid var(--glass-border); color:var(--text-primary); font-size:12px;
  font-weight:600; cursor:pointer; text-align:center; transition:.15s;
}
.ayah-cell-unified:active { transform:scale(.88); }
.ayah-cell-unified.selected { background:var(--accent-main); color:#fff; border-color:var(--accent-main); }
.ayah-cell-unified.in-range { background:var(--accent-muted); border-color:var(--accent-main); }
.ayah-confirm-btn {
  padding:12px; border-radius:14px; border:none; background:var(--accent-main);
  color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
  transition:.2s; box-shadow:0 4px 15px rgba(16,185,129,.3);
}
.ayah-confirm-btn:active { transform:scale(.96); }
.ayah-confirm-btn:disabled { opacity:.4; cursor:default; transform:none; }

/* Section Label */
.section-label {
  font-size:11px; font-weight:700; color:var(--text-secondary);
  text-transform:uppercase; letter-spacing:1px; margin-top:4px;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

<!-- Reciter Sheet -->
<div class="bottom-sheet" id="reciterSheet">
  <div class="drag-handle"></div>
  <div class="sheet-header"><h2>اختر القارئ</h2><button class="icon-btn" onclick="closeSheet()">✕</button></div>
  <div class="sheet-content" id="reciterList"></div>
</div>

<!-- Surah Sheet -->
<div class="bottom-sheet" id="surahSheet">
  <div class="drag-handle"></div>
  <div class="sheet-header"><h2>اختر السورة</h2><button class="icon-btn" onclick="closeSheet()">✕</button></div>
  <div class="sheet-content">
    <input type="text" class="sheet-search" id="surahSearch" placeholder="ابحث عن سورة..." oninput="filterSurahs()">
    <div id="surahList"></div>
  </div>
</div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <a href="/Tasbee7/index.html" class="icon-btn" title="الرئيسية" style="text-decoration:none;">🏠</a>
    <div class="header-title" style="position:absolute;left:50%;transform:translateX(-50%);">التكرار</div>
    <button class="icon-btn" onclick="cycleTheme()" title="المظهر">🌗</button>
  </div>

  <!-- Reciter -->
  <div class="card">
    <label>القارئ</label>
    <button class="custom-select-btn" id="reciterBtn" onclick="openSheet('reciter')">
      <span>اختر القارئ...</span>
    </button>
  </div>

  <!-- Surah -->
  <div class="card">
    <label>السورة</label>
    <button class="custom-select-btn" id="surahBtn" onclick="openSheet('surah')">
      <span>اختر السورة...</span>
    </button>
  </div>

  <!-- ===== تكرار النطاق ===== -->
  <div class="card" id="rangeCard">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">تكرار النطاق</div>
        <div class="toggle-desc">تكرار نطاق من الآيات عدة مرات</div>
      </div>
      <div class="switch" id="rangeSwitch" onclick="toggleRange()"></div>
    </div>
    <div id="rangeSettings" style="display:none;">
      <div class="ayah-picker-inline visible" id="ayahPickerInline">
        <div class="ayah-input-row">
          <label>من</label>
          <input type="number" class="ayah-num-input" id="ayahFromInput" min="1" value="1" oninput="onAyahInput('from')">
          <span class="ayah-range-label">إلى</span>
          <input type="number" class="ayah-num-input" id="ayahToInput" min="1" value="1" oninput="onAyahInput('to')">
        </div>
        <div class="ayah-grid-unified" id="ayahUnifiedGrid"></div>
        <button class="ayah-confirm-btn" id="ayahConfirmBtn" onclick="confirmAyahRange()">تأكيد النطاق</button>
      </div>
      <div style="height:4px;"></div>
      <label>عدد تكرار النطاق</label>
      <div class="stepper">
        <button class="stepper-btn" onclick="adjustRangeRepeat(-1)">−</button>
        <div><div class="stepper-val" id="rangeRepeatVal">3</div><div class="stepper-lbl">مرة</div></div>
        <button class="stepper-btn" onclick="adjustRangeRepeat(1)">+</button>
      </div>
    </div>
  </div>

  <!-- ===== تكرار الآية ===== -->
  <div class="card" id="ayahCard">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">تكرار الآية</div>
        <div class="toggle-desc">تكرار كل آية عدة مرات قبل الانتقال للتالية</div>
      </div>
      <div class="switch" id="ayahSwitch" onclick="toggleAyahRepeat()"></div>
    </div>
    <div id="ayahSettings" style="display:none;">
      <label>عدد تكرار الآية</label>
      <div class="stepper">
        <button class="stepper-btn" onclick="adjustAyahRepeat(-1)">−</button>
        <div><div class="stepper-val" id="ayahRepeatVal">3</div><div class="stepper-lbl">مرة</div></div>
        <button class="stepper-btn" onclick="adjustAyahRepeat(1)">+</button>
      </div>
    </div>
  </div>

  <!-- Speed -->
  <div class="card">
    <label>سرعة التلاوة</label>
    <div class="stepper">
      <button class="stepper-btn" onclick="adjustSpeed(-0.1)">−</button>
      <div><div class="stepper-val" id="speedVal">1.0x</div><div class="stepper-lbl">سرعة</div></div>
      <button class="stepper-btn" onclick="adjustSpeed(0.1)">+</button>
    </div>
    <div class="speed-grid" id="speedGrid">
      <button class="speed-chip" data-speed="0.5" onclick="setSpeed(0.5)">0.5x</button>
      <button class="speed-chip" data-speed="0.75" onclick="setSpeed(0.75)">0.75x</button>
      <button class="speed-chip active" data-speed="1" onclick="setSpeed(1)">1x</button>
      <button class="speed-chip" data-speed="1.25" onclick="setSpeed(1.25)">1.25x</button>
      <button class="speed-chip" data-speed="1.5" onclick="setSpeed(1.5)">1.5x</button>
      <button class="speed-chip" data-speed="2" onclick="setSpeed(2)">2x</button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot"></span>
    <span id="statusText">جاهز للتشغيل</span>
  </div>

  <!-- Ayah Text Display -->
  <div class="ayah-display" id="ayahDisplay">
    <div class="ayah-arabic" id="ayahText"></div>
    <div class="ayah-ref" id="ayahRef"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-container">
      <span class="time" id="curTime">0:00</span>
      <div class="progress-bar" id="progressBar" onclick="seek(event)">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <span class="time" id="durTime">0:00</span>
    </div>
  </div>

  <!-- Play -->
  <div class="play-area">
    <div class="repeat-counter" id="repeatCounter">
      <span id="repeatText"></span>
    </div>
    <div class="play-controls">
      <button class="ctrl-btn" id="stopBtn" onclick="stopPlay()" title="إيقاف وإعادة">
        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
      </button>
      <button class="play-pause-btn" id="playBtn" onclick="togglePlay()">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        <span id="iconSpin" class="spinner" style="display:none;"></span>
      </button>
      <div class="ctrl-spacer"></div>
    </div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const RECITERS = [
  { id:'arabassy',  name:'عبد الباسط عبد الصمد', folder:'Abdul_Basit_Murattal_192kbps' },
  { id:'afasy',     name:'مشاري العفاسي',        folder:'Alafasy_128kbps' },
  { id:'husary',    name:'محمود خليل الحصري',    folder:'Husary_128kbps' },
  { id:'minshawi',  name:'محمد صديق المنشاوي',   folder:'Minshawy_Murattal_128kbps' },
  { id:'shuraym',   name:'سعود الشريم',          folder:'Saood_ash-Shuraym_128kbps' },
  { id:'sudais',    name:'عبد الرحمن السديس',    folder:'Abdurrahmaan_As-Sudais_192kbps' },
  { id:'ghamdi',    name:'سعد الغامدي',          folder:'Ghamadi_40kbps' },
  { id:'ajamy',     name:'أحمد العجمي',          folder:'Ahmed_ibn_Ali_al-Ajamy_128kbps_ketaballah.net' },
  { id:'muaiqly',   name:'ماهر المعيقلي',        folder:'MaherAlMuaiqly128kbps' },
  { id:'dosary',    name:'ياسر الدوسري',         folder:'Yasser_Ad-Dussary_128kbps' },
  { id:'shatiri',   name:'أبو بكر الشاطري',      folder:'Abu_Bakr_Ash-Shaatree_128kbps' },
  { id:'bukhatyr',  name:'صلاح بوخاطر',          folder:'Salaah_AbdulRahman_Bukhatir_128kbps' },
  { id:'basfar',    name:'عبد الله بصفر',        folder:'Abdullah_Basfar_192kbps' },
  { id:'ayyoub',    name:'محمد أيوب',            folder:'Muhammad_Ayyoub_128kbps' },
  { id:'qatami',    name:'ناصر القطامي',         folder:'Nasser_Alqatami_128kbps' },
  { id:'jibreel',   name:'محمد جبريل',           folder:'Muhammad_Jibreel_128kbps' },
  { id:'hudhaify',  name:'علي الحذيفي',          folder:'Hudhaify_128kbps' },
  { id:'budair',    name:'صلاح البدير',          folder:'Salah_Al_Budair_128kbps' },
];

const SURAH_NAMES = [
  'الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس',
  'هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه',
  'الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم',
  'لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر',
  'فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق',
  'الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة',
  'الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج',
  'نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس',
  'التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد',
  'الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات',
  'القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر',
  'المسد','الإخلاص','الفلق','الناس'
];

const AYAH_COUNTS = [
  7,286,200,176,120,165,206,75,129,109,123,111,43,52,99,128,111,110,98,135,
  112,78,118,64,77,227,93,88,69,60,34,30,73,54,45,83,182,88,75,85,
  54,53,89,59,37,35,38,29,18,45,60,49,62,55,78,96,29,22,24,13,
  14,11,11,18,12,12,30,52,52,44,28,28,20,56,40,31,50,40,46,42,
  29,19,36,25,22,17,19,26,30,20,15,21,11,8,8,19,5,8,8,11,
  11,8,3,9,5,4,7,3,6,3,5,4,5,6
];

/* ---------- State ---------- */
let S = {
  reciter: null,
  surah: null,
  ayahFrom: 1,
  ayahTo: 1,
  rangeEnabled: false,
  rangeRepeat: 3,
  ayahRepeatEnabled: false,
  ayahRepeat: 3,
  speed: 1,
  state: 'idle'
};
// state: 'idle' | 'loading' | 'playing' | 'paused'
let queue = [], qIdx = 0, errCount = 0;
const audio = document.getElementById('audio');

/* ---------- Persistence ---------- */
function savePrefs() {
  try {
    localStorage.setItem('takrarPrefs', JSON.stringify({
      reciter: S.reciter ? S.reciter.id : null,
      rangeEnabled: S.rangeEnabled, rangeRepeat: S.rangeRepeat,
      ayahRepeatEnabled: S.ayahRepeatEnabled, ayahRepeat: S.ayahRepeat,
      speed: S.speed
    }));
  } catch(e) {}
}
function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('takrarPrefs') || '{}');
    if (p.reciter) { const r = RECITERS.find(x => x.id === p.reciter); if (r) S.reciter = r; }
    if (p.rangeRepeat) S.rangeRepeat = Math.max(1, Math.min(99, p.rangeRepeat));
    if (p.ayahRepeat) S.ayahRepeat = Math.max(1, Math.min(99, p.ayahRepeat));
    if (p.rangeEnabled !== undefined) S.rangeEnabled = !!p.rangeEnabled;
    if (p.ayahRepeatEnabled !== undefined) S.ayahRepeatEnabled = !!p.ayahRepeatEnabled;
    if (p.speed) S.speed = Math.max(0.5, Math.min(3, p.speed));
  } catch(e) {}
}

/* ---------- Theme ---------- */
const THEMES = ['dark', 'light', 'sepia'];
let tIdx = parseInt(localStorage.getItem('appThemeIdx')) || 0;
function applyTheme() { document.documentElement.setAttribute('data-theme', THEMES[tIdx]); localStorage.setItem('appThemeIdx', tIdx); }
function cycleTheme() { tIdx = (tIdx + 1) % THEMES.length; applyTheme(); }
applyTheme();

/* ---------- Helpers ---------- */
function pad(n) { return String(n).padStart(3, '0'); }
function fmtTime(s) { if (!isFinite(s)) return '0:00'; const m = Math.floor(s / 60); return m + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }
function showToast(m, isErr) { const t = document.getElementById('toast'); t.textContent = m; t.classList.toggle('error', !!isErr); t.classList.add('show'); clearTimeout(showToast._t); showToast._t = setTimeout(() => t.classList.remove('show'), 3000); }

/* ---------- Sheets ---------- */
let curSheet = null;
function openSheet(type) {
  curSheet = type;
  document.getElementById('sheetOverlay').classList.add('active');
  document.getElementById(type + 'Sheet').classList.add('active');
  if (type === 'reciter') renderReciters();
  else if (type === 'surah') renderSurahs();
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('active');
  if (curSheet) document.getElementById(curSheet + 'Sheet').classList.remove('active');
  curSheet = null;
}

/* ---------- Reciters ---------- */
function renderReciters() {
  document.getElementById('reciterList').innerHTML = RECITERS.map(r =>
    `<div class="sheet-item ${S.reciter && S.reciter.id === r.id ? 'selected' : ''}" onclick="pickReciter('${r.id}')">${r.name}</div>`
  ).join('');
}
function pickReciter(id) {
  if (S.state !== 'idle') stopPlay();
  S.reciter = RECITERS.find(r => r.id === id);
  const btn = document.getElementById('reciterBtn');
  btn.classList.add('has-value');
  btn.querySelector('span').textContent = S.reciter.name;
  savePrefs();
  closeSheet();
}

/* ---------- Surahs ---------- */
function normalize(t) { return (t || '').replace(/[\u064B-\u065F\u0670]/g, '').replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/ـ/g, ''); }
function renderSurahs(f = '') {
  const n = normalize(f);
  document.getElementById('surahList').innerHTML = SURAH_NAMES
    .map((nm, i) => ({ nm, num: i + 1 })).filter(s => !n || normalize(s.nm).includes(n))
    .map(s => `<div class="sheet-item ${S.surah === s.num ? 'selected' : ''}" onclick="pickSurah(${s.num})"><span style="color:var(--accent-main);font-weight:800;margin-inline-start:8px;">${s.num}</span>${s.nm}</div>`).join('');
}
function filterSurahs() { renderSurahs(document.getElementById('surahSearch').value); }
function pickSurah(n) {
  if (S.state !== 'idle') stopPlay();
  S.surah = n;
  S.ayahFrom = 1;
  S.ayahTo = AYAH_COUNTS[n - 1];
  const btn = document.getElementById('surahBtn');
  btn.classList.add('has-value');
  btn.querySelector('span').textContent = SURAH_NAMES[n - 1];
  if (S.rangeEnabled) showInlinePicker();
  closeSheet();
}

/* ---------- Range Toggle ---------- */
function toggleRange() {
  S.rangeEnabled = !S.rangeEnabled;
  document.getElementById('rangeSwitch').classList.toggle('active', S.rangeEnabled);
  document.getElementById('rangeSettings').style.display = S.rangeEnabled ? '' : 'none';
  if (S.rangeEnabled && S.surah) showInlinePicker();
  savePrefs();
}

/* ---------- Ayah Repeat Toggle ---------- */
function toggleAyahRepeat() {
  S.ayahRepeatEnabled = !S.ayahRepeatEnabled;
  document.getElementById('ayahSwitch').classList.toggle('active', S.ayahRepeatEnabled);
  document.getElementById('ayahSettings').style.display = S.ayahRepeatEnabled ? '' : 'none';
  savePrefs();
}

/* ---------- Inline Ayah Picker ---------- */
function showInlinePicker() {
  if (!S.surah) return;
  const cnt = AYAH_COUNTS[S.surah - 1] || 1;
  const picker = document.getElementById('ayahPickerInline');
  picker.classList.add('visible');
  const fromIn = document.getElementById('ayahFromInput');
  const toIn = document.getElementById('ayahToInput');
  fromIn.max = cnt; toIn.max = cnt;
  fromIn.value = S.ayahFrom; toIn.value = S.ayahTo;
  renderUnifiedGrid();
}
function onAyahInput(which) {
  if (!S.surah) return;
  const cnt = AYAH_COUNTS[S.surah - 1] || 1;
  const fromIn = document.getElementById('ayahFromInput');
  const toIn = document.getElementById('ayahToInput');
  let v = parseInt(which === 'from' ? fromIn.value : toIn.value) || 1;
  v = Math.max(1, Math.min(cnt, v));
  if (which === 'from') {
    S.ayahFrom = v;
    if (S.ayahTo < v) { S.ayahTo = v; toIn.value = v; }
  } else {
    S.ayahTo = v;
    if (S.ayahFrom > v) { S.ayahFrom = v; fromIn.value = v; }
  }
  renderUnifiedGrid();
}
function renderUnifiedGrid() {
  if (!S.surah) return;
  const cnt = AYAH_COUNTS[S.surah - 1] || 1;
  const grid = document.getElementById('ayahUnifiedGrid');
  grid.innerHTML = Array.from({ length: cnt }, (_, i) => {
    const n = i + 1;
    let cls = 'ayah-cell-unified';
    if (n === S.ayahFrom || n === S.ayahTo) cls += ' selected';
    else if (n > S.ayahFrom && n < S.ayahTo) cls += ' in-range';
    return `<div class="${cls}" onclick="pickUnifiedAyah(${n})">${n}</div>`;
  }).join('');
}
function pickUnifiedAyah(n) {
  if (Math.abs(n - S.ayahFrom) <= Math.abs(n - S.ayahTo)) {
    S.ayahFrom = n;
    if (S.ayahTo < S.ayahFrom) S.ayahTo = S.ayahFrom;
  } else {
    S.ayahTo = n;
    if (S.ayahFrom > S.ayahTo) S.ayahFrom = S.ayahTo;
  }
  document.getElementById('ayahFromInput').value = S.ayahFrom;
  document.getElementById('ayahToInput').value = S.ayahTo;
  renderUnifiedGrid();
}
function confirmAyahRange() {
  if (!S.surah) return;
  const btn = document.getElementById('ayahConfirmBtn');
  btn.textContent = '✓ تم التأكيد';
  btn.style.background = 'var(--gold)';
  setTimeout(() => { btn.textContent = 'تأكيد النطاق'; btn.style.background = ''; }, 1200);
  showToast(`من آية ${S.ayahFrom} إلى آية ${S.ayahTo}`);
}

/* ---------- Repeat Adjusters ---------- */
function adjustRangeRepeat(d) {
  S.rangeRepeat = Math.max(1, Math.min(99, S.rangeRepeat + d));
  document.getElementById('rangeRepeatVal').textContent = S.rangeRepeat;
  savePrefs();
}
function adjustAyahRepeat(d) {
  S.ayahRepeat = Math.max(1, Math.min(99, S.ayahRepeat + d));
  document.getElementById('ayahRepeatVal').textContent = S.ayahRepeat;
  savePrefs();
}

/* ---------- Speed ---------- */
function adjustSpeed(d) { S.speed = Math.max(0.5, Math.min(3, Math.round((S.speed + d) * 10) / 10)); audio.playbackRate = S.speed; updateSpeedUI(); savePrefs(); }
function setSpeed(v) { S.speed = v; audio.playbackRate = v; updateSpeedUI(); savePrefs(); }
function updateSpeedUI() {
  document.getElementById('speedVal').textContent = S.speed.toFixed(1) + 'x';
  document.querySelectorAll('.speed-chip').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.speed) === S.speed));
}

/* ---------- Ayah Text ---------- */
const ayahCache = {};
async function fetchAyahText(surah, ayah) {
  const key = surah + ':' + ayah;
  if (ayahCache[key] !== undefined) return ayahCache[key];
  try {
    const r = await fetch(`https://api.quran.com/api/v4/verses/by_key/${surah}:${ayah}?language=ar&fields=text_uthmani`);
    if (!r.ok) throw 0;
    const d = await r.json();
    const text = d.verse && d.verse.text_uthmani ? d.verse.text_uthmani : '';
    ayahCache[key] = text;
    return text;
  } catch(e) { return ''; }
}
async function showAyahText(surah, ayah) {
  const disp = document.getElementById('ayahDisplay');
  const txt = document.getElementById('ayahText');
  const ref = document.getElementById('ayahRef');
  disp.classList.add('visible');
  txt.innerHTML = '<div class="ayah-loading">جاري تحميل الآية...</div>';
  ref.textContent = `${SURAH_NAMES[surah - 1]} - آية ${ayah}`;
  const myToken = ++showAyahText._t;
  const text = await fetchAyahText(surah, ayah);
  if (myToken !== showAyahText._t) return;
  txt.textContent = text || '(تعذّر تحميل نص الآية)';
}
showAyahText._t = 0;

/* ---------- Queue / Playback ---------- */
function buildQueue() {
  const q = [];
  const hasRange = S.rangeEnabled;
  const hasAyah = S.ayahRepeatEnabled;

  if (hasRange && hasAyah) {
    // Combined: for each ayah in range, repeat it ayahRepeat times, then repeat the whole range rangeRepeat times
    for (let r = 0; r < S.rangeRepeat; r++) {
      for (let a = S.ayahFrom; a <= S.ayahTo; a++) {
        for (let ar = 0; ar < S.ayahRepeat; ar++) {
          q.push({ surah: S.surah, ayah: a, round: r + 1, ayahRound: ar + 1 });
        }
      }
    }
  } else if (hasRange) {
    // Range only: repeat the range rangeRepeat times
    for (let r = 0; r < S.rangeRepeat; r++) {
      for (let a = S.ayahFrom; a <= S.ayahTo; a++) {
        q.push({ surah: S.surah, ayah: a, round: r + 1 });
      }
    }
  } else if (hasAyah) {
    // Ayah only: repeat single ayah ayahRepeat times
    for (let ar = 0; ar < S.ayahRepeat; ar++) {
      q.push({ surah: S.surah, ayah: S.ayahFrom, ayahRound: ar + 1 });
    }
  } else {
    // Neither enabled: play once
    for (let a = S.ayahFrom; a <= S.ayahTo; a++) {
      q.push({ surah: S.surah, ayah: a });
    }
  }
  return q;
}

function togglePlay() {
  if (S.state === 'playing') {
    audio.pause(); setState('paused');
    setStatus('متوقف مؤقتًا'); return;
  }
  if (S.state === 'paused') {
    audio.play().then(() => setState('playing')).catch(() => showToast('اضغط مرة أخرى للتشغيل'));
    return;
  }
  // idle -> start
  if (!S.reciter || !S.surah) { showToast('اختر القارئ والسورة أولاً'); return; }
  errCount = 0; queue = buildQueue(); qIdx = 0;
  if (queue.length === 0) { showToast('اختر نطاق التكرار أو فعّل تكرار الآية'); return; }
  document.getElementById('progressWrap').classList.add('visible');
  document.getElementById('repeatCounter').classList.add('visible');
  document.getElementById('stopBtn').classList.add('visible');
  playItem();
}

function stopPlay() {
  setState('idle'); audio.pause();
  try { audio.removeAttribute('src'); audio.load(); } catch(e) {}
  queue = []; qIdx = 0;
  document.getElementById('progressWrap').classList.remove('visible');
  document.getElementById('repeatCounter').classList.remove('visible');
  document.getElementById('stopBtn').classList.remove('visible');
  document.getElementById('ayahDisplay').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('curTime').textContent = '0:00';
  document.getElementById('durTime').textContent = '0:00';
  setStatus('جاهز للتشغيل');
}

function updateRepeatDisplay(item) {
  const hasRange = S.rangeEnabled;
  const hasAyah = S.ayahRepeatEnabled;
  let parts = [];

  if (hasRange && item.round) {
    parts.push(`<span class="repeat-badge">النطاق: ${item.round}/${S.rangeRepeat}</span>`);
  }
  if (hasAyah && item.ayahRound) {
    parts.push(`<span class="repeat-badge">الآية: ${item.ayahRound}/${S.ayahRepeat}</span>`);
  }
  if (parts.length === 0) {
    parts.push(`<span>${qIdx + 1} / ${queue.length}</span>`);
  }
  document.getElementById('repeatText').innerHTML = parts.join('');
}

function playItem() {
  if (qIdx >= queue.length) {
    stopPlay(); showToast('انتهت التلاوة 🤲'); return;
  }
  const item = queue[qIdx];
  updateRepeatDisplay(item);
  setState('loading');
  setStatus(`${SURAH_NAMES[item.surah - 1]} • آية ${item.ayah}`);
  audio.src = `https://everyayah.com/data/${S.reciter.folder}/${pad(item.surah)}${pad(item.ayah)}.mp3`;
  audio.playbackRate = S.speed;
  audio.play().catch(() => {
    setState('paused');
    setStatus('اضغط للتشغيل');
  });
  showAyahText(item.surah, item.ayah);
  updateMediaSession(item);
}

/* ---------- Audio events ---------- */
audio.addEventListener('playing', () => { if (S.state !== 'idle') { setState('playing'); const it = queue[qIdx]; if (it) setStatus(`${SURAH_NAMES[it.surah - 1]} • آية ${it.ayah}`); } });
audio.addEventListener('waiting', () => { if (S.state === 'playing') setState('loading'); });
audio.addEventListener('ended', () => { if (S.state === 'idle') return; errCount = 0; qIdx++; playItem(); });
audio.addEventListener('error', () => {
  if (S.state === 'idle' || !audio.src) return;
  errCount++;
  if (errCount >= 3) {
    stopPlay();
    setStatus('تعذّر تحميل التلاوة', true);
    showToast('تعذّر تحميل ملفات هذا القارئ، جرّب قارئًا آخر', true);
    return;
  }
  qIdx++; playItem();
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('progressFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
  document.getElementById('curTime').textContent = fmtTime(audio.currentTime);
  document.getElementById('durTime').textContent = fmtTime(audio.duration);
});

function seek(e) {
  if (!audio.duration) return;
  const r = document.getElementById('progressBar').getBoundingClientRect();
  const ratio = (e.clientX - r.left) / r.width;
  audio.currentTime = Math.max(0, Math.min(1, ratio)) * audio.duration;
}

/* ---------- UI state ---------- */
function setState(s) {
  S.state = s;
  const p = document.getElementById('iconPlay');
  const pa = document.getElementById('iconPause');
  const sp = document.getElementById('iconSpin');
  const bar = document.getElementById('statusBar');
  p.style.display = pa.style.display = sp.style.display = 'none';
  bar.classList.remove('playing', 'error');
  if (s === 'loading') { sp.style.display = 'block'; }
  else if (s === 'playing') { pa.style.display = 'block'; bar.classList.add('playing'); }
  else { p.style.display = 'block'; }
}
function setStatus(t, isErr) {
  document.getElementById('statusText').textContent = t;
  const bar = document.getElementById('statusBar');
  if (isErr) bar.classList.add('error');
}

/* ---------- Media Session ---------- */
function updateMediaSession(item) {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: `${SURAH_NAMES[item.surah - 1]} • آية ${item.ayah}`,
      artist: S.reciter ? S.reciter.name : '',
      album: 'التكرار — زاد المسلم'
    });
    navigator.mediaSession.setActionHandler('play', () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('stop', () => stopPlay());
    navigator.mediaSession.setActionHandler('nexttrack', () => { if (S.state !== 'idle') { qIdx++; playItem(); } });
    navigator.mediaSession.setActionHandler('previoustrack', () => { if (S.state !== 'idle' && qIdx > 0) { qIdx--; playItem(); } });
  } catch(e) {}
}

/* ---------- Init ---------- */
loadPrefs();
updateSpeedUI();

// Restore reciter
if (S.reciter) {
  const btn = document.getElementById('reciterBtn');
  btn.classList.add('has-value');
  btn.querySelector('span').textContent = S.reciter.name;
}

// Restore toggle states
if (S.rangeEnabled) {
  document.getElementById('rangeSwitch').classList.add('active');
  document.getElementById('rangeSettings').style.display = '';
}
document.getElementById('rangeRepeatVal').textContent = S.rangeRepeat;

if (S.ayahRepeatEnabled) {
  document.getElementById('ayahSwitch').classList.add('active');
  document.getElementById('ayahSettings').style.display = '';
}
document.getElementById('ayahRepeatVal').textContent = S.ayahRepeat;
</script>
