<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>حصن المسلم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Amiri', serif;
      background: #f4f6f8;
      color: #1e2a3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .toolbar select,
    .toolbar input,
    .toolbar button {
      padding: 0.5rem 0.9rem;
      border: none;
      border-radius: 2rem;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .toolbar input {
      flex: 1;
      min-width: 150px;
      background: #ecf0f1;
    }
    .toolbar button {
      background: white;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toolbar button:hover {
      background: #e0e0e0;
    }
    .search-clear {
      background: #b0c4de;
      color: #2c3e50;
      font-weight: bold;
    }
    .section-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #3b4d61;
      padding: 0.7rem 1rem;
      border-radius: 3rem;
    }
    .section-title {
      font-family: 'Scheherazade New', serif;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      flex: 1;
      padding: 0 0.5rem;
    }
    .section-nav button {
      background: transparent;
      color: white;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0 0.5rem;
    }
    main {
      flex: 1;
      padding: 1.2rem;
      max-width: 760px;
      margin: auto;
      width: 100%;
    }
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .slide-left { transform: translateX(-30px); opacity: 0; }
    .slide-right { transform: translateX(30px); opacity: 0; }
    .card {
      background: white;
      border-radius: 2rem;
      padding: 1.7rem 1.4rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.06);
      transition: background 0.3s;
    }
    .card.highlight {
      background: #fff9c4;
      transition: background 0.3s;
    }
    .card-arabic {
      font-family: 'Scheherazade New', 'Amiri', serif;
      font-size: 1.7rem;
      line-height: 2.2;
      margin-bottom: 1rem;
      word-break: break-word;
    }
    .card-reference {
      font-size: 0.85rem;
      color: #777;
      border-top: 1px dashed #ddd;
      padding-top: 0.7rem;
      direction: ltr;
      text-align: right;
    }
    .search-result-meta {
      font-size: 0.9rem;
      color: #3b4d61;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.3rem;
    }
    .result-count {
      text-align: center;
      margin-bottom: 1rem;
      color: #2c3e50;
    }
    mark {
      background: #fdd835;
      padding: 0 2px;
      border-radius: 3px;
    }
    .footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #888;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #3b4d61;
    }
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 1.5rem;
      border-radius: 2rem;
      text-align: center;
    }
    @media (max-width: 480px) {
      .card-arabic { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="toolbar">
      <button onclick="location.href='index.html'" title="الرئيسية">🏠</button>
      <select id="section-select" aria-label="اختر باباً"></select>
      <input type="text" id="search-input" placeholder="بحث في الأدعية والأحاديث...">
      <button id="clear-search" class="search-clear" title="مسح البحث">✕</button>
    </div>
    <div class="section-nav">
      <button id="prev-btn" title="السابق">›</button>
      <div class="section-title" id="section-title"></div>
      <button id="next-btn" title="التالي">‹</button>
    </div>
  </header>

  <main>
    <div id="content" class="loading">جاري تحميل الكتاب...</div>
  </main>

  <div class="footer">حصن المسلم · جميع الأجزاء</div>

  <script>
    (function() {
      // ---------- App State ----------
      const App = {
        data: [],              // array of sections (merged from all parts)
        currentSection: 0,
        viewMode: 'section',   // 'section' or 'search'
        searchQuery: '',
        searchResults: [],     // array of { sectionIdx, itemIdx, sectionTitle, ar, ref, label }
        touchStartX: 0,
        touchEndX: 0,
        isLoading: true,
        loadErrors: []
      };

      // ---------- DOM Elements ----------
      const contentEl = document.getElementById('content');
      const sectionSelect = document.getElementById('section-select');
      const sectionTitleEl = document.getElementById('section-title');
      const searchInput = document.getElementById('search-input');
      const clearSearchBtn = document.getElementById('clear-search');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');

      // ---------- Arabic Normalization (remove diacritics) ----------
      function normalizeArabic(str) {
        return str.replace(/[ًٌٍَُِّْـ]/g, ''); // removes tashkeel and tatweel
      }

      // ---------- Load All Parts (files in same directory) ----------
      async function loadAllParts() {
        App.isLoading = true;
        App.loadErrors = [];
        const parts = [1, 2, 3, 4, 5];
        const fetchPromises = parts.map(async (p) => {
          try {
            const response = await fetch(`part${p}.json`); // <-- no "assets/"
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
          } catch (err) {
            console.error(`Failed to load part ${p}:`, err);
            App.loadErrors.push(`الجزء ${p}`);
            return null;
          }
        });

        const results = await Promise.all(fetchPromises);
        // Merge all successfully loaded parts
        App.data = results.filter(r => r !== null).flat();

        if (App.data.length === 0) {
          contentEl.innerHTML = `<div class="error-message">تعذر تحميل أي جزء. تأكد من وجود ملفات part1.json إلى part5.json في نفس مجلد الصفحة.</div>`;
          App.isLoading = false;
          return;
        }

        if (App.loadErrors.length > 0) {
          console.warn('الأجزاء التالية لم يتم تحميلها:', App.loadErrors);
        }

        buildSectionSelect();
        buildSearchIndex();
        App.isLoading = false;
        renderSection();
      }

      // ---------- Build Section Dropdown ----------
      function buildSectionSelect() {
        sectionSelect.innerHTML = '';
        App.data.forEach((sec, idx) => {
          const opt = document.createElement('option');
          opt.value = idx;
          opt.textContent = sec.title || 'بدون عنوان';
          sectionSelect.appendChild(opt);
        });
        sectionSelect.value = App.currentSection;
      }

      // ---------- Search Index (normalized for matching) ----------
      let searchIndex = [];

      function buildSearchIndex() {
        searchIndex = [];
        App.data.forEach((section, sIdx) => {
          const items = section.items || [];
          items.forEach((item, iIdx) => {
            const title = section.title || '';
            const ar = item.ar || '';
            const ref = item.ref || '';
            const label = item.label || '';
            // Store both raw and normalized versions
            searchIndex.push({
              sectionIdx: sIdx,
              itemIdx: iIdx,
              sectionTitle: title,
              ar,
              ref,
              label,
              // normalized fields for matching
              normTitle: normalizeArabic(title),
              normAr: normalizeArabic(ar),
              normRef: normalizeArabic(ref),
              normLabel: normalizeArabic(label)
            });
          });
        });
      }

      // ---------- Perform Search (simple substring after normalization) ----------
      function performSearch(query) {
        const trimmed = query.trim();
        if (!trimmed) {
          App.viewMode = 'section';
          renderSection();
          return;
        }

        const normQuery = normalizeArabic(trimmed).toLowerCase();
        const results = [];

        searchIndex.forEach(item => {
          // Check all normalized fields
          if (item.normTitle.toLowerCase().includes(normQuery) ||
              item.normAr.toLowerCase().includes(normQuery) ||
              item.normRef.toLowerCase().includes(normQuery) ||
              item.normLabel.toLowerCase().includes(normQuery)) {
            results.push({
              sectionIdx: item.sectionIdx,
              itemIdx: item.itemIdx,
              sectionTitle: item.sectionTitle,
              ar: item.ar,
              ref: item.ref,
              label: item.label
            });
          }
        });

        App.searchQuery = query;
        App.searchResults = results;
        App.viewMode = 'search';
        renderSearchResults();
      }

      // ---------- Render Search Results (with highlighting) ----------
      function renderSearchResults() {
        if (App.searchResults.length === 0) {
          contentEl.innerHTML = `<div style="text-align:center; padding:2rem;">لا توجد نتائج لـ "${App.searchQuery}"</div>`;
          return;
        }

        const query = App.searchQuery;
        // Build regex for highlighting (escape special chars, but keep Arabic letters)
        const escapeRegex = (str) => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');

        const html = App.searchResults.map(r => {
          const highlightedAr = r.ar.replace(regex, '<mark>$1</mark>');
          return `
            <div class="card search-result" data-section-idx="${r.sectionIdx}" data-item-idx="${r.itemIdx}">
              <div class="search-result-meta">${r.sectionTitle} · ${r.label || ''}</div>
              <div class="card-arabic">${highlightedAr}</div>
              <div class="card-reference">${r.ref || ''}</div>
            </div>
          `;
        }).join('');

        contentEl.innerHTML = `
          <div class="result-count">${App.searchResults.length} نتيجة</div>
          <div class="cards-container">${html}</div>
        `;
      }

      // ---------- Render Current Section ----------
      function renderSection(direction = null) {
        if (App.isLoading) return;
        const section = App.data[App.currentSection];
        if (!section) return;

        sectionTitleEl.textContent = section.title || '';
        sectionSelect.value = App.currentSection;

        const items = section.items || [];
        const cardsHtml = items.map((item, idx) => `
          <div class="card" data-section-idx="${App.currentSection}" data-item-idx="${idx}">
            <div class="card-arabic">${item.ar || ''}</div>
            <div class="card-reference">${item.ref || ''}</div>
          </div>
        `).join('');

        const wrapper = document.createElement('div');
        wrapper.className = 'cards-container';
        if (direction === 'next') wrapper.classList.add('slide-left');
        if (direction === 'prev') wrapper.classList.add('slide-right');
        wrapper.innerHTML = cardsHtml;

        contentEl.innerHTML = '';
        contentEl.appendChild(wrapper);

        // Remove animation class after a tick
        setTimeout(() => {
          wrapper.classList.remove('slide-left', 'slide-right');
        }, 50);
      }

      // ---------- Navigation ----------
      function nextSection() {
        if (App.viewMode !== 'section') return;
        if (App.currentSection < App.data.length - 1) {
          App.currentSection++;
          renderSection('next');
        }
      }

      function prevSection() {
        if (App.viewMode !== 'section') return;
        if (App.currentSection > 0) {
          App.currentSection--;
          renderSection('prev');
        }
      }

      // ---------- Jump to Section & Highlight Item ----------
      function jumpToItem(sectionIdx, itemIdx) {
        App.currentSection = sectionIdx;
        App.viewMode = 'section';
        App.searchQuery = '';
        searchInput.value = '';
        renderSection();

        // Scroll to the specific card and highlight it
        setTimeout(() => {
          const targetCard = document.querySelector(`.card[data-section-idx="${sectionIdx}"][data-item-idx="${itemIdx}"]`);
          if (targetCard) {
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            targetCard.classList.add('highlight');
            setTimeout(() => targetCard.classList.remove('highlight'), 1500);
          }
        }, 100);
      }

      // ---------- Event Handlers ----------
      function handleSearchInput(e) {
        const q = e.target.value;
        performSearch(q);
      }

      function handleClearSearch() {
        searchInput.value = '';
        App.viewMode = 'section';
        renderSection();
      }

      function handleSectionChange(e) {
        if (App.viewMode !== 'section') {
          // If in search mode, changing dropdown should switch to section view
          App.viewMode = 'section';
        }
        App.currentSection = parseInt(e.target.value, 10);
        renderSection();
      }

      // Click on search result
      function handleContentClick(e) {
        const card = e.target.closest('.search-result');
        if (card) {
          const sectionIdx = card.dataset.sectionIdx;
          const itemIdx = card.dataset.itemIdx;
          if (sectionIdx !== undefined && itemIdx !== undefined) {
            jumpToItem(parseInt(sectionIdx), parseInt(itemIdx));
          }
        }
      }

      // Swipe navigation (RTL: swipe right → next, swipe left → previous)
      function handleTouchStart(e) {
        App.touchStartX = e.changedTouches[0].screenX;
      }
      function handleTouchEnd(e) {
        if (App.viewMode !== 'section') return;
        App.touchEndX = e.changedTouches[0].screenX;
        const diff = App.touchStartX - App.touchEndX;
        if (Math.abs(diff) < 50) return;
        if (diff > 0) {
          // swipe left → previous (RTL)
          prevSection();
        } else {
          // swipe right → next
          nextSection();
        }
      }

      // ---------- Initialization ----------
      function init() {
        loadAllParts();

        // Event listeners
        searchInput.addEventListener('input', handleSearchInput);
        clearSearchBtn.addEventListener('click', handleClearSearch);
        sectionSelect.addEventListener('change', handleSectionChange);
        prevBtn.addEventListener('click', prevSection);
        nextBtn.addEventListener('click', nextSection);
        contentEl.addEventListener('click', handleContentClick);

        // Touch events for swipe
        document.addEventListener('touchstart', handleTouchStart, { passive: true });
        document.addEventListener('touchend', handleTouchEnd, { passive: true });
      }

      init();
    })();
  </script>
</body>
</html>
