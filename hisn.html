<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصن المسلم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Amiri',serif;
  background:#f4f6f8;
  color:#1e2a3a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:linear-gradient(135deg,#2c3e50,#34495e);
  color:white;
  padding:1rem;
  position:sticky;
  top:0;
  z-index:10;
}

.toolbar{
  display:flex;
  gap:.5rem;
  align-items:center;
  margin-bottom:.7rem;
}

.toolbar select,
.toolbar input,
.toolbar button{
  padding:.5rem .9rem;
  border:none;
  border-radius:2rem;
  font-family:inherit;
  font-size:.9rem;
}

.toolbar input{
  flex:1;
  background:#ecf0f1;
}

.toolbar button{
  background:white;
  cursor:pointer;
}

.section-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#3b4d61;
  padding:.7rem 1rem;
  border-radius:3rem;
}

.section-title{
  font-family:'Scheherazade New',serif;
  font-size:1.3rem;
  font-weight:700;
  text-align:center;
  line-height:1.4;
  flex:1;
  padding:0 .5rem;
}

.section-nav button{
  background:transparent;
  color:white;
  border:none;
  font-size:1.4rem;
  cursor:pointer;
}

main{
  flex:1;
  padding:1.2rem;
  max-width:760px;
  margin:auto;
  width:100%;
}

.cards-container{
  display:flex;
  flex-direction:column;
  gap:1.4rem;
  transition:transform .3s ease,opacity .3s ease;
}

.slide-left{transform:translateX(-30px);opacity:0}
.slide-right{transform:translateX(30px);opacity:0}

.card{
  background:white;
  border-radius:2rem;
  padding:1.7rem 1.4rem;
  box-shadow:0 5px 15px rgba(0,0,0,.06);
}

.card-arabic{
  font-family:'Scheherazade New','Amiri',serif;
  font-size:1.7rem;
  line-height:2.2;
  margin-bottom:1rem;
}

.card-reference{
  font-size:.85rem;
  color:#777;
  border-top:1px dashed #ddd;
  padding-top:.7rem;
  direction:ltr;
  text-align:right;
}

.footer{
  text-align:center;
  padding:1rem;
  font-size:.8rem;
  color:#888;
}

@media(max-width:480px){
  .card-arabic{font-size:1.45rem}
}
</style>
</head>

<body>

<header>
  <div class="toolbar">
    <button onclick="location.href='index.html'">🏠</button>
    <select id="section-select"></select>
    <input type="text" id="search-input" placeholder="بحث في حصن المسلم...">
  </div>

  <div class="section-nav">
    <button id="prev-btn">›</button>
    <div class="section-title" id="section-title"></div>
    <button id="next-btn">‹</button>
  </div>
</header>

<main>
  <div id="content"></div>
</main>

<div class="footer">حصن المسلم</div>

<script>
const App={
  data:[],
  current:0,
  touchStartX:0,
  touchEndX:0
};

const content=document.getElementById("content");
const sectionSelect=document.getElementById("section-select");
const sectionTitle=document.getElementById("section-title");

async function loadAllParts(){
  const parts=[1,2,3,4,5];
  let allData=[];

  for(let p of parts){
    try{
      const res=await fetch(`assets/part${p}.json`);
      if(res.ok){
        const json=await res.json();
        allData=[...allData,...json];
      }
    }catch(e){}
  }

  App.data=allData;
  buildSections();
  renderSection();
}

function buildSections(){
  sectionSelect.innerHTML="";
  App.data.forEach((sec,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=sec.title;
    sectionSelect.appendChild(opt);
  });
}

function renderSection(direction=null){
  const sec=App.data[App.current];
  if(!sec) return;

  sectionTitle.textContent=sec.title;
  sectionSelect.value=App.current;

  const wrapper=document.createElement("div");
  wrapper.className="cards-container";

  sec.items.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-arabic">${item.ar||""}</div>
      <div class="card-reference">${item.ref||""}</div>
    `;
    wrapper.appendChild(card);
  });

  if(direction==="next") wrapper.classList.add("slide-left");
  if(direction==="prev") wrapper.classList.add("slide-right");

  content.innerHTML="";
  content.appendChild(wrapper);

  setTimeout(()=>wrapper.classList.remove("slide-left","slide-right"),50);
}

function nextSection(){
  if(App.current<App.data.length-1){
    App.current++;
    renderSection("next");
  }
}

function prevSection(){
  if(App.current>0){
    App.current--;
    renderSection("prev");
  }
}

/* RTL swipe fixed */
document.addEventListener("touchstart",e=>{
  App.touchStartX=e.changedTouches[0].screenX;
});
document.addEventListener("touchend",e=>{
  App.touchEndX=e.changedTouches[0].screenX;
  const diff=App.touchStartX-App.touchEndX;
  if(Math.abs(diff)<60) return;
  if(diff>0){
    prevSection(); // swipe left → previous (RTL)
  }else{
    nextSection(); // swipe right → next
  }
});

document.getElementById("next-btn").addEventListener("click",nextSection);
document.getElementById("prev-btn").addEventListener("click",prevSection);

sectionSelect.addEventListener("change",e=>{
  App.current=parseInt(e.target.value);
  renderSection();
});

document.getElementById("search-input").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  if(!q){renderSection();return}
  const results=App.data.filter(sec=>
    sec.title.toLowerCase().includes(q)
  );
  sectionSelect.innerHTML="";
  results.forEach((sec,i)=>{
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=sec.title;
    sectionSelect.appendChild(opt);
  });
});

loadAllParts();
</script>

</body>
</html>
