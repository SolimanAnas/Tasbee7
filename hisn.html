<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصن المسلم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Amiri',serif;
  background:#f4f6f8;
  color:#1e2a3a;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:20;
  background:linear-gradient(135deg,#2c3e50,#34495e);
  transition:all .3s ease;
  padding:.8rem 1rem;
}

header.collapsed{
  padding:.3rem 1rem;
}

.toolbar{
  display:flex;
  gap:.5rem;
  align-items:center;
}

.toolbar button,
.toolbar input,
.toolbar select{
  border:none;
  border-radius:2rem;
  font-family:inherit;
  font-size:.9rem;
}

.toolbar button{
  padding:.5rem .8rem;
  background:white;
  cursor:pointer;
}

.toolbar input{
  flex:1;
  padding:.5rem .9rem;
  background:#ecf0f1;
}

/* Section Navigation */
.section-nav{
  margin-top:.6rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#3b4d61;
  padding:.6rem 1rem;
  border-radius:3rem;
  transition:opacity .3s ease, height .3s ease;
}

header.collapsed .section-nav{
  opacity:0;
  height:0;
  overflow:hidden;
  margin:0;
  padding:0;
}

.section-title{
  font-family:'Scheherazade New',serif;
  font-size:1.3rem;
  font-weight:700;
  text-align:center;
  flex:1;
}

.section-nav button{
  background:transparent;
  color:white;
  border:none;
  font-size:1.3rem;
  cursor:pointer;
}

/* MAIN CONTENT */
main{
  padding:1rem;
  max-width:800px;
  margin:auto;
}

.card{
  background:white;
  border-radius:1.5rem;
  padding:1.2rem;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.card-arabic{
  font-family:'Scheherazade New','Amiri',serif;
  font-size:1.8rem;
  line-height:2.4;
}

.card-reference{
  margin-top:.7rem;
  font-size:.85rem;
  color:#777;
  border-top:1px dashed #ddd;
  padding-top:.6rem;
  direction:ltr;
  text-align:right;
}

/* SWIPE HINT */
.swipe-hint{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2c3e50;
  color:white;
  padding:.8rem 1.5rem;
  border-radius:2rem;
  font-size:.9rem;
  opacity:1;
  transition:opacity 1.5s ease;
  z-index:50;
}

.swipe-hint.hide{
  opacity:0;
  pointer-events:none;
}

@media(max-width:480px){
  .card-arabic{font-size:1.6rem}
}
</style>
</head>

<body>

<header id="header">
  <div class="toolbar">
    <button onclick="location.href='index.html'">🏠</button>
    <input type="text" id="search-input" placeholder="بحث في حصن المسلم...">
  </div>

  <div class="section-nav">
    <button id="prev-btn">›</button>
    <div class="section-title" id="section-title"></div>
    <button id="next-btn">‹</button>
  </div>
</header>

<main>
  <div id="content"></div>
</main>

<div class="swipe-hint" id="swipeHint">
اسحب لليمين واليسار للتنقل بين الأبواب
</div>

<script>
const App={
  data:[],
  current:0,
  touchStartX:0,
  touchEndX:0
};

const content=document.getElementById("content");
const sectionTitle=document.getElementById("section-title");
const header=document.getElementById("header");
const swipeHint=document.getElementById("swipeHint");

/* Load all parts automatically */
async function loadAllParts(){
  const parts=[1,2,3,4,5];
  let allData=[];

  for(let p of parts){
    try{
      const res=await fetch(`assets/part${p}.json`);
      if(res.ok){
        const json=await res.json();
        allData=[...allData,...json];
      }
    }catch(e){}
  }

  App.data=allData;
  renderSection();
}

function renderSection(){
  const sec=App.data[App.current];
  if(!sec) return;

  sectionTitle.textContent=sec.title;

  content.innerHTML=`
    <div class="card">
      ${sec.items.map(item=>`
        <div class="card-arabic">${item.ar||""}</div>
        <div class="card-reference">${item.ref||""}</div>
      `).join("")}
    </div>
  `;
}

function nextSection(){
  if(App.current<App.data.length-1){
    App.current++;
    renderSection();
  }
}

function prevSection(){
  if(App.current>0){
    App.current--;
    renderSection();
  }
}

/* RTL swipe */
document.addEventListener("touchstart",e=>{
  App.touchStartX=e.changedTouches[0].screenX;
  hideSwipeHint();
});
document.addEventListener("touchend",e=>{
  App.touchEndX=e.changedTouches[0].screenX;
  const diff=App.touchStartX-App.touchEndX;
  if(Math.abs(diff)<60) return;

  if(diff>0){
    prevSection();
  }else{
    nextSection();
  }
});

document.getElementById("next-btn").addEventListener("click",nextSection);
document.getElementById("prev-btn").addEventListener("click",prevSection);

/* Header collapse on scroll */
let lastScroll=0;
window.addEventListener("scroll",()=>{
  const currentScroll=window.pageYOffset;
  if(currentScroll>lastScroll){
    header.classList.add("collapsed");
  }else{
    header.classList.remove("collapsed");
  }
  lastScroll=currentScroll;
});

/* Swipe hint auto fade */
function hideSwipeHint(){
  swipeHint.classList.add("hide");
}

setTimeout(hideSwipeHint,5000);

loadAllParts();
</script>

</body>
</html>
