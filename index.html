<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مسبحة</title>

<style>
:root {
  --primary: #10b981;
  --bg: #020617;
  --card: #0f172a;
  --text: #f8fafc;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 30px 20px;
}

h1 {
  font-size: 20px;
  margin-bottom: 30px;
  color: var(--primary);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 100%;
  max-width: 480px;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 30px 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.05);
}

.card:hover {
  transform: translateY(-4px);
}

.icon {
  font-size: 40px;
  margin-bottom: 15px;
}

.label {
  font-size: 16px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>الصفحة الرئيسية</h1>

<div class="grid">

  <div class="card" onclick="go('masbaha.html')">
    <div class="icon">📿</div>
    <div class="label">المسبحة</div>
  </div>

  <div class="card" onclick="go('azkar.html?type=morning')">
    <div class="icon">🌅</div>
    <div class="label">أذكار الصباح</div>
  </div>

  <div class="card" onclick="go('azkar.html?type=night')">
    <div class="icon">🌙</div>
    <div class="label">أذكار المساء</div>
  </div>

  <div class="card" onclick="go('azkar.html?type=ruqia')">
    <div class="icon">📖</div>
    <div class="label">الرقية الشرعية</div>
  </div>

</div>

<script>
function go(page) {
  window.location.href = page;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
