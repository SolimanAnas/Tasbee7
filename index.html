<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zad Al-Muslim</title>

<meta name="theme-color" content="#10b981">

<link rel="manifest" href="manifest.json">

<link rel="icon" href="icon/icon-192.png">
<link rel="apple-touch-icon" href="icon/icon-512.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zad Al-Muslim">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= THEME VARIABLES ================= */

:root{

--primary:#10b981;

--bg:#020617;
--card:#0f172a;
--text:#f8fafc;

--glass:rgba(255,255,255,0.08);
--glass-border:rgba(255,255,255,0.1);

}

/* LIGHT THEME */

body.light{

--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;

--glass:rgba(0,0,0,0.04);
--glass-border:rgba(0,0,0,0.08);

}

/* SEPIA THEME */

body.sepia{

--bg:#f4ecd8;
--card:#fffaf0;
--text:#3b2f1e;

--glass:rgba(0,0,0,0.05);
--glass-border:rgba(0,0,0,0.08);

}

/* ================= BASE ================= */

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

margin:0;
font-family:'Tajawal',sans-serif;

background:var(--bg);
color:var(--text);

display:flex;
flex-direction:column;
align-items:center;

min-height:100vh;

transition:background 0.3s ease;

}

/* DARK GRADIENT */

body:not(.light):not(.sepia){
background:radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
}

/* ================= TOP BAR ================= */

.top-bar{

width:100%;
max-width:480px;

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 20px;

}

.title{

font-size:18px;
font-weight:700;
color:var(--primary);

}

/* ================= THEME SWITCH ================= */

.theme-switch{

display:flex;
gap:10px;

}

.theme-dot{

width:34px;
height:34px;

border-radius:50%;

border:3px solid rgba(255,255,255,0.6);

cursor:pointer;

transition:0.2s;

}

.theme-dot:hover{
transform:scale(1.1);
}

.theme-dark{ background:#1f2937; }

.theme-sepia{ background:#e7dec5; }

.theme-light{ background:#ffffff; }

/* ================= CONTENT ================= */

.content{

flex:1;

width:100%;
max-width:480px;

padding:0 20px 30px;

}

/* ================= GRID ================= */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

.card{

background:var(--glass);

border:1px solid var(--glass-border);

border-radius:22px;

padding:26px 12px;

cursor:pointer;

text-align:center;

backdrop-filter:blur(10px);

transition:0.25s;

}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 30px -10px var(--primary);
}

.card:active{
transform:scale(0.96);
}

.icon{
font-size:34px;
margin-bottom:10px;
}

.label{
font-size:15px;
font-weight:600;
}

/* ================= SAFE NAVIGATION ================= */

body.fade-out{
opacity:0;
transition:opacity 0.25s;
}

</style>

</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

<div class="title">الصفحة الرئيسية</div>

<div class="theme-switch">

<div class="theme-dot theme-dark" onclick="setTheme('dark')"></div>

<div class="theme-dot theme-sepia" onclick="setTheme('sepia')"></div>

<div class="theme-dot theme-light" onclick="setTheme('light')"></div>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="grid">

<div class="card" onclick="go('audio.html')">
<div class="icon">🎧</div>
<div class="label">الاستماع للقرآن الكريم</div>
</div>

<div class="card" onclick="go('quran.html')">
<div class="icon">📖</div>
<div class="label">القرآن الكريم</div>
</div>

<div class="card" onclick="go('masbaha.html')">
<div class="icon">📿</div>
<div class="label">المسبحة</div>
</div>

<div class="card" onclick="go('radio.html')">
<div class="icon">📻</div>
<div class="label">إذاعة القرآن الكريم</div>
</div>

<div class="card" onclick="go('azkar.html?type=night')">
<div class="icon">🌙</div>
<div class="label">أذكار المساء</div>
</div>

<div class="card" onclick="go('azkar.html?type=morning')">
<div class="icon">🌅</div>
<div class="label">أذكار الصباح</div>
</div>

<div class="card" onclick="go('hisn.html')">
<div class="icon">📘</div>
<div class="label">حصن المسلم</div>
</div>

<div class="card" onclick="go('azkar.html?type=ruqia')">
<div class="icon">🛡️</div>
<div class="label">الرقية الشرعية</div>
</div>

</div>

</div>

<script>

/* ===== PAGE NAVIGATION ===== */

function go(page){

document.body.classList.add("fade-out");

setTimeout(()=>{
window.location.assign(page);
},200);

}

window.addEventListener("pageshow",()=>{
document.body.classList.remove("fade-out");
});

/* ===== THEME SYSTEM ===== */

function setTheme(mode){

document.body.classList.remove("light","sepia");

if(mode==="light"){
document.body.classList.add("light");
}

if(mode==="sepia"){
document.body.classList.add("sepia");
}

localStorage.setItem("themeMode",mode);

}

/* LOAD SAVED THEME */

window.addEventListener("load",()=>{

const saved=localStorage.getItem("themeMode");

if(saved==="light") document.body.classList.add("light");

if(saved==="sepia") document.body.classList.add("sepia");

});

/* ===== SERVICE WORKER ===== */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
