<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مسبحة</title>

<style>
/* ===== THEME VARIABLES ===== */
:root {
  --primary: #10b981;
  --bg: #020617;
  --card: #0f172a;
  --text: #f8fafc;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.1);
  --text-muted: #94a3b8;
}

/* Light Theme */
body.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --glass: rgba(0,0,0,0.03);
  --glass-border: rgba(0,0,0,0.1);
  --text-muted: #475569;
}

/* ===== NUCLEAR KILL: no highlight, no select ===== */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 0;               /* will be handled by containers */
  user-select: none;        /* prevent text selection everywhere */
  transition: background 0.3s, color 0.3s;
}

/* ===== TOP BAR ===== */
.top-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  font-size: 22px;
}

.icon-btn {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  color: var(--text);
  cursor: pointer;
  transition: 0.2s;
  font-size: 24px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.icon-btn:active {
  transform: scale(0.92);
  background: rgba(255,255,255,0.15);
}

/* ===== MAIN CONTENT ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 480px;
  padding: 0 20px 30px;
}

h1 {
  font-size: 20px;
  margin-bottom: 30px;
  color: var(--primary);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 100%;
}

.card {
  background: var(--card);
  border-radius: 24px;
  padding: 30px 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, background 0.3s, border-color 0.3s;
  border: 1px solid rgba(255,255,255,0.05);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.card:active {
  transform: scale(0.97);
}

.icon {
  font-size: 40px;
  margin-bottom: 15px;
}

.label {
  font-size: 16px;
  font-weight: 600;
}

/* ===== MODAL (same as azkar) ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 1000;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.modal-content {
  width: 90%;
  max-width: 500px;
  background: var(--card);
  border-radius: 24px;
  padding: 30px;
  transform: translateY(30px);
  transition: 0.3s ease;
  border: 1px solid var(--glass-border);
}

.modal.active .modal-content {
  transform: translateY(0);
}

.close {
  text-align: left;
  cursor: pointer;
  font-size: 20px;
  margin-bottom: 15px;
  color: var(--text);
  user-select: none;
}

.settings-row {
  margin-bottom: 25px;
}

.settings-row h3 {
  color: var(--primary);
  margin: 0 0 15px 0;
  font-size: 18px;
}

.theme-buttons {
  display: flex;
  gap: 15px;
}

.btn {
  padding: 14px 22px;
  border-radius: 16px;
  border: none;
  background: #1e293b;
  color: white;
  cursor: pointer;
  font-size: 16px;
  flex: 1;
  transition: 0.2s;
  user-select: none;
}

.btn:active {
  transform: scale(0.96);
}

.btn.primary {
  background: var(--primary);
  color: #001e1b;
  font-weight: bold;
}

/* light theme button background adjustments */
body.light .btn:not(.primary) {
  background: #e2e8f0;
  color: #0f172a;
}
</style>
</head>

<body>

<!-- Top Bar with Settings only (Home already here) -->
<div class="top-bar">
  <div class="icon-btn" onclick="goHome()">🏠</div>
  <div class="icon-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="content">
  <h1>الصفحة الرئيسية</h1>

  <div class="grid">
    <div class="card" onclick="go('masbaha.html')">
      <div class="icon">📿</div>
      <div class="label">المسبحة</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=morning')">
      <div class="icon">🌅</div>
      <div class="label">أذكار الصباح</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=night')">
      <div class="icon">🌙</div>
      <div class="label">أذكار المساء</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=ruqia')">
      <div class="icon">📖</div>
      <div class="label">الرقية الشرعية</div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal" onclick="if(event.target===this) closeSettings()">
  <div class="modal-content">
    <div class="close" onclick="closeSettings()">✕</div>

    <div class="settings-row">
      <h3>Theme</h3>
      <div class="theme-buttons">
        <button class="btn" onclick="setTheme('dark')">Dark</button>
        <button class="btn" onclick="setTheme('light')">Light</button>
      </div>
    </div>
  </div>
</div>

<script>
function go(page) {
  window.location.href = page;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

/* ===== Settings & Theme ===== */
function openSettings() {
  document.getElementById('settingsModal').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

function setTheme(mode) {
  if (mode === 'light') {
    document.body.classList.add('light');
  } else {
    document.body.classList.remove('light');
  }
  localStorage.setItem('themeMode', mode);
}

// Load saved theme on startup
window.addEventListener('load', () => {
  const savedTheme = localStorage.getItem('themeMode');
  if (savedTheme === 'light') {
    document.body.classList.add('light');
  }
});
</script>

</body>
</html>
