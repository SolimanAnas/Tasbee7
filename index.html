<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مسبحة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================== THEME VARIABLES ================== */
:root {
  --primary: #10b981;
  --bg: #020617;
  --card: #0f172a;
  --text: #f8fafc;
  --glass: rgba(255,255,255,0.08);
  --glass-border: rgba(255,255,255,0.1);
  --text-muted: #94a3b8;
}

body.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --glass: rgba(0,0,0,0.03);
  --glass-border: rgba(0,0,0,0.1);
  --text-muted: #475569;
}

/* ================== BASE ================== */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  transition: background 0.3s ease, color 0.3s ease, opacity 0.25s ease;
  opacity: 1;
}

body:not(.light) {
  background: radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
}

body.fade-out {
  opacity: 0;
}

/* ================== TOP BAR ================== */
.top-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 20px;
  gap: 12px;
}

.icon-btn {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  cursor: pointer;
  font-size: 20px;
  transition: 0.25s ease;
  user-select: none;
}

.icon-btn:active {
  transform: scale(0.92);
}

.icon-btn:hover {
  box-shadow: 0 8px 25px -10px var(--primary);
}

/* ================== CONTENT ================== */
.content {
  flex: 1;
  width: 100%;
  max-width: 480px;
  padding: 0 20px 40px;
  text-align: center;
}

h1 {
  font-size: 20px;
  margin-bottom: 30px;
  color: var(--primary);
}

/* ================== GRID ================== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 28px 10px;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  animation: fadeUp 0.4s ease forwards;
  user-select: none;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 35px -10px var(--primary);
}

.card:active {
  transform: scale(0.96);
}

.card.full-width {
  grid-column: span 2;
  border: 2px solid var(--primary);
  background: linear-gradient(145deg, var(--glass), rgba(16,185,129,0.15));
}

.icon {
  font-size: 36px;
  margin-bottom: 14px;
}

.label {
  font-size: 15px;
  font-weight: 600;
}

/* ================== MODAL ================== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 1000;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.modal-content {
  width: 90%;
  max-width: 480px;
  background: var(--card);
  border-radius: 24px;
  padding: 25px;
  border: 1px solid var(--glass-border);
  transform: translateY(20px);
  transition: 0.3s ease;
}

.modal.active .modal-content {
  transform: translateY(0);
}

.close {
  cursor: pointer;
  margin-bottom: 15px;
  font-size: 18px;
}

.btn {
  padding: 12px 18px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text);
}

.btn.primary {
  background: var(--primary);
  color: #002e28;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="top-bar">
  <div class="icon-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="content">
  <h1>الصفحة الرئيسية</h1>

  <div class="grid">

    <div class="card" onclick="goQuran()">
      <div class="icon">📖</div>
      <div class="label">القرآن الكريم</div>
    </div>

    <div class="card" onclick="go('masbaha.html')">
      <div class="icon">📿</div>
      <div class="label">المسبحة</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=morning')">
      <div class="icon">🌅</div>
      <div class="label">أذكار الصباح</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=night')">
      <div class="icon">🌙</div>
      <div class="label">أذكار المساء</div>
    </div>

    <div class="card" onclick="go('azkar.html?type=ruqia')">
      <div class="icon">🛡️</div>
      <div class="label">الرقية الشرعية</div>
    </div>

    <div class="card full-width" onclick="openHusnPDF()">
      <div class="icon">📘</div>
      <div class="label">حصن المسلم</div>
    </div>

  </div>
</div>

<!-- SETTINGS -->
<div class="modal" id="settingsModal" onclick="if(event.target===this) closeSettings()">
  <div class="modal-content">
    <div class="close" onclick="closeSettings()">✕</div>
    <button class="btn" onclick="setTheme('dark')">Dark</button>
    <button class="btn primary" onclick="setTheme('light')">Light</button>
  </div>
</div>

<script>

/* ========== PAGE TRANSITION ========== */
function go(page){
  document.body.classList.add("fade-out");
  setTimeout(()=>{ window.location.href = page; },200);
}

/* ========== PDF VIEWER ========== */
function goQuran(){
  go('pdf-viewer/web/viewer.html?file=../../assets/quran.pdf');
}

function openHusnPDF(){
  go('pdf-viewer/web/viewer.html?file=../../assets/husn.pdf');
}

/* ========== SETTINGS ========== */
function openSettings(){
  document.getElementById("settingsModal").classList.add("active");
}

function closeSettings(){
  document.getElementById("settingsModal").classList.remove("active");
}

function setTheme(mode){
  if(mode==="light"){
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }
  localStorage.setItem("themeMode", mode);
}

window.addEventListener("load",()=>{
  const saved = localStorage.getItem("themeMode");
  if(saved==="light") document.body.classList.add("light");
});

/* ========== PWA INSTALL PROMPT ========== */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;

  const installBtn = document.createElement("div");
  installBtn.className="icon-btn";
  installBtn.innerHTML="⬇️";
  installBtn.onclick=async()=>{
    installBtn.remove();
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  };

  document.querySelector(".top-bar").prepend(installBtn);
});

/* ========== SERVICE WORKER ========== */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
