<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>إذاعة القرآن الكريم</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

/* ================= THEMES ================= */

:root{
--primary:#10b981;
--bg:#020617;
--bg-top:#1e293b;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.1);
--text:#f8fafc;
--muted:#94a3b8;
--card-bg:rgba(30,41,59,0.7);
--action-bg:rgba(255,255,255,0.05);
--mini-bg:rgba(15,23,42,0.95);
--live-color:#ef4444;
}

body.light{
--bg:#f1f5f9;
--bg-top:#ffffff;
--text:#0f172a;
--card-bg:#ffffff;
--glass:rgba(0,0,0,0.04);
--border:rgba(0,0,0,0.08);
}

body.sepia{
--bg:#f4ecd8;
--bg-top:#fffaf0;
--text:#3b2f1e;
--card-bg:#fffaf0;
--glass:rgba(0,0,0,0.05);
--border:rgba(0,0,0,0.08);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:radial-gradient(circle at 50% 0%, var(--bg-top), var(--bg));
color:var(--text);
display:flex;
justify-content:center;
padding:20px 20px 100px;
min-height:100dvh;
transition:0.4s;
}

.app{
width:100%;
max-width:480px;
display:flex;
flex-direction:column;
gap:16px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(12px);
border-radius:16px;
padding:14px 16px;
}

.header-title{
font-weight:bold;
font-size:18px;
}

.icon-btn{
background:none;
border:none;
color:var(--text);
cursor:pointer;
}

.card{
background:var(--card-bg);
border:1px solid var(--border);
backdrop-filter:blur(12px);
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

label{
font-size:14px;
color:var(--primary);
}

select{
padding:14px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(0,0,0,0.2);
color:var(--text);
font-size:15px;
}

.now{
text-align:center;
padding:40px 20px;
}

.nowStation{
font-family:'Amiri',serif;
font-size:24px;
margin-bottom:12px;
}

.live-indicator{
display:flex;
align-items:center;
gap:8px;
color:var(--muted);
font-weight:bold;
font-size:14px;
margin-bottom:20px;
}

.live-indicator.playing{
color:var(--live-color);
}

.pulse-dot{
width:10px;
height:10px;
border-radius:50%;
background:var(--muted);
}

.live-indicator.playing .pulse-dot{
background:var(--live-color);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(239,68,68,0.7);}
70%{box-shadow:0 0 0 10px rgba(239,68,68,0);}
100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}
}

.controls{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.play-pause-btn{
width:70px;
height:70px;
border-radius:50%;
background:var(--primary);
border:none;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.play-pause-btn svg{
width:30px;
height:30px;
fill:currentColor;
}

.action-btn{
background:var(--action-bg);
border:1px solid var(--border);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translate(-50%,-100px);
background:rgba(16,185,129,0.95);
color:#fff;
padding:12px 24px;
border-radius:30px;
font-size:14px;
font-weight:bold;
transition:0.4s;
}

.toast.show{
transform:translate(-50%,0);
}

</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء</div>

<div class="app">

<div class="header">

<button class="icon-btn" onclick="location.href='index.html'">🏠</button>

<div class="header-title">إذاعة القرآن الكريم</div>

<button class="icon-btn" onclick="openFavModal()">❤</button>

</div>

<div class="card">

<label>اختر الإذاعة</label>

<select id="radioSelect"></select>

</div>

<div class="card now">

<div class="nowStation" id="nowStation">اختر إذاعة للبدء</div>

<div class="live-indicator" id="liveIndicator">
<div class="pulse-dot"></div>
<span id="liveText">متوقف</span>
</div>

<div class="controls">

<button class="action-btn" id="favBtn">❤</button>

<button class="play-pause-btn" id="mainPlayBtn">

<svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"></polygon></svg>

<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>

</button>

</div>

</div>

<audio id="audio" preload="none" playsinline></audio>

</div>

<script>

/* GLOBAL THEME */

const savedTheme = localStorage.getItem("themeMode");

if(savedTheme==="light") document.body.classList.add("light");
if(savedTheme==="sepia") document.body.classList.add("sepia");

/* GLOBAL AUDIO */

const audio = window.globalAudio || document.getElementById("audio");
window.globalAudio = audio;

const radioSelect = document.getElementById("radioSelect");
const mainPlayBtn = document.getElementById("mainPlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const nowStation = document.getElementById("nowStation");
const favBtn = document.getElementById("favBtn");
const liveIndicator = document.getElementById("liveIndicator");
const liveText = document.getElementById("liveText");

let currentTrackUrl="";
let hls=null;

/* RADIO LIST */

const radioStations=[
{ name:"إذاعة القرآن الكريم - مكة", url:"https://stream.radiojar.com/0tpy1h0kxtzuv" },
{ name:"إذاعة القرآن الكريم - القاهرة", url:"http://n0b.radiojar.com/8s5u5tpdtwzuv" },
{ name:"إذاعة القرآن الكريم - الكويت", url:"http://qurankw.itworkscdn.net/quranlive/quranradiolive/playlist.m3u8" },
{ name:"إذاعة القرآن الكريم - الشارقة", url:"https://svs.itworkscdn.net/smcquranlive/quranradiolive/playlist.m3u8" },
{ name:"إذاعة عبدالباسط عبدالصمد", url:"https://qurango.net/radio/abdulbasit_abdulsamad" },
{ name:"إذاعة ماهر المعيقلي", url:"https://qurango.net/radio/maher_almuaiqly" }
];

/* INIT */

function initRadios(){

radioStations.forEach(station=>{

let opt=document.createElement("option");
opt.value=station.url;
opt.textContent=station.name;

radioSelect.appendChild(opt);

});

prepareStation();

}

/* LOAD STREAM */

function loadStream(url){

if(hls){hls.destroy();hls=null;}

if(url.includes(".m3u8")){

if(audio.canPlayType("application/vnd.apple.mpegurl")){
audio.src=url;
}
else if(Hls.isSupported()){

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(audio);

}

}
else{

audio.src=url;

}

}

/* PREPARE */

function prepareStation(){

let url=radioSelect.value;
let name=radioSelect.options[radioSelect.selectedIndex].text;

loadStream(url);

currentTrackUrl=url;

nowStation.innerText=name;

localStorage.setItem("lastRadioUrl",url);
localStorage.setItem("lastRadioName",name);

}

/* MEDIA SESSION */

function updateMediaSession(title){

if(!("mediaSession" in navigator)) return;

navigator.mediaSession.metadata=new MediaMetadata({

title:title,
artist:"Zad Al-Muslim",
album:"إذاعة القرآن الكريم",

artwork:[
{src:"icon/icon-192.png",sizes:"192x192",type:"image/png"},
{src:"icon/icon-512.png",sizes:"512x512",type:"image/png"}
]

});

navigator.mediaSession.setActionHandler("play",()=>audio.play());
navigator.mediaSession.setActionHandler("pause",()=>audio.pause());

}

/* PLAY */

function togglePlay(){

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

mainPlayBtn.onclick=togglePlay;

audio.addEventListener("playing",()=>{

playIcon.style.display="none";
pauseIcon.style.display="block";

liveIndicator.classList.add("playing");
liveText.innerText="مباشر";

updateMediaSession(nowStation.innerText);

});

audio.addEventListener("pause",()=>{

playIcon.style.display="block";
pauseIcon.style.display="none";

liveIndicator.classList.remove("playing");
liveText.innerText="متوقف";

});

/* AUTO RECONNECT */

audio.addEventListener("error",()=>{

nowStation.innerText="إعادة الاتصال بالبث...";

setTimeout(()=>{

loadStream(currentTrackUrl);
audio.play().catch(()=>{});

},3000);

});

/* AUTO RESUME */

window.addEventListener("load",()=>{

const lastUrl=localStorage.getItem("lastRadioUrl");
const lastName=localStorage.getItem("lastRadioName");

if(lastUrl){

loadStream(lastUrl);
currentTrackUrl=lastUrl;
nowStation.innerText=lastName||"آخر إذاعة";

}

});

/* FAVORITES */

favBtn.onclick=()=>{

let favs=JSON.parse(localStorage.getItem("radio_favorites")||"[]");

let name=nowStation.innerText;

let index=favs.findIndex(f=>f.url===currentTrackUrl);

if(index===-1){

favs.push({name:name,url:currentTrackUrl});
showToast("تمت الإضافة للمفضلة");

favBtn.classList.add("active");

}
else{

favs.splice(index,1);
showToast("تمت الإزالة من المفضلة");

favBtn.classList.remove("active");

}

localStorage.setItem("radio_favorites",JSON.stringify(favs));

};

function showToast(msg){

const toast=document.getElementById("toast");

toast.innerText=msg;
toast.classList.add("show");

setTimeout(()=>toast.classList.remove("show"),2500);

}

radioSelect.addEventListener("change",()=>{

prepareStation();
audio.play().catch(()=>{});

});

initRadios();

</script>

</body>
</html>
