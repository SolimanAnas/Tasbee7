<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>إذاعة القرآن الكريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* --- 2-THEME GLASSMORPHISM SYSTEM --- */
:root {
  --bg-image: url('images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5); 
  --text-primary: #F8FAFC; 
  --text-secondary: #CBD5E1;
  --accent-main: #34D399; 
  --accent-muted: rgba(255, 255, 255, 0.15);
  --glass: rgba(15, 23, 42, 0.4); 
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.2); 
  --live-color: #ef4444; 
  --dropdown-bg: rgba(15, 23, 42, 0.95); 
}

[data-theme="light"] {
  --bg-image: url('images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.35); 
  --text-primary: #0F172A; 
  --text-secondary: #475569;
  --accent-main: #059669; 
  --accent-muted: rgba(0, 0, 0, 0.05);
  --glass: rgba(255, 255, 255, 0.2); 
  --glass-border: rgba(255, 255, 255, 0.4); 
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
  --overlay: rgba(255, 255, 255, 0.1); 
  --live-color: #dc2626;
  --dropdown-bg: rgba(255, 255, 255, 0.95);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface);
  background-image: var(--bg-image);
  background-size: cover; background-position: center;
  background-attachment: fixed; background-repeat: no-repeat;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: 20px 20px 100px; 
  min-height: 100dvh;
  transition: color 0.3s ease, background-image 0.3s ease;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background: var(--overlay); z-index: -1; transition: background 0.3s ease;
}

.app { 
  width: 100%; max-width: 480px; 
  display: flex; flex-direction: column; gap: 16px; 
  flex: 1; 
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 16px; padding: 14px 16px;
  flex-shrink: 0;
}
.header-title { font-weight: bold; font-size: 18px; color: var(--text-primary); }
.icon-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.icon-btn:active { opacity: 0.7; transform: scale(0.9); }

/* Cards */
.card {
  position: relative; 
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 20px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
label { font-size: 14px; color: var(--accent-main); font-weight: bold; }

/* بطاقة اختيار الإذاعة */
.picker-card {
  margin-top: 6vh;
  z-index: 60;
}

/* Custom Select Buttons */
.custom-select-wrapper {
  position: relative;
  user-select: none;
}

.custom-select-trigger {
  padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--bg-surface); color: var(--text-primary); font-size: 16px;
  font-family: inherit; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.custom-select-trigger:active { transform: scale(0.98); }
.custom-select-trigger.open { border-color: var(--accent-main); box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
.custom-select-trigger .arrow { transition: transform 0.3s ease; font-size: 12px; opacity: 0.7; }
.custom-select-trigger.open .arrow { transform: rotate(180deg); }

/* القائمة المنسدلة الزجاجية */
.custom-options {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: var(--dropdown-bg); 
  backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
  border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  z-index: 999; max-height: 280px; overflow-y: auto; overflow-x: hidden; opacity: 0; visibility: hidden;
  transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex; flex-direction: column; 
  padding: 8px 4px 8px 8px; gap: 4px;
  clip-path: inset(0 round 16px);
}

.custom-options.open { opacity: 1; visibility: visible; transform: translateY(0); }

/* شريط التمرير المخصص */
.custom-options::-webkit-scrollbar { width: 5px; }
.custom-options::-webkit-scrollbar-track { background: transparent; margin: 12px 0; }
.custom-options::-webkit-scrollbar-thumb { background: var(--accent-main); border-radius: 10px; }

.custom-option {
  padding: 12px 16px; color: var(--text-primary); cursor: pointer; border-radius: 10px;
  transition: background 0.2s, color 0.2s; font-size: 14px;
}
.custom-option:hover, .custom-option.selected { background: var(--accent-muted); color: var(--accent-main); font-weight: bold; }

/* Main Player Area */
.now {
  text-align: center; padding: 40px 20px;
  background: linear-gradient(145deg, var(--glass), var(--accent-muted));
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin-top: auto; margin-bottom: 0; 
}
.nowStation { font-family: 'Amiri', serif; font-size: 24px; margin-bottom: 12px; line-height: 1.4; color: var(--text-primary); }

/* Live Indicator */
.live-indicator {
  display: flex; align-items: center; gap: 8px; color: var(--text-secondary);
  font-weight: bold; font-size: 14px; margin-bottom: 25px; transition: color 0.3s;
}
.live-indicator.playing { color: var(--live-color); }
.pulse-dot { width: 10px; height: 10px; background: var(--text-secondary); border-radius: 50%; transition: background 0.3s; }
.live-indicator.playing .pulse-dot { background: var(--live-color); animation: pulse 1.5s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* Controls */
.controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
.play-pause-btn {
  width: 70px; height: 70px; border-radius: 50%; background: var(--accent-main); color: #FFFFFF; border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.2s; flex-shrink: 0; position: relative;
}
.play-pause-btn:active { transform: scale(0.92); }
.play-pause-btn svg { width: 30px; height: 30px; fill: currentColor; }

.action-btn {
  background: var(--accent-muted); border: 1px solid var(--glass-border); width: 50px; height: 50px; border-radius: 50%; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; flex-shrink: 0;
}
.action-btn:active { transform: scale(0.9); }
.action-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.action-btn.active { background: var(--bg-surface); border-color: var(--accent-main); color: var(--accent-main); }
.action-btn.active svg { stroke: var(--accent-main); }
.action-btn.active.fill-icon svg { fill: var(--accent-main); }

/* Loader */
.loader {
  display: none; position: absolute; width: 30px; height: 30px;
  border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
  border-top-color: #FFFFFF; animation: spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading .play-icon { display: none !important; }
.loading .loader { display: block; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
  background: var(--accent-main); color: #FFFFFF; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
  backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 1000;
}
.toast.show { transform: translate(-50%, 0); }

/* Favorites Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 10000; display: flex;
  align-items: center; justify-content: center; padding: 20px;
  opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }

.modal-content {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: var(--glass-shadow);
  border-radius: 20px; padding: 20px; width: 100%; max-width: 440px;
  max-height: 80vh; display: flex; flex-direction: column;
  transform: translateY(20px); transition: 0.3s ease; color: var(--text-primary);
}
.modal-overlay.active .modal-content { transform: translateY(0); }

.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;
  padding-bottom: 10px; border-bottom: 1px solid var(--glass-border);
}
.close-btn { background: none; border: none; color: inherit; font-size: 1.2rem; cursor: pointer; opacity: 0.7; }

.fav-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.fav-list::-webkit-scrollbar { width: 4px; }
.fav-list::-webkit-scrollbar-thumb { background: var(--accent-main); border-radius: 10px; }

.fav-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--accent-muted); padding: 12px 15px;
  border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
}
.fav-item:active { transform: scale(0.98); }
.fav-item:hover { border-color: var(--accent-main); }
.fav-item-info { display: flex; flex-direction: column; gap: 4px; }
.fav-item-surah { font-weight: bold; color: var(--accent-main); font-size: 1.05rem; }
.delete-fav-btn {
  background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none;
  padding: 8px; border-radius: 8px; cursor: pointer;
}
</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء بنجاح</div>

<div class="app">
  <div class="header">
    <div style="display: flex; gap: 10px;">
      <button class="icon-btn" onclick="window.location.href='index.html'" title="الرئيسية">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="تبديل المظهر">
        <svg id="sunIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moonIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    <div class="header-title">إذاعة القرآن الكريم</div>
    <button class="icon-btn" onclick="openFavModal()" title="قائمة المفضلة">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="card picker-card">
    <label>اختر الإذاعة</label>
    <div class="custom-select-wrapper" id="customRadioDropdown">
      <div class="custom-select-trigger">
        <span class="selected-text">جاري التحميل...</span>
        <span class="arrow">▼</span>
      </div>
      <div class="custom-options" id="customOptionsList">
        </div>
    </div>
  </div>

  <div class="card now">
    <div class="nowStation" id="nowStation">اختر إذاعة للبدء</div>
    
    <div class="live-indicator" id="liveIndicator">
      <div class="pulse-dot"></div>
      <span id="liveText">متوقف</span>
    </div>

    <div class="controls">
      <button class="action-btn fill-icon" id="favBtn" title="إضافة للمفضلة">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </button>

      <button class="play-pause-btn" id="mainPlayBtn">
        <div class="loader" id="loader"></div>
        <svg id="playIcon" class="play-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline webkit-playsinline></audio>
</div>

<div class="modal-overlay" id="favModal" onclick="if(event.target === this) closeFavModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span>الإذاعات المفضلة</span>
      <button class="close-btn" onclick="closeFavModal()">✕</button>
    </div>
    <div class="fav-list" id="favList"></div>
  </div>
</div>

<script>
function showToast(msg) { const toast = document.getElementById("toast"); toast.innerText = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 2500); }

function updateThemeIcon(theme) {
  const sunIcon = document.getElementById('sunIcon'), moonIcon = document.getElementById('moonIcon');
  if(theme === 'light') { sunIcon.style.display = 'none'; moonIcon.style.display = 'block'; } 
  else { sunIcon.style.display = 'block'; moonIcon.style.display = 'none'; }
}

function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem("themeMode", newTheme);
  updateThemeIcon(newTheme);
}

const radioStations = [
  {"name":"إذاعة القرآن الكريم - القاهرة","url":"https://n0b.radiojar.com/8s5u5tpdtwzuv"},
  {"name":"إذاعة القرآن الكريم - مكة","url":"https://stream.radiojar.com/0tpy1h0kxtzuv"},
  {"name":"إذاعة القرآن الكريم - الشارقة","url":"https://svs.itworkscdn.net/smcquranlive/quranradiolive/playlist.m3u8"},
  { name: "إذاعة القرآن الكريم (عامة)", url: "https://qurango.net/radio/tarateel" },
  { name: "إذاعة عبدالباسط عبدالصمد", url: "https://qurango.net/radio/abdulbasit_abdulsamad" },
  { name: "إذاعة محمود خليل الحصري", url: "https://qurango.net/radio/mahmoud_khalil_alhussary" },
  { name: "إذاعة عبدالرحمن السديس", url: "https://qurango.net/radio/abdulrahman_alsudaes" },
  { name: "إذاعة ياسر الدوسري", url: "https://qurango.net/radio/yasser_aldosari" },
  { name: "إذاعة ماهر المعيقلي", url: "https://qurango.net/radio/maher_almuaiqly" },
  { name: "إذاعة الرقية الشرعية", url: "https://qurango.net/radio/roqiah" },
  { name: "إذاعة أذكار الصباح والمساء", url: "https://qurango.net/radio/athkar_sabah" }
];

let selectedStationIndex = 0;
let currentTrackUrl = "";
let hls = null;

const audio = document.getElementById("audio");
const mainPlayBtn = document.getElementById("mainPlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const nowStation = document.getElementById("nowStation");
const liveIndicator = document.getElementById("liveIndicator");
const liveText = document.getElementById("liveText");
const favBtn = document.getElementById("favBtn");

const dropdownTrigger = document.querySelector('.custom-select-trigger');
const dropdownOptions = document.getElementById('customOptionsList');
const selectedText = document.querySelector('.selected-text');


// 🔴 استخدام مسارات الصور المحلية لضمان عدم رفض النظام للجلسة في شاشة القفل 🔴
const RADIO_ARTWORK = [
    { src: 'icons/icon-192.png', sizes: '192x192', type: 'image/png' },
    { src: 'icons/icon_512.png', sizes: '512x512', type: 'image/png' },
    { src: 'icons/icon_1024.png', sizes: '1024x1024', type: 'image/png' }
];

function updateMediaSession(stationName) {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: stationName || "إذاعة القرآن الكريم",
      artist: 'البث المباشر',
      album: 'زاد المسلم',
      artwork: RADIO_ARTWORK
    });

    navigator.mediaSession.setActionHandler('play', () => { togglePlay(); });
    navigator.mediaSession.setActionHandler('pause', () => { togglePlay(); });
    navigator.mediaSession.setActionHandler('stop', () => { audio.pause(); });
  }
}

function initRadios() {
  dropdownOptions.innerHTML = '';
  
  radioStations.forEach((station, index) => {
    let option = document.createElement("div");
    option.className = "custom-option";
    option.textContent = station.name;
    option.setAttribute("data-url", station.url);
    
    option.addEventListener("click", () => {
      selectedText.textContent = station.name;
      document.querySelectorAll('.custom-option').forEach(opt => opt.classList.remove('selected'));
      option.classList.add('selected');
      
      dropdownTrigger.classList.remove('open');
      dropdownOptions.classList.remove('open');
      
      selectedStationIndex = index;
      prepareStation(station.url, station.name);
      
      audio.play().catch(e => showToast("انقر للتشغيل"));
    });
    
    dropdownOptions.appendChild(option);
  });

  if(radioStations.length > 0) {
    let lastTrack = localStorage.getItem("radio_lastTrack");
    let foundIndex = radioStations.findIndex(s => s.url === lastTrack);
    
    if (foundIndex !== -1) {
      selectedStationIndex = foundIndex;
      selectedText.textContent = radioStations[foundIndex].name;
      dropdownOptions.children[foundIndex].classList.add('selected');
      prepareStation(radioStations[foundIndex].url, radioStations[foundIndex].name, false);
    } else {
      selectedText.textContent = radioStations[0].name;
      dropdownOptions.firstChild.classList.add('selected');
      prepareStation(radioStations[0].url, radioStations[0].name, false);
    }
  }
}

dropdownTrigger.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownTrigger.classList.toggle('open');
  dropdownOptions.classList.toggle('open');
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('customRadioDropdown').contains(e.target)) {
    dropdownTrigger.classList.remove('open');
    dropdownOptions.classList.remove('open');
  }
});

// 🔴 الأولوية القصوى للمشغل الداخلي (Native) للعمل في الخلفية 🔴
function loadStream(url) {
  if (url.includes('.m3u8')) {
    if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      if (hls) { hls.destroy(); hls = null; }
      audio.src = url;
      audio.load();
    } else if (Hls.isSupported()) {
      if (hls) hls.destroy(); 
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(audio);
    }
  } else {
    if (hls) { hls.destroy(); hls = null; }
    audio.src = url;
    audio.load();
  }
}

function prepareStation(url, stationName, updateSession = true) {
  if(currentTrackUrl !== url) {
    audio.pause();
    loadStream(url);
    currentTrackUrl = url;
    nowStation.innerText = stationName;
    updatePlayPauseUI(false);
    checkFavStatus();
    localStorage.setItem("radio_lastTrack", url);
    
    if(updateSession) updateMediaSession(stationName);
  }
}

function togglePlay() {
  if(!currentTrackUrl) return showToast("اختر إذاعة أولاً");
  if (audio.paused) {
      audio.play().then(() => {
          updateMediaSession(nowStation.innerText);
      }).catch(e => showToast("تعذر الاتصال بالبث"));
  } else {
      audio.pause();
  }
}

mainPlayBtn.onclick = togglePlay;

audio.addEventListener('loadstart', () => { 
    mainPlayBtn.classList.add('loading'); 
});

audio.addEventListener('play', () => { 
    mainPlayBtn.classList.add('loading'); 
});

audio.addEventListener('playing', () => { 
    mainPlayBtn.classList.remove('loading'); 
    updatePlayPauseUI(true); 
    // 🔴 تحديث الجلسة فوراً لضمان عدم إسقاط الهاتف للاتصال 🔴
    updateMediaSession(nowStation.innerText);
});

audio.addEventListener('waiting', () => { mainPlayBtn.classList.add('loading'); });

audio.addEventListener('pause', () => { 
    mainPlayBtn.classList.remove('loading'); 
    updatePlayPauseUI(false); 
});

audio.addEventListener('error', () => {
  mainPlayBtn.classList.remove('loading');
  updatePlayPauseUI(false);
  nowStation.innerText = "⚠️ البث معطل حالياً";
  showToast("تعذر الاتصال بخادم الإذاعة");
});

function updatePlayPauseUI(isPlaying) {
  if (isPlaying) {
    playIcon.style.display = "none"; pauseIcon.style.display = "block";
    liveIndicator.classList.add("playing"); liveText.innerText = "مباشر";
  } else {
    playIcon.style.display = "block"; pauseIcon.style.display = "none";
    liveIndicator.classList.remove("playing"); liveText.innerText = "متوقف";
  }
}

function openFavModal() {
  document.getElementById('favModal').classList.add('active');
  renderFavList();
}

function closeFavModal() {
  document.getElementById('favModal').classList.remove('active');
}

favBtn.onclick = () => {
  if(!currentTrackUrl) return;
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"), exists = favs.findIndex(f => f.url === currentTrackUrl);
  if(exists === -1) { 
      favs.push({ name: nowStation.innerText, url: currentTrackUrl }); 
      showToast("تمت الإضافة للمفضلة"); 
  } else { 
      favs.splice(exists, 1); showToast("تمت الإزالة"); 
  }
  localStorage.setItem("radio_favorites", JSON.stringify(favs)); 
  checkFavStatus();
  if(document.getElementById('favModal').classList.contains('active')) renderFavList();
};

function checkFavStatus() { 
    let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"); 
    document.getElementById("favBtn").classList.toggle("active", favs.some(f => f.url === currentTrackUrl)); 
}

function renderFavList() {
  const list = document.getElementById('favList');
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
  list.innerHTML = favs.length === 0 ? '<div style="text-align:center; padding:30px; opacity:0.5; color: var(--text-primary);">لا توجد إذاعات مفضلة</div>' : '';
  favs.forEach((fav, index) => {
    let div = document.createElement('div');
    div.className = 'fav-item';
    div.innerHTML = `
      <div class="fav-item-info" onclick="playFromFav('${fav.url}', '${fav.name}')" style="width: 85%;">
        <div class="fav-item-surah">${fav.name}</div>
      </div>
      <button class="delete-fav-btn" onclick="removeFav(${index}, event)" title="حذف">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    `;
    list.appendChild(div);
  });
}

function playFromFav(url, name) { 
    let foundIndex = radioStations.findIndex(s => s.url === url);
    if (foundIndex !== -1) {
        selectedStationIndex = foundIndex;
        selectedText.textContent = name;
        document.querySelectorAll('.custom-option').forEach(opt => {
          opt.classList.remove('selected');
          if(opt.getAttribute('data-url') === url) opt.classList.add('selected');
        });
    }
    prepareStation(url, name); 
    
    audio.play().then(() => {
        updateMediaSession(name);
    }).catch(()=>{}); 
    
    closeFavModal(); 
}

function removeFav(index, e) { 
    e.stopPropagation(); 
    let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"); 
    favs.splice(index, 1); 
    localStorage.setItem("radio_favorites", JSON.stringify(favs)); 
    renderFavList(); checkFavStatus(); showToast("تم الحذف"); 
}

window.addEventListener("load", () => {
  let savedTheme = localStorage.getItem("themeMode") || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
  initRadios();
});
</script>
</body>
</html>
