<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>إذاعة القرآن الكريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* --- 2-THEME GLASSMORPHISM SYSTEM --- */
:root {
  --bg-image: url('images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5); 
  --text-primary: #F8FAFC; 
  --text-secondary: #CBD5E1;
  --accent-main: #34D399; 
  --accent-muted: rgba(255, 255, 255, 0.15);
  --glass: rgba(15, 23, 42, 0.4); 
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.2); 
  --live-color: #ef4444; 
}

[data-theme="light"] {
  --bg-image: url('images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.35); 
  --text-primary: #0F172A; 
  --text-secondary: #475569;
  --accent-main: #059669; 
  --accent-muted: rgba(0, 0, 0, 0.05);
  --glass: rgba(255, 255, 255, 0.2); 
  --glass-border: rgba(255, 255, 255, 0.4); 
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
  --overlay: rgba(255, 255, 255, 0.1); 
  --live-color: #dc2626;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface);
  background-image: var(--bg-image);
  background-size: cover; background-position: center;
  background-attachment: fixed; background-repeat: no-repeat;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: 20px 20px 100px; min-height: 100dvh;
  transition: color 0.3s ease, background-image 0.3s ease;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background: var(--overlay); z-index: -1; transition: background 0.3s ease;
}

.app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 16px; padding: 14px 16px;
}
.header-title { font-weight: bold; font-size: 18px; color: var(--text-primary); }
.icon-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.icon-btn:active { opacity: 0.7; transform: scale(0.9); }

/* Cards */
.card {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 20px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
label { font-size: 14px; color: var(--accent-main); font-weight: bold; }

/* Custom Select Buttons (Open Full Screen) */
.custom-select-btn {
  padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--bg-surface); color: var(--text-primary); font-size: 16px;
  font-family: inherit; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: 0.3s;
}
.custom-select-btn:after { content: '▼'; font-size: 12px; opacity: 0.6; }

/* Main Player Area */
.now {
  text-align: center; padding: 40px 20px;
  background: linear-gradient(145deg, var(--glass), var(--accent-muted));
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.nowStation { font-family: 'Amiri', serif; font-size: 24px; margin-bottom: 12px; line-height: 1.4; color: var(--text-primary); }

/* Live Indicator */
.live-indicator {
  display: flex; align-items: center; gap: 8px; color: var(--text-secondary);
  font-weight: bold; font-size: 14px; margin-bottom: 25px; transition: color 0.3s;
}
.live-indicator.playing { color: var(--live-color); }
.pulse-dot { width: 10px; height: 10px; background: var(--text-secondary); border-radius: 50%; transition: background 0.3s; }
.live-indicator.playing .pulse-dot { background: var(--live-color); animation: pulse 1.5s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* Controls */
.controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
.play-pause-btn {
  width: 70px; height: 70px; border-radius: 50%; background: var(--accent-main); color: #FFFFFF; border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.2s; flex-shrink: 0; position: relative;
}
.play-pause-btn:active { transform: scale(0.92); }
.play-pause-btn svg { width: 30px; height: 30px; fill: currentColor; }

.action-btn {
  background: var(--accent-muted); border: 1px solid var(--glass-border); width: 50px; height: 50px; border-radius: 50%; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;
}
.action-btn:active { transform: scale(0.9); }
.action-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.action-btn.active { background: var(--bg-surface); border-color: var(--accent-main); color: var(--accent-main); }
.action-btn.active svg { stroke: var(--accent-main); }
.action-btn.active.fill-icon svg { fill: var(--accent-main); }

/* Loader */
.loader {
  display: none; position: absolute; width: 30px; height: 30px;
  border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
  border-top-color: #FFFFFF; animation: spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading .play-icon { display: none !important; }
.loading .loader { display: block; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
  background: var(--accent-main); color: #FFFFFF; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
  backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 1000;
}
.toast.show { transform: translate(-50%, 0); }

/* Selection Modal (Full Screen Glass Roller) */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  z-index: 9999; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-content { display: flex; flex-direction: column; height: 100%; padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); color: var(--text-primary); }
.close-btn { background: none; border: none; color: inherit; font-size: 1.5rem; cursor: pointer; opacity: 0.8; }
.selection-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 5px; }
.selection-list::-webkit-scrollbar { width: 6px; }
.selection-list::-webkit-scrollbar-track { background: var(--accent-muted); border-radius: 10px; }
.selection-list::-webkit-scrollbar-thumb { background: var(--accent-main); border-radius: 10px; }
.selection-item { padding: 20px 15px; border-radius: 16px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 18px; font-weight: bold; text-align: center; transition: 0.2s; cursor: pointer; }
.selection-item.active { background: var(--accent-main); color: #fff; border-color: var(--accent-main); }
.fav-item-container { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 10px; }
.fav-info { display: flex; flex-direction: column; gap: 6px; cursor: pointer; width: 85%; }
.fav-surah { font-weight: bold; color: var(--accent-main); font-size: 18px;}
.delete-fav-btn { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: none; padding: 10px; border-radius: 12px; cursor: pointer; }
</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء بنجاح</div>

<div class="app">
  <div class="header">
    <div style="display: flex; gap: 10px;">
      <button class="icon-btn" onclick="window.location.href='index.html'" title="الرئيسية">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="تبديل المظهر">
        <svg id="sunIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moonIcon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    <div class="header-title">إذاعة القرآن الكريم</div>
    <button class="icon-btn" onclick="openFavModal()" title="قائمة المفضلة">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="card">
    <label>اختر الإذاعة</label>
    <div class="custom-select-btn" id="radioSelectBtn" onclick="openRadioModal()">جاري التحميل...</div>
  </div>

  <div class="card now">
    <div class="nowStation" id="nowStation">اختر إذاعة للبدء</div>
    
    <div class="live-indicator" id="liveIndicator">
      <div class="pulse-dot"></div>
      <span id="liveText">متوقف</span>
    </div>

    <div class="controls">
      <button class="action-btn fill-icon" id="favBtn" title="إضافة للمفضلة">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </button>

      <button class="play-pause-btn" id="mainPlayBtn">
        <div class="loader" id="loader"></div>
        <svg id="playIcon" class="play-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
    </div>
  </div>

  <audio id="audio" preload="none" playsinline></audio>
</div>

<div class="modal-overlay" id="selectionModal" onclick="if(event.target === this) closeSelectionModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span id="selectionModalTitle">العنوان</span>
      <button class="close-btn" onclick="closeSelectionModal()">✕</button>
    </div>
    <div class="selection-list" id="selectionList"></div>
  </div>
</div>

<script>
function showToast(msg) { const toast = document.getElementById("toast"); toast.innerText = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 2500); }

function updateThemeIcon(theme) {
  const sunIcon = document.getElementById('sunIcon'), moonIcon = document.getElementById('moonIcon');
  if(theme === 'light') { sunIcon.style.display = 'none'; moonIcon.style.display = 'block'; } 
  else { sunIcon.style.display = 'block'; moonIcon.style.display = 'none'; }
}

function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem("themeMode", newTheme);
  updateThemeIcon(newTheme);
}

// Global Radio Data
let appData = { stations: [] };
let selectedStationIndex = 0;
let currentTrackUrl = "";
let hls = null;

const audio = document.getElementById("audio");
const radioSelectBtn = document.getElementById("radioSelectBtn");
const mainPlayBtn = document.getElementById("mainPlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const nowStation = document.getElementById("nowStation");
const liveIndicator = document.getElementById("liveIndicator");
const liveText = document.getElementById("liveText");
const favBtn = document.getElementById("favBtn");

// --- SMART PARALLEL JSON LOADER FOR RADIO ---
async function loadMultipleJSONs() {
  try {
    const fetchPromises = [];
    for (let i = 1; i <= 20; i++) {
      let fileNum = i < 10 ? '0' + i : i;
      // جلب البيانات من المجلد الرئيسي كما في الصوتيات
      let filePath = `json/radio-${fileNum}.json?v=${new Date().getTime()}`;
      fetchPromises.push(fetch(filePath));
    }
    const responses = await Promise.allSettled(fetchPromises);
    for (let result of responses) {
      if (result.status === "fulfilled" && result.value.ok) {
        let data = await result.value.json();
        if (data && data.stations) appData.stations.push(...data.stations);
      }
    }
    if (appData.stations.length > 0) initData();
    else throw new Error("No data found");
  } catch (error) {
    radioSelectBtn.innerText = "تعذر تحميل البيانات";
    showToast("يرجى التأكد من ملفات json للإذاعة");
  }
}

function initData() {
  if (appData.stations.length === 0) return;
  radioSelectBtn.innerText = appData.stations[selectedStationIndex].name;
  
  let lastTrack = localStorage.getItem("radio_lastTrack");
  if (lastTrack && lastTrack !== "undefined" && lastTrack.startsWith("http")) {
    let foundIndex = appData.stations.findIndex(s => s.url === lastTrack);
    if (foundIndex !== -1) selectedStationIndex = foundIndex;
    
    currentTrackUrl = lastTrack; 
    nowStation.innerText = appData.stations[selectedStationIndex].name;
    radioSelectBtn.innerText = appData.stations[selectedStationIndex].name;
    loadStream(lastTrack);
    checkFavStatus();
    updateMediaSession(nowStation.innerText);
  } else {
    prepareStation();
  }
}

function closeSelectionModal() { document.getElementById('selectionModal').classList.remove('active'); }

function openRadioModal() {
  if (appData.stations.length === 0) return;
  document.getElementById('selectionModalTitle').innerText = "اختر الإذاعة";
  const list = document.getElementById('selectionList');
  list.innerHTML = '';
  appData.stations.forEach((s, i) => {
    let div = document.createElement('div');
    div.className = 'selection-item' + (i === selectedStationIndex ? ' active' : '');
    div.innerText = s.name;
    div.onclick = () => { 
        selectedStationIndex = i; 
        radioSelectBtn.innerText = s.name; 
        prepareStation(); 
        closeSelectionModal(); 
        audio.play().catch(()=>{}); 
    };
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
  scrollToActive(list);
}

function scrollToActive(container) {
  setTimeout(() => {
    const activeItem = container.querySelector('.active');
    if(activeItem) activeItem.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 50);
}

function loadStream(url) {
  if (url.includes('.m3u8')) {
    if (Hls.isSupported()) {
      if (hls) hls.destroy(); 
      hls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: true });
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
            default: hls.destroy(); break;
          }
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
    }
  } else {
    if (hls) { hls.destroy(); hls = null; }
    audio.src = url;
  }
}

function prepareStation() {
  if(appData.stations.length === 0) return; 
  let url = appData.stations[selectedStationIndex].url;
  let stationName = appData.stations[selectedStationIndex].name;

  if(currentTrackUrl !== url) {
    audio.pause();
    loadStream(url);
    currentTrackUrl = url;
    
    nowStation.innerText = stationName;
    updatePlayPauseUI(false);
    checkFavStatus();
    
    localStorage.setItem("radio_lastTrack", url);
    localStorage.setItem("radio_lastStation", stationName);
    updateMediaSession(stationName);
  }
}

// ================= MEDIA SESSION API =================
function updateMediaSession(title) {
  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || "إذاعة القرآن الكريم",
      artist: "البث المباشر",
      album: "زاد المسلم Pro",
      artwork: [{ src: "icon.png", sizes: "512x512", type: "image/png" }]
    });
    navigator.mediaSession.setActionHandler("play", () => audio.play());
    navigator.mediaSession.setActionHandler("pause", () => audio.pause());
    navigator.mediaSession.setActionHandler("previoustrack", () => playPrevStation());
    navigator.mediaSession.setActionHandler("nexttrack", () => playNextStation());
  }
}

function playNextStation() {
  if (appData.stations.length === 0) return;
  selectedStationIndex = (selectedStationIndex + 1) % appData.stations.length;
  radioSelectBtn.innerText = appData.stations[selectedStationIndex].name;
  prepareStation(); audio.play().catch(()=>{});
}

function playPrevStation() {
  if (appData.stations.length === 0) return;
  selectedStationIndex = (selectedStationIndex - 1 + appData.stations.length) % appData.stations.length;
  radioSelectBtn.innerText = appData.stations[selectedStationIndex].name;
  prepareStation(); audio.play().catch(()=>{});
}

function togglePlay() {
  if(!currentTrackUrl) return showToast("اختر إذاعة أولاً");
  if (audio.paused) audio.play().catch(e => showToast("تعذر الاتصال بالبث"));
  else audio.pause();
}

mainPlayBtn.onclick = togglePlay;

// Audio Events for Radio
audio.addEventListener('play', () => { mainPlayBtn.classList.add('loading'); });
audio.addEventListener('playing', () => { 
  mainPlayBtn.classList.remove('loading'); 
  updatePlayPauseUI(true); 
  updateMediaSession(nowStation.innerText);
});
audio.addEventListener('waiting', () => { mainPlayBtn.classList.add('loading'); });
audio.addEventListener('pause', () => { mainPlayBtn.classList.remove('loading'); updatePlayPauseUI(false); });
audio.addEventListener('error', () => {
  mainPlayBtn.classList.remove('loading');
  updatePlayPauseUI(false);
  nowStation.innerText = "⚠️ البث معطل حالياً";
  showToast("تعذر الاتصال بخادم الإذاعة");
});

function updatePlayPauseUI(isPlaying) {
  if (isPlaying) {
    playIcon.style.display = "none"; pauseIcon.style.display = "block";
    liveIndicator.classList.add("playing"); liveText.innerText = "مباشر";
  } else {
    playIcon.style.display = "block"; pauseIcon.style.display = "none";
    liveIndicator.classList.remove("playing"); liveText.innerText = "متوقف";
  }
}

// --- Favorites Modal & Logic ---
function openFavModal() {
  document.getElementById('selectionModalTitle').innerText = "الإذاعات المفضلة";
  const list = document.getElementById('selectionList');
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
  list.innerHTML = favs.length === 0 ? '<div style="text-align:center; padding:30px; opacity:0.5; color: var(--text-primary);">لا توجد إذاعات مفضلة</div>' : '';
  favs.forEach((fav, index) => {
    let div = document.createElement('div');
    div.className = 'fav-item-container';
    div.innerHTML = `
      <div class="fav-info" onclick="playFromFav('${fav.url}', '${fav.name}')">
        <div class="fav-surah">${fav.name}</div>
      </div>
      <button class="delete-fav-btn" onclick="removeFav(${index}, event)" title="حذف">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      </button>
    `;
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
}

favBtn.onclick = () => {
  if(!currentTrackUrl) return;
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"), exists = favs.findIndex(f => f.url === currentTrackUrl);
  if(exists === -1) { 
      favs.push({ name: nowStation.innerText, url: currentTrackUrl }); 
      showToast("تمت الإضافة للمفضلة"); 
  } else { 
      favs.splice(exists, 1); showToast("تمت الإزالة"); 
  }
  localStorage.setItem("radio_favorites", JSON.stringify(favs)); 
  checkFavStatus();
  if(document.getElementById('selectionModal').classList.contains('active')) openFavModal();
};

function checkFavStatus() { 
    let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"); 
    document.getElementById("favBtn").classList.toggle("active", favs.some(f => f.url === currentTrackUrl)); 
}

function playFromFav(url, name) { 
    let foundIndex = appData.stations.findIndex(s => s.url === url);
    if (foundIndex !== -1) {
        selectedStationIndex = foundIndex;
        radioSelectBtn.innerText = name;
    }
    prepareStation(); audio.play().catch(()=>{}); closeSelectionModal(); 
}

function removeFav(index, e) { 
    e.stopPropagation(); 
    let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]"); 
    favs.splice(index, 1); 
    localStorage.setItem("radio_favorites", JSON.stringify(favs)); 
    openFavModal(); checkFavStatus(); showToast("تم الحذف"); 
}

// --- App Launch ---
window.addEventListener("load", () => {
  let savedTheme = localStorage.getItem("themeMode") || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
  loadMultipleJSONs();
});
</script>
</body>
</html>
