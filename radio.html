<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>إذاعة القرآن الكريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* ================= THEMES ================= */
:root {
  --primary: #10b981;
  --bg: #020617;
  --bg-top: #1e293b;
  --glass: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.1);
  --text: #f8fafc;
  --muted: #94a3b8;
  --card-bg: rgba(30, 41, 59, 0.7);
  --input-bg: rgba(0, 0, 0, 0.2);
  --action-bg: rgba(255, 255, 255, 0.05);
  --action-hover: rgba(255, 255, 255, 0.1);
  --mini-bg: rgba(15, 23, 42, 0.95);
  --play-text: #020617;
  --live-color: #ef4444; 
}

body[data-theme="sepia"] {
  --primary: #059669; 
  --bg: #e5d5b5;
  --bg-top: #f4eadd;
  --glass: rgba(255, 255, 255, 0.4);
  --border: rgba(179, 139, 93, 0.3);
  --text: #2a1f14;
  --muted: #5c4b37;
  --card-bg: rgba(230, 216, 184, 0.6);
  --input-bg: rgba(255, 255, 255, 0.5);
  --action-bg: rgba(0, 0, 0, 0.05);
  --action-hover: rgba(0, 0, 0, 0.1);
  --mini-bg: rgba(229, 213, 181, 0.95);
  --play-text: #ffffff;
  --live-color: #dc2626;
}

body[data-theme="light"] {
  --primary: #10b981;
  --bg: #f1f5f9;
  --bg-top: #ffffff;
  --glass: rgba(255, 255, 255, 0.7);
  --border: rgba(0, 0, 0, 0.08);
  --text: #0f172a;
  --muted: #64748b;
  --card-bg: rgba(255, 255, 255, 0.8);
  --input-bg: rgba(0, 0, 0, 0.04);
  --action-bg: rgba(0, 0, 0, 0.05);
  --action-hover: rgba(0, 0, 0, 0.1);
  --mini-bg: rgba(255, 255, 255, 0.95);
  --play-text: #ffffff;
  --live-color: #ef4444;
}

/* ================= RESET ================= */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  background: radial-gradient(circle at 50% 0%, var(--bg-top), var(--bg));
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px 20px 100px; 
  min-height: 100dvh;
  transition: background 0.4s ease, color 0.4s ease;
}

.app {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ================= HEADER & THEMES ================= */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 14px 16px;
  transition: 0.4s ease;
}

.header-title { font-weight: bold; font-size: 18px; }

.icon-btn { 
  background: none; border: none; color: var(--text); 
  cursor: pointer; padding: 5px; display: flex; 
  align-items: center; justify-content: center; transition: 0.2s; 
}
.icon-btn:active { opacity: 0.7; transform: scale(0.9); }

.theme-toggles {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin: -4px 0 4px 0;
}

.theme-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.theme-btn.dark { background: #1e293b; }
.theme-btn.sepia { background: #e5d5b5; }
.theme-btn.light { background: #f8fafc; }
.theme-btn.active { 
  border-color: var(--primary); 
  transform: scale(1.2); 
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
}

/* ================= CARDS ================= */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: 0.4s ease;
}

label {
  font-size: 14px;
  color: var(--primary);
  font-weight: 500;
}

select {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  appearance: none;
  transition: 0.4s ease;
}
select:focus { border-color: var(--primary); }
select option { background: var(--bg-top); color: var(--text); }

/* ================= PLAYER AREA ================= */
.now {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(145deg, var(--card-bg), var(--action-bg));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.nowStation { font-family: 'Amiri', serif; font-size: 24px; margin-bottom: 12px; line-height: 1.4; }

/* Live Indicator */
.live-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 25px;
  transition: color 0.3s;
}
.live-indicator.playing { color: var(--live-color); }

.pulse-dot {
  width: 10px; height: 10px;
  background: var(--muted);
  border-radius: 50%;
  transition: background 0.3s;
}
.live-indicator.playing .pulse-dot {
  background: var(--live-color);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* Controls */
.controls {
  display: flex; justify-content: center; align-items: center;
  gap: 20px; margin-top: 10px;
}

.play-pause-btn {
  width: 70px; height: 70px; border-radius: 50%;
  background: var(--primary); color: var(--play-text);
  border: none; display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
  transition: transform 0.2s, background 0.4s, color 0.4s; flex-shrink: 0;
}
.play-pause-btn:active { transform: scale(0.92); }
.play-pause-btn svg { width: 30px; height: 30px; fill: currentColor; }

.action-btn {
  background: var(--action-bg); border: 1px solid var(--border);
  width: 50px; height: 50px; border-radius: 50%; color: var(--text);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s; flex-shrink: 0;
}
.action-btn:active { background: var(--action-hover); transform: scale(0.9); }
.action-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
.action-btn.active { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.4); color: var(--primary); }
.action-btn.active.fill-icon svg { fill: var(--primary); stroke: var(--primary); }

/* ================= MODAL & TOAST ================= */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
  background: rgba(16, 185, 129, 0.95); color: #fff; padding: 12px 24px;
  border-radius: 30px; font-size: 14px; font-weight: bold; backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 1000;
}
.toast.show { transform: translate(-50%, 0); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px); z-index: 100; display: flex;
  align-items: center; justify-content: center; padding: 20px;
  opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }

.modal-content {
  background: var(--mini-bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 20px; width: 100%; max-width: 440px;
  max-height: 80vh; display: flex; flex-direction: column;
  transform: translateY(20px); transition: 0.3s ease; color: var(--text);
}
.modal-overlay.active .modal-content { transform: translateY(0); }

.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.close-btn { background: none; border: none; color: inherit; font-size: 1.2rem; cursor: pointer; opacity: 0.7; }

.fav-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.fav-list::-webkit-scrollbar { width: 4px; }
.fav-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

.fav-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--action-bg); padding: 12px 15px;
  border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
}
.fav-item:active { transform: scale(0.98); }
.fav-item:hover { background: var(--action-hover); border-color: rgba(16, 185, 129, 0.3); }
.fav-item-info { display: flex; flex-direction: column; gap: 4px; }
.fav-item-surah { font-weight: bold; color: var(--primary); font-size: 1.05rem; }
.delete-fav-btn {
  background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none;
  padding: 8px; border-radius: 8px; cursor: pointer;
}

/* Spinner Loader */
.loader {
  display: none;
  width: 24px;
  height: 24px;
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: var(--text);
  animation: spin 1s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading .play-icon { display: none !important; }
.loading .loader { display: block; }
</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء بنجاح</div>

<div class="app">

  <div class="header">
    <button class="icon-btn" onclick="window.location.href='index.html'" title="الرئيسية">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>
    
    <div class="header-title">إذاعة القرآن الكريم</div>
    
    <button class="icon-btn" onclick="openFavModal()" title="قائمة الإذاعات المفضلة">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="theme-toggles">
    <div class="theme-btn dark" onclick="setTheme('dark')" title="داكن"></div>
    <div class="theme-btn sepia" onclick="setTheme('sepia')" title="مريح للعين"></div>
    <div class="theme-btn light" onclick="setTheme('light')" title="فاتح"></div>
  </div>

  <div class="card">
    <label>اختر الإذاعة</label>
    <select id="radioSelect"></select>
  </div>

  <div class="card now">
    <div class="nowStation" id="nowStation">اختر إذاعة للبدء</div>
    
    <div class="live-indicator" id="liveIndicator">
      <div class="pulse-dot"></div>
      <span id="liveText">متوقف</span>
    </div>

    <div class="controls">
      
      <button class="action-btn fill-icon" id="favBtn" title="إضافة للمفضلة">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>

      <button class="play-pause-btn" id="mainPlayBtn">
        <div class="loader" id="loader"></div>
        <svg id="playIcon" class="play-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>

    </div>
  </div>

  <audio id="audio" preload="none" playsinline></audio>

</div>

<div class="modal-overlay" id="favModal" onclick="if(event.target === this) closeFavModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span>الإذاعات المفضلة</span>
      <button class="close-btn" onclick="closeFavModal()">✕</button>
    </div>
    <div class="fav-list" id="favList"></div>
  </div>
</div>

<script>
// ================= نظام الثيمات ================= //
function setTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('radio_theme', theme);
  
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.classList.contains(theme)) btn.classList.add('active');
  });
}
const savedTheme = localStorage.getItem('radio_theme') || 'dark';
setTheme(savedTheme);


// ================= القائمة المطلوبة (بالروابط الأصلية تماماً) ================= //
const radioStations = [
  {"name":"إذاعة القرآن الكريم - القاهرة","url":"http://n0b.radiojar.com/8s5u5tpdtwzuv"},
  {"name":"إذاعة القرآن الكريم - مكة","url":"https://stream.radiojar.com/0tpy1h0kxtzuv"},
  {"name":"إذاعة القرآن الكريم - الشارقة","url":"https://svs.itworkscdn.net/smcquranlive/quranradiolive/playlist.m3u8"},
  {"name":"إذاعة القرآن الكريم - الكويت","url":"http://qurankw.itworkscdn.net/quranlive/quranradiolive/playlist.m3u8"},
  {"name":"إذاعة القرآن الكريم - قطر","url":"https://qatarradio-live.hls.adaptive.level3.net/qatarradio/quran/playlist.m3u8"},
  {"name":"إذاعة القرآن الكريم - البحرين","url":"https://5c7b683162943.streamlock.net/live/ngrp:quran_all/playlist.m3u8"},
  {"name":"إذاعة القرآن الكريم - الأردن","url":"https://jrtv-live.ercdn.net/jrtv/quran.m3u8"},
  {"name":"إذاعة محمد السادس للقرآن الكريم","url":"https://cdnamd-hls-globecast.akamaized.net/live/ramdisk/radio_mohammed_vi/hls_snrt_radio/index.m3u8"},
  {"name":"إذاعة القرآن الكريم - الجزائر","url":"https://webradio.tda.dz/Coran_64K.mp3"},
  { name: "إذاعة القرآن الكريم (عامة)", url: "https://qurango.net/radio/tarateel" },
  { name: "إذاعة عبدالباسط عبدالصمد", url: "https://qurango.net/radio/abdulbasit_abdulsamad" },
  { name: "إذاعة محمود خليل الحصري", url: "https://qurango.net/radio/mahmoud_khalil_alhussary" },
  { name: "إذاعة عبدالرحمن السديس", url: "https://qurango.net/radio/abdulrahman_alsudaes" },
  { name: "إذاعة ياسر الدوسري", url: "https://qurango.net/radio/yasser_aldosari" },
  { name: "إذاعة ماهر المعيقلي", url: "https://qurango.net/radio/maher_almuaiqly" },
  { name: "إذاعة سعد الغامدي", url: "https://qurango.net/radio/saad_alghamdi" },
  { name: "إذاعة سعود الشريم", url: "https://qurango.net/radio/saud_alshuraim" },
  { name: "إذاعة الرقية الشرعية", url: "https://qurango.net/radio/roqiah" },
  { name: "إذاعة أذكار الصباح والمساء", url: "https://qurango.net/radio/athkar_sabah" },
  { name: "إذاعة الفتاوى", url: "https://qurango.net/radio/fatwa" }
];

const audio = document.getElementById("audio");
const radioSelect = document.getElementById("radioSelect");
const mainPlayBtn = document.getElementById("mainPlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const nowStation = document.getElementById("nowStation");
const favBtn = document.getElementById("favBtn");
const liveIndicator = document.getElementById("liveIndicator");
const liveText = document.getElementById("liveText");

let currentTrackUrl = "";
let hls = null; 

function initRadios() {
  radioStations.forEach((station, index) => {
    let opt = document.createElement("option");
    opt.value = station.url;
    opt.textContent = station.name;
    radioSelect.appendChild(opt);
  });
  prepareStation();
}

// دالة التشغيل الذكية والمحدثة لتتجاوز قيود الـ CORS في الهواتف
function loadStream(url) {
  // تنظيف أي جلسة سابقة
  if (hls) {
    hls.destroy();
    hls = null;
  }
  
  if (url.includes('.m3u8')) {
    // المحاولة الأولى: التشغيل المباشر (Native)
    // الهواتف الذكية (آيفون وأغلب الأندرويد) تشغل m3u8 مباشرة من المتصفح بدون الحاجة لمكتبة خارجية مما يمنع مشكلة الـ CORS
    if (/iPad|iPhone|iPod|Android/i.test(navigator.userAgent) || audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url;
    } 
    // المحاولة الثانية: للكمبيوتر والمتصفحات الأخرى
    else if (Hls.isSupported()) {
      hls = new Hls({ debug: false });
      hls.loadSource(url);
      hls.attachMedia(audio);
      
      // إذا فشلت مكتبة HLS بسبب CORS، حاول إجبار الرابط المباشر
      hls.on(Hls.Events.ERROR, function (event, data) {
        if (data.fatal) {
          hls.destroy();
          audio.src = url;
        }
      });
    }
  } else {
    // ملفات mp3 عادية
    audio.src = url;
  }
}

function prepareStation() {
  if(radioSelect.options.length === 0) return; 

  let url = radioSelect.value;
  let stationName = radioSelect.options[radioSelect.selectedIndex].text;

  if(currentTrackUrl !== url) {
    audio.pause();
    loadStream(url);
    currentTrackUrl = url;
    
    nowStation.innerText = stationName;
    updatePlayPauseUI(false);
    checkFavStatus();
  }
}

radioSelect.addEventListener('change', () => {
  prepareStation();
  audio.play().catch(e => console.log('Waiting for user interaction')); 
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

mainPlayBtn.onclick = togglePlay;

// Audio Events
audio.addEventListener('play', () => {
  mainPlayBtn.classList.add('loading'); 
});

audio.addEventListener('playing', () => {
  mainPlayBtn.classList.remove('loading');
  updatePlayPauseUI(true);
});

audio.addEventListener('waiting', () => {
  mainPlayBtn.classList.add('loading');
});

audio.addEventListener('pause', () => {
  mainPlayBtn.classList.remove('loading');
  updatePlayPauseUI(false);
});

audio.addEventListener('error', () => {
  mainPlayBtn.classList.remove('loading');
  updatePlayPauseUI(false);
  nowStation.innerText = "⚠️ البث غير متاح حالياً";
});

function updatePlayPauseUI(isPlaying) {
  if (isPlaying) {
    playIcon.style.display = "none";
    pauseIcon.style.display = "block";
    liveIndicator.classList.add("playing");
    liveText.innerText = "مباشر";
  } else {
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
    liveIndicator.classList.remove("playing");
    liveText.innerText = "متوقف";
  }
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

// ================= Favorites System ================= //

favBtn.onclick = () => {
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
  let stationName = nowStation.innerText;
  let url = currentTrackUrl;

  let existsIndex = favs.findIndex(f => f.url === url);
  if(existsIndex === -1) {
    favs.push({ name: stationName, url: url });
    localStorage.setItem("radio_favorites", JSON.stringify(favs));
    showToast("تمت الإضافة للمفضلة بنجاح");
    favBtn.classList.add("active");
  } else {
    favs.splice(existsIndex, 1);
    localStorage.setItem("radio_favorites", JSON.stringify(favs));
    showToast("تمت الإزالة من المفضلة");
    favBtn.classList.remove("active");
  }
  renderFavList();
}

function checkFavStatus() {
   let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
   let exists = favs.find(f => f.url === currentTrackUrl);
   if(exists) favBtn.classList.add("active");
   else favBtn.classList.remove("active");
}

function openFavModal() {
  document.getElementById('favModal').classList.add('active');
  renderFavList();
}

function closeFavModal() {
  document.getElementById('favModal').classList.remove('active');
}

function renderFavList() {
  const list = document.getElementById('favList');
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
  list.innerHTML = '';
  
  if (favs.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5;">لا توجد إذاعات في المفضلة بعد</div>';
    return;
  }
  
  favs.forEach((fav, index) => {
    let div = document.createElement('div');
    div.className = 'fav-item';
    
    div.innerHTML = `
      <div class="fav-item-info" onclick="playFromFav('${fav.url}', '${fav.name}')">
        <div class="fav-item-surah">${fav.name}</div>
      </div>
      <button class="delete-fav-btn" onclick="removeFav(${index}, event)" title="حذف">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    `;
    list.appendChild(div);
  });
}

function playFromFav(url, name) {
  if(currentTrackUrl !== url) {
    audio.pause();
    loadStream(url);
    currentTrackUrl = url;
    nowStation.innerText = name;
    
    for(let i=0; i<radioSelect.options.length; i++) {
        if(radioSelect.options[i].value === url) {
            radioSelect.selectedIndex = i;
            break;
        }
    }
    
    checkFavStatus();
  }
  audio.play();
  closeFavModal();
}

function removeFav(index, event) {
  event.stopPropagation(); 
  let favs = JSON.parse(localStorage.getItem("radio_favorites") || "[]");
  favs.splice(index, 1);
  localStorage.setItem("radio_favorites", JSON.stringify(favs));
  renderFavList();
  checkFavStatus();
  showToast("تم الحذف بنجاح");
}

initRadios();

</script>
