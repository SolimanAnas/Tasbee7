<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>الاستماع للقرآن - زاد المسلم Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* --- نظام السمات الزجاجية (Glassmorphism) --- */
:root {
  --bg-image: url('images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5);
  --text-primary: #F8FAFC; 
  --text-secondary: #CBD5E1;
  --accent-main: #34D399; /* لون زمردي */
  --accent-muted: rgba(52, 211, 153, 0.2);
  --glass: rgba(15, 23, 42, 0.4); 
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.2); 
}

[data-theme="light"] {
  --bg-image: url('images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.35); 
  --text-primary: #0F172A; 
  --text-secondary: #475569;
  --accent-main: #059669; 
  --accent-muted: rgba(5, 150, 105, 0.1);
  --glass: rgba(255, 255, 255, 0.2); 
  --glass-border: rgba(255, 255, 255, 0.4); 
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
  --overlay: rgba(255, 255, 255, 0.1); 
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface);
  background-image: var(--bg-image);
  background-size: cover; background-position: center;
  background-attachment: fixed; background-repeat: no-repeat;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: 20px 20px 100px; min-height: 100dvh;
  transition: color 0.3s ease, background-image 0.3s ease;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background: var(--overlay); z-index: -1;
}

.app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 16px; padding: 14px 16px;
}
.header-title { font-weight: bold; font-size: 18px; }

/* Cards */
.card {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 20px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
label { font-size: 14px; color: var(--accent-main); font-weight: bold; }

/* Custom Selection Buttons */
.custom-select-btn {
  padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--bg-surface); color: var(--text-primary); font-size: 16px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
}
.custom-select-btn::after { content: '▼'; font-size: 10px; opacity: 0.5; }

/* Player Area */
.now { text-align: center; padding: 30px 20px; background: linear-gradient(145deg, var(--glass), var(--accent-muted)); }
.nowSurah { font-family: 'Amiri', serif; font-size: 26px; margin-bottom: 8px; }
.nowReciter { font-size: 15px; color: var(--text-secondary); }

/* Progress Bar */
.progress-container { display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 20px;}
.time { font-size: 12px; color: var(--text-secondary); width: 40px; text-align: center; }
input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: var(--accent-muted); border-radius: 4px; }
input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--accent-main); cursor: pointer; -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }

/* Controls */
.controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 10px; }
.play-pause-btn {
  width: 64px; height: 64px; border-radius: 50%; background: var(--accent-main); color: #fff; border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.2s;
}
.action-btn {
  background: var(--accent-muted); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 50%; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
}
.action-btn.active { background: var(--bg-surface); border-color: var(--accent-main); color: var(--accent-main); }
.action-btn.active svg { fill: var(--accent-main); }

/* Mini Player */
.mini {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border); padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 50; padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.mini.show { transform: translateY(0); }
.mini-play-btn { background: var(--accent-main); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

/* ================= FULL SCREEN ROLLER MENU ================= */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  z-index: 9999; display: flex; flex-direction: column;
  opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-content { display: flex; flex-direction: column; height: 100%; padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); }
.modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); }

/* القائمة والسكربار الزمردي */
.selection-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 10px; }

/* استايل شريط التمرير (الزمردي) */
.selection-list::-webkit-scrollbar { width: 6px; display: block !important; }
.selection-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
.selection-list::-webkit-scrollbar-thumb { background: var(--accent-main); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }

.selection-item {
  padding: 22px 15px; border-radius: 16px; background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-size: 18px; font-weight: bold; text-align: center; transition: 0.2s; cursor: pointer;
}
.selection-item.active { background: var(--accent-main); color: #fff; border-color: var(--accent-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

/* Fav Item Style */
.fav-item-container { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 10px;}
.fav-info { display: flex; flex-direction: column; gap: 4px; flex: 1; cursor: pointer; }
.fav-surah { font-weight: bold; color: var(--accent-main); font-size: 18px;}
.fav-reciter { font-size: 14px; color: var(--text-secondary); }
.delete-fav-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: none; padding: 10px; border-radius: 12px; cursor: pointer; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
  background: var(--accent-main); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.4s; z-index: 10000;
}
.toast.show { transform: translate(-50%, 0); }
</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء بنجاح</div>

<div class="app">
  <div class="header">
    <div style="display: flex; gap: 10px;">
      <button class="icon-btn" onclick="window.location.href='index.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()">
        <svg id="sunIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moonIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    <div class="header-title">الاستماع للقرآن</div>
    <button class="icon-btn" onclick="openFavModal()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="card">
    <label>اختر القارئ</label>
    <div class="custom-select-btn" id="reciterSelectBtn" onclick="openReciterModal()">جاري التحميل...</div>
  </div>

  <div class="card">
    <label>اختر السورة / الجزء</label>
    <div class="custom-select-btn" id="juzSelectBtn" onclick="openJuzModal()">جاري التحميل...</div>
  </div>

  <div class="card now">
    <div class="nowSurah" id="nowSurah">اختر تلاوة للبدء</div>
    <div class="nowReciter" id="nowReciter">—</div>
    <div class="progress-container">
      <span class="time" id="currentTime">00:00</span>
      <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
      <span class="time" id="durationTime">00:00</span>
    </div>

    <div class="controls">
      <button class="action-btn" id="shuffleBtn" title="عشوائي"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
      <button class="action-btn" id="favBtn" title="مفضلة"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
      <button class="play-pause-btn" id="mainPlayBtn"><svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg><svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
      <button class="action-btn" id="downloadBtn" title="تحميل"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
      <button class="action-btn" id="repeatBtn" title="تكرار"><svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg></button>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline></audio>
</div>

<div class="modal-overlay" id="selectionModal" onclick="if(event.target === this) closeSelectionModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span id="selectionModalTitle">العنوان</span>
      <button class="close-btn" onclick="closeSelectionModal()">✕</button>
    </div>
    <div class="selection-list" id="selectionList"></div>
  </div>
</div>

<div id="miniPlayer" class="mini">
  <div class="miniInfo"><span class="miniSurah" id="miniSurah"></span><span class="miniReciter" id="miniReciter"></span></div>
  <button class="mini-play-btn" id="miniPlayBtn"><svg id="miniPlayIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg><svg id="miniPauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
</div>

<script>
/* --- سمات الواجهة --- */
function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem("themeMode", newTheme);
  document.getElementById('sunIcon').style.display = newTheme === 'light' ? 'none' : 'block';
  document.getElementById('moonIcon').style.display = newTheme === 'light' ? 'block' : 'none';
}

/* --- دمج ملفات JSON المتعددة --- */
let appData = { reciters: [] };
let selectedReciterIndex = 0, currentJuzData = [], selectedJuzIndex = 0;
let currentTrackUrl = "", isShuffle = false, isRepeat = false;
const audio = document.getElementById("audio");

const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

async function loadMultipleJSONs() {
  try {
    const fetchPromises = [];
    for (let i = 1; i <= 20; i++) {
      let fileNum = i < 10 ? '0' + i : i;
      fetchPromises.push(fetch(`json/audio-${fileNum}.json?v=${Date.now()}`));
    }
    const responses = await Promise.allSettled(fetchPromises);
    for (let res of responses) {
      if (res.status === "fulfilled" && res.value.ok) {
        let d = await res.value.json();
        if (d.reciters) appData.reciters.push(...d.reciters);
      }
    }
    if (appData.reciters.length) initData();
  } catch (e) { console.error(e); }
}

function initData() {
  document.getElementById("reciterSelectBtn").innerText = appData.reciters[selectedReciterIndex].name;
  buildJuzData();
  const last = localStorage.getItem("lastTrack");
  if (last && last !== "null" && last.startsWith("http")) {
    currentTrackUrl = last; audio.src = last;
    document.getElementById("nowSurah").innerText = localStorage.getItem("lastSurah") || "";
    document.getElementById("nowReciter").innerText = localStorage.getItem("lastReciter") || "";
    document.getElementById("miniSurah").innerText = localStorage.getItem("lastSurah") || "";
    document.getElementById("miniReciter").innerText = localStorage.getItem("lastReciter") || "";
    checkFavStatus();
    updateMediaSession(localStorage.getItem("lastSurah"), localStorage.getItem("lastReciter"));
  } else { prepareTrack(); }
}

function buildJuzData() {
  currentJuzData = [];
  let r = appData.reciters[selectedReciterIndex];
  if (r.type === "surah") {
    surahNames.forEach((n, i) => {
      let num = (i + 1).toString().padStart(3, '0');
      currentJuzData.push({ name: "سورة " + n, url: r.baseUrl + num + ".mp3" });
    });
  } else { currentJuzData = r.items || r.juz || []; }
  selectedJuzIndex = 0;
  document.getElementById("juzSelectBtn").innerText = currentJuzData[0]?.name || "";
}

/* --- القوائم الزجاجية الكاملة --- */
function closeSelectionModal() { document.getElementById('selectionModal').classList.remove('active'); }

function openReciterModal() {
  document.getElementById('selectionModalTitle').innerText = "اختر القارئ";
  const list = document.getElementById('selectionList');
  list.innerHTML = '';
  appData.reciters.forEach((r, i) => {
    let div = document.createElement('div');
    div.className = 'selection-item' + (i === selectedReciterIndex ? ' active' : '');
    div.innerText = r.name;
    div.onclick = () => { selectedReciterIndex = i; document.getElementById("reciterSelectBtn").innerText = r.name; buildJuzData(); prepareTrack(); closeSelectionModal(); };
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
}

function openJuzModal() {
  document.getElementById('selectionModalTitle').innerText = "اختر السورة / الجزء";
  const list = document.getElementById('selectionList');
  list.innerHTML = '';
  currentJuzData.forEach((j, i) => {
    let div = document.createElement('div');
    div.className = 'selection-item' + (i === selectedJuzIndex ? ' active' : '');
    div.innerText = j.name;
    div.onclick = () => { selectedJuzIndex = i; document.getElementById("juzSelectBtn").innerText = j.name; closeSelectionModal(); prepareTrack(); audio.play().catch(()=>{}); };
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
}

function prepareTrack() {
  if(!currentJuzData.length) return;
  let track = currentJuzData[selectedJuzIndex];
  if(currentTrackUrl !== track.url) {
    audio.src = track.url; currentTrackUrl = track.url;
    const rName = appData.reciters[selectedReciterIndex].name;
    document.getElementById("nowSurah").innerText = track.name;
    document.getElementById("nowReciter").innerText = rName;
    document.getElementById("miniSurah").innerText = track.name;
    document.getElementById("miniReciter").innerText = rName;
    document.getElementById("progress").value = 0;
    checkFavStatus(); updateMediaSession(track.name, rName);
    localStorage.setItem("lastTrack", track.url);
    localStorage.setItem("lastSurah", track.name);
    localStorage.setItem("lastReciter", rName);
  }
}

/* --- MediaSession - واجهة شاشة القفل --- */
function updateMediaSession(t, a) {
  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t, artist: a, album: "زاد المسلم Pro",
      artwork: [{ src: "icon/icon-512.png", sizes: "512x512", type: "image/png" }]
    });
    navigator.mediaSession.setActionHandler("play", () => audio.play());
    navigator.mediaSession.setActionHandler("pause", () => audio.pause());
    navigator.mediaSession.setActionHandler("previoustrack", () => playPrev());
    navigator.mediaSession.setActionHandler("nexttrack", () => playNext());
  }
}

function playNext() {
  selectedJuzIndex = (selectedJuzIndex + 1) % currentJuzData.length;
  document.getElementById("juzSelectBtn").innerText = currentJuzData[selectedJuzIndex].name;
  prepareTrack(); audio.play();
}
function playPrev() {
  selectedJuzIndex = (selectedJuzIndex - 1 + currentJuzData.length) % currentJuzData.length;
  document.getElementById("juzSelectBtn").innerText = currentJuzData[selectedJuzIndex].name;
  prepareTrack(); audio.play();
}

/* --- التحكم والفعاليات --- */
document.getElementById("mainPlayBtn").onclick = () => audio.paused ? audio.play() : audio.pause();
document.getElementById("miniPlayBtn").onclick = () => audio.paused ? audio.play() : audio.pause();

audio.addEventListener('play', () => {
  document.getElementById("playIcon").style.display = "none"; document.getElementById("pauseIcon").style.display = "block";
  document.getElementById("miniPlayIcon").style.display = "none"; document.getElementById("miniPauseIcon").style.display = "block";
  document.getElementById("miniPlayer").classList.add("show");
});
audio.addEventListener('pause', () => {
  document.getElementById("playIcon").style.display = "block"; document.getElementById("pauseIcon").style.display = "none";
  document.getElementById("miniPlayIcon").style.display = "block"; document.getElementById("miniPauseIcon").style.display = "none";
});
audio.addEventListener('timeupdate', () => {
  const p = (audio.currentTime / audio.duration) * 100;
  document.getElementById("progress").value = p || 0;
  document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
  document.getElementById("durationTime").innerText = formatTime(audio.duration);
});
document.getElementById("progress").oninput = (e) => audio.currentTime = (e.target.value / 100) * audio.duration;

function formatTime(s) {
  if (isNaN(s)) return "00:00";
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function showToast(m) {
  const t = document.getElementById("toast"); t.innerText = m; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

/* --- المفضلة --- */
function openFavModal() {
  document.getElementById('selectionModalTitle').innerText = "المفضلة";
  const list = document.getElementById('selectionList'); list.innerHTML = '';
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  if (!favs.length) list.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top:20px;">لا توجد مفضلات</div>';
  favs.forEach((f, i) => {
    let div = document.createElement('div'); div.className = 'fav-item-container';
    div.innerHTML = `<div class="fav-info" onclick="playFav('${f.url}','${f.surah}','${f.reciter}')"><div class="fav-surah">${f.surah}</div><div class="fav-reciter">${f.reciter}</div></div><button class="delete-fav-btn" onclick="removeFav(${i}, event)">✕</button>`;
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
}
function playFav(u, s, r) {
  audio.src = u; currentTrackUrl = u;
  document.getElementById("nowSurah").innerText = s; document.getElementById("nowReciter").innerText = r;
  document.getElementById("miniSurah").innerText = s; document.getElementById("miniReciter").innerText = r;
  audio.play(); closeSelectionModal(); checkFavStatus();
}
function removeFav(i, e) {
  e.stopPropagation(); let f = JSON.parse(localStorage.getItem("favorites") || "[]");
  f.splice(i, 1); localStorage.setItem("favorites", JSON.stringify(f));
  openFavModal(); checkFavStatus(); showToast("تم الحذف");
}
document.getElementById("favBtn").onclick = () => {
  if(!currentTrackUrl) return;
  let f = JSON.parse(localStorage.getItem("favorites") || "[]");
  let idx = f.findIndex(x => x.url === currentTrackUrl);
  if(idx === -1) { f.push({ reciter: document.getElementById("nowReciter").innerText, surah: document.getElementById("nowSurah").innerText, url: currentTrackUrl }); showToast("تمت الإضافة"); }
  else { f.splice(idx, 1); showToast("تمت الإزالة"); }
  localStorage.setItem("favorites", JSON.stringify(f)); checkFavStatus();
};
function checkFavStatus() {
  let f = JSON.parse(localStorage.getItem("favorites") || "[]");
  document.getElementById("favBtn").classList.toggle("active", f.some(x => x.url === currentTrackUrl));
}

window.onload = () => {
  const saved = localStorage.getItem("themeMode") || "dark";
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('sunIcon').style.display = saved === 'light' ? 'none' : 'block';
  document.getElementById('moonIcon').style.display = saved === 'light' ? 'block' : 'none';
  loadMultipleJSONs();
};
</script>
