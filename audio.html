<style>
/* ================= THEMES ================= */
:root{
  --primary:#10b981;
  --bg:#020617;
  --bg-top:#1e293b;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);
  --text:#f8fafc;
  --muted:#94a3b8;
  --card-bg:rgba(30,41,59,0.7);
  --track-bg: rgba(255, 255, 255, 0.1);
  --action-bg:rgba(255,255,255,0.05);
  --action-hover:rgba(255,255,255,0.1);
  --mini-bg:rgba(15,23,42,0.95);
  --play-text:#020617;
}

body.light{
  --bg:#f1f5f9;
  --bg-top:#ffffff;
  --text:#0f172a;
  --card-bg:#ffffff;
  --glass:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.08);
  --track-bg: rgba(0, 0, 0, 0.1);
  --action-bg:rgba(0,0,0,0.05);
  --action-hover:rgba(0,0,0,0.1);
  --mini-bg:rgba(255,255,255,0.95);
  --play-text:#ffffff;
}

body.sepia{
  --bg:#f4ecd8;
  --bg-top:#fffaf0;
  --text:#3b2f1e;
  --card-bg:#fffaf0;
  --glass:rgba(0,0,0,0.05);
  --border:rgba(0,0,0,0.08);
  --track-bg: rgba(0, 0, 0, 0.1);
  --action-bg:rgba(0,0,0,0.05);
  --action-hover:rgba(0,0,0,0.1);
  --mini-bg:rgba(229,213,181,0.95);
  --play-text:#ffffff;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0; font-family:'Tajawal',sans-serif;
  background:radial-gradient(circle at 50% 0%, var(--bg-top), var(--bg));
  color:var(--text); display:flex; justify-content:center;
  padding:20px 20px 100px; min-height:100dvh; transition:0.4s;
}

.app{ width:100%; max-width:480px; display:flex; flex-direction:column; gap:16px; }

/* ================= HEADER & THEMES ================= */
.header{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--glass); border:1px solid var(--border);
  backdrop-filter:blur(12px); border-radius:16px; padding:14px 16px;
}
.header-title{ font-weight:bold; font-size:18px; }
.icon-btn{ 
  background:none; border:none; color:var(--text); 
  cursor:pointer; padding:5px; display:flex; 
  align-items:center; justify-content:center; transition:0.2s;
}
.icon-btn:active{ transform:scale(0.9); opacity:0.7; }

.theme-toggles { display: flex; justify-content: center; gap: 15px; margin: -4px 0 4px 0; }
.theme-btn {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.theme-btn.dark { background: #1e293b; }
.theme-btn.sepia { background: #e5d5b5; }
.theme-btn.light { background: #f8fafc; }
.theme-btn.active { border-color: var(--primary); transform: scale(1.2); }

/* ================= CARDS ================= */
.card{
  background:var(--card-bg); border:1px solid var(--border);
  backdrop-filter:blur(12px); border-radius:20px;
  padding:20px; display:flex; flex-direction:column; gap:12px; transition:0.4s;
}
label{ font-size:14px; color:var(--primary); font-weight: 500; }

select{
  padding:14px; border-radius:12px; border:1px solid var(--border);
  background:var(--input-bg, rgba(0,0,0,0.05)); color:var(--text);
  font-size:15px; font-family:inherit; outline:none; cursor:pointer;
  appearance:none; transition:0.4s;
}
select:focus{ border-color:var(--primary); }

/* ================= PLAYER AREA ================= */
.now{ text-align:center; padding:30px 20px; background:linear-gradient(145deg, var(--card-bg), var(--action-bg)); }
.nowSurah{ font-family:'Amiri',serif; font-size:26px; margin-bottom:8px; }
.nowReciter{ font-size:15px; color:var(--muted); }

/* Progress Bar */
.progress-container { display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 15px; margin-bottom: 5px;}
.time { font-size: 12px; color: var(--muted); width: 40px; text-align: center; }

input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]:focus { outline: none; }
input[type=range]::-webkit-slider-runnable-track {
  width: 100%; height: 6px; cursor: pointer;
  background: var(--track-bg); border-radius: 4px;
}
input[type=range]::-webkit-slider-thumb {
  height: 16px; width: 16px; border-radius: 50%;
  background: var(--primary); cursor: pointer;
  -webkit-appearance: none; margin-top: -5px;
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
}

/* Controls */
.controls{ display:flex; justify-content:center; align-items:center; gap:12px; margin-top:10px; }

.play-pause-btn{
  width:64px; height:64px; border-radius:50%;
  background:var(--primary); color:var(--play-text); border:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 4px 15px rgba(16, 185, 129, 0.3); transition:0.2s; flex-shrink:0;
}
.play-pause-btn:active{ transform:scale(0.92); }
.play-pause-btn svg{ width:28px; height:28px; fill:currentColor; }

.action-btn{
  background:var(--action-bg); border:1px solid var(--border);
  width:44px; height:44px; border-radius:50%; color:var(--text);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:0.3s; flex-shrink:0;
}
.action-btn:active{ background:var(--action-hover); transform:scale(0.9); }
.action-btn svg{ width:20px; height:20px; stroke:currentColor; fill:none; }
.action-btn.active{ background:rgba(16, 185, 129, 0.15); border-color:rgba(16, 185, 129, 0.4); color:var(--primary); }
.action-btn.active svg{ stroke:var(--primary); }
.action-btn.active.fill-icon svg{ fill:var(--primary); }

/* ================= MODAL & TOAST ================= */
.mini{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--mini-bg); backdrop-filter:blur(20px); border-top:1px solid var(--border);
  padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
  transform:translateY(100%); transition:0.4s; z-index:50;
}
.mini.show{ transform:translateY(0); }
.miniInfo{ display:flex; flex-direction:column; }
.miniSurah{ font-weight:bold; font-size:15px; margin-bottom:2px;}
.miniReciter{ font-size:12px; color:var(--muted); }
.mini-play-btn{ background:var(--primary); color:var(--play-text); border:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.mini-play-btn svg{ width:20px; height:20px; fill:currentColor; }

.toast{
  position:fixed; top:20px; left:50%; transform:translate(-50%,-100px);
  background:rgba(16, 185, 129, 0.95); color:#fff; padding:12px 24px;
  border-radius:30px; font-size:14px; font-weight:bold; backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3); transition:0.4s; z-index:1000;
}
.toast.show{ transform:translate(-50%,0); }

/* نافذة المفضلة */
.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: 0.3s; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-content { background: var(--mini-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; width: 100%; max-width: 440px; max-height: 80vh; display: flex; flex-direction: column; transform: translateY(20px); transition: 0.3s; }
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.close-btn { background: none; border: none; color: inherit; font-size: 1.2rem; cursor: pointer; opacity: 0.7; }
.fav-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.fav-item { display: flex; justify-content: space-between; align-items: center; background: var(--action-bg); padding: 12px 15px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
.fav-item-info { display: flex; flex-direction: column; gap: 4px; }
.fav-item-surah { font-weight: bold; color: var(--primary); }
.fav-item-reciter { font-size: 0.85rem; color: var(--muted); }
.delete-fav-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; padding: 8px; border-radius: 8px; cursor: pointer; }
</style>
</head>

  "ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد",
  "الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة",
  "الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن",
  "الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل",
  "المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير",
  "الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر",
  "البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة",
  "الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش",
  "الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"
];

/* ================= INIT DATA ================= */
function initData() {
  reciterSelect.innerHTML = "";
  appData.reciters.forEach((r, i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = r.name;
    reciterSelect.appendChild(opt);
  });
  loadTracks(false);
}

function loadTracks(isUserClick = true) {
  juzSelect.innerHTML = "";
  let reciter = appData.reciters[reciterSelect.value];
  let arrayData = reciter.items;
  
  if (reciter.type === "juz" && arrayData) {
    arrayData.forEach(j => {
      let opt = document.createElement("option");
      opt.value = j.url;
      opt.textContent = j.name;
      juzSelect.appendChild(opt);
    });
  } else if (reciter.type === "surah") {
    surahNames.forEach((name, index) => {
      let num = index + 1;
      let surahNumber = num < 10 ? '00' + num : num < 100 ? '0' + num : num; 
      let opt = document.createElement("option");
      opt.value = reciter.baseUrl + surahNumber + ".mp3";
      opt.textContent = "سورة " + name;
      juzSelect.appendChild(opt);
    });
  }
  
  // لا تستبدل المقطع الأخير إذا كان التطبيق قيد التحميل المبدئي
  if (isUserClick) {
    prepareTrack();
  }
}

function prepareTrack() {
  if(juzSelect.options.length === 0) return; 

  let url = juzSelect.value;
  let reciterName = appData.reciters[reciterSelect.value].name;
  let juzName = juzSelect.options[juzSelect.selectedIndex].text;

  if(currentTrackUrl !== url) {
    audio.src = url;
    currentTrackUrl = url;
    progress.value = 0;
    updateProgressFill();
    currentTimeEl.innerText = "00:00";
    durationTimeEl.innerText = "00:00";
    updatePlayPauseUI(false);
    checkFavStatus();

    localStorage.setItem("lastTrack", url);
    localStorage.setItem("lastSurah", juzName);
    localStorage.setItem("lastReciter", reciterName);
  }

  nowSurah.innerText = juzName;
  nowReciter.innerText = reciterName;
  miniSurah.innerText = juzName;
  miniReciter.innerText = reciterName;
}

reciterSelect.addEventListener('change', () => loadTracks(true));
juzSelect.addEventListener('change', () => {
    prepareTrack();
    audio.play().catch(()=>{});
});

/* ================= PLAYER LOGIC ================= */
function formatTime(seconds) {
  if (isNaN(seconds)) return "00:00";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
}

function togglePlay() {
  if(!currentTrackUrl) return showToast("اختر سورة أولاً");
  if (audio.paused) audio.play().catch(e => console.log(e));
  else audio.pause();
}

mainPlayBtn.onclick = togglePlay;
miniPlayBtn.onclick = togglePlay;

shuffleBtn.onclick = () => {
  isShuffle = !isShuffle;
  shuffleBtn.classList.toggle("active", isShuffle);
  showToast(isShuffle ? "تم تفعيل التشغيل العشوائي" : "تم إيقاف التشغيل العشوائي");
};

repeatBtn.onclick = () => {
  isRepeat = !isRepeat;
  repeatBtn.classList.toggle("active", isRepeat);
  showToast(isRepeat ? "تكرار السورة مفعل" : "تم إيقاف التكرار");
};

downloadBtn.onclick = () => {
  if(!currentTrackUrl) return showToast("لا يوجد مقطع للتحميل");
  let a = document.createElement("a");
  a.href = currentTrackUrl;
  a.download = "quran.mp3"; 
  a.target = "_blank";
  a.click();
};

audio.addEventListener('ended', () => {
  if (isRepeat) {
    audio.currentTime = 0;
    audio.play();
    return;
  }
  let nextIndex = juzSelect.selectedIndex + 1;
  if (isShuffle) {
    let newIndex = juzSelect.selectedIndex;
    if (juzSelect.options.length > 1) {
      while (newIndex === juzSelect.selectedIndex) {
        newIndex = Math.floor(Math.random() * juzSelect.options.length);
      }
    }
    nextIndex = newIndex;
  } else if (nextIndex >= juzSelect.options.length) {
    nextIndex = 0; 
  }
  juzSelect.selectedIndex = nextIndex;
  prepareTrack();
  audio.play();
});

/* ================= AUDIO EVENTS ================= */
audio.addEventListener('play', () => {
  updatePlayPauseUI(true);
  mini.classList.add("show");
  
  if("mediaSession" in navigator){
    navigator.mediaSession.metadata = new MediaMetadata({
      title: nowSurah.innerText,
      artist: nowReciter.innerText,
      album: "Zad Al-Muslim"
    });
    navigator.mediaSession.setActionHandler("play", () => audio.play());
    navigator.mediaSession.setActionHandler("pause", () => audio.pause());
  }
});

audio.addEventListener('pause', () => { updatePlayPauseUI(false); });

audio.addEventListener('error', () => {
  if(currentTrackUrl) {
    nowSurah.innerText = "تعذر تشغيل المقطع";
  }
});

audio.addEventListener('loadedmetadata', () => { durationTimeEl.innerText = formatTime(audio.duration); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  progress.value = percent;
  updateProgressFill();
  currentTimeEl.innerText = formatTime(audio.currentTime);
});

function updatePlayPauseUI(isPlaying) {
  if (isPlaying) {
    playIcon.style.display = "none"; pauseIcon.style.display = "block";
    miniPlayIcon.style.display = "none"; miniPauseIcon.style.display = "block";
  } else {
    playIcon.style.display = "block"; pauseIcon.style.display = "none";
    miniPlayIcon.style.display = "block"; miniPauseIcon.style.display = "none";
  }
}

progress.addEventListener('input', () => {
  const seekTime = (progress.value / 100) * audio.duration;
  audio.currentTime = seekTime;
  updateProgressFill();
});

function updateProgressFill() {
  const val = progress.value;
  const trackBg = getComputedStyle(document.body).getPropertyValue('--track-bg').trim() || 'rgba(255,255,255,0.1)';
  progress.style.background = `linear-gradient(to left, var(--primary) ${val}%, ${trackBg} ${val}%)`;
}

/* ================= TOAST & FAV ================= */
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

favBtn.onclick = () => {
  if(!currentTrackUrl) return showToast("اختر سورة أولاً");
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  let existsIndex = favs.findIndex(f => f.url === currentTrackUrl);
  if(existsIndex === -1) {
    favs.push({ reciter: nowReciter.innerText, surah: nowSurah.innerText, url: currentTrackUrl });
    localStorage.setItem("favorites", JSON.stringify(favs));
    showToast("تمت الإضافة للمفضلة بنجاح");
    favBtn.classList.add("active");
  } else {
    favs.splice(existsIndex, 1);
    localStorage.setItem("favorites", JSON.stringify(favs));
    showToast("تمت الإزالة من المفضلة");
    favBtn.classList.remove("active");
  }
  renderFavList();
}

function checkFavStatus() {
   let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
   let exists = favs.find(f => f.url === currentTrackUrl);
   if(exists) favBtn.classList.add("active");
   else favBtn.classList.remove("active");
}

function openFavModal() { document.getElementById('favModal').classList.add('active'); renderFavList(); }
function closeFavModal() { document.getElementById('favModal').classList.remove('active'); }

function renderFavList() {
  const list = document.getElementById('favList');
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  list.innerHTML = '';
  if (favs.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5;">لا توجد مقاطع في المفضلة بعد</div>';
    return;
  }
  favs.forEach((fav, index) => {
    let div = document.createElement('div');
    div.className = 'fav-item';
    div.innerHTML = `
      <div class="fav-item-info" onclick="playFromFav('${fav.url}', '${fav.surah}', '${fav.reciter}')">
        <div class="fav-item-surah">${fav.surah}</div>
        <div class="fav-item-reciter">${fav.reciter}</div>
      </div>
      <button class="delete-fav-btn" onclick="removeFav(${index}, event)" title="حذف">✕</button>
    `;
    list.appendChild(div);
  });
}

function playFromFav(url, surah, reciter) {
  if(currentTrackUrl !== url) {
    audio.src = url; currentTrackUrl = url;
    nowSurah.innerText = surah; nowReciter.innerText = reciter;
    miniSurah.innerText = surah; miniReciter.innerText = reciter;
    progress.value = 0; updateProgressFill();
    currentTimeEl.innerText = "00:00"; durationTimeEl.innerText = "00:00";
    checkFavStatus();
    
    for(let i=0; i<juzSelect.options.length; i++) {
        if(juzSelect.options[i].value === url) {
            juzSelect.selectedIndex = i;
            break;
        }
    }
  }
  audio.play().catch(()=>{}); 
  closeFavModal();
}

function removeFav(index, event) {
  event.stopPropagation(); 
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  favs.splice(index, 1);
  localStorage.setItem("favorites", JSON.stringify(favs));
  renderFavList(); checkFavStatus(); showToast("تم الحذف بنجاح");
}

/* ================= INIT ================= */
window.addEventListener("load", () => {
  initData();
  
  let last = localStorage.getItem("lastTrack");
  if(last){
    currentTrackUrl = last; audio.src = last;
    nowSurah.innerText = localStorage.getItem("lastSurah") || "";
    nowReciter.innerText = localStorage.getItem("lastReciter") || "";
    miniSurah.innerText = nowSurah.innerText;
    miniReciter.innerText = nowReciter.innerText;
    checkFavStatus();
  } else {
    // تجهيز أول مقطع تلقائياً
    prepareTrack();
  }
});

</script>
