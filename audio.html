<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>الاستماع للقرآن</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* --- 2-THEME GLASSMORPHISM SYSTEM --- */
:root {
  --bg-image: url('images/Background-dark.png');
  --bg-surface: rgba(15, 23, 42, 0.5);
  --text-primary: #F8FAFC; 
  --text-secondary: #CBD5E1;
  --accent-main: #34D399; 
  --accent-muted: rgba(255, 255, 255, 0.15);
  --glass: rgba(15, 23, 42, 0.4); 
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  --overlay: rgba(15, 23, 42, 0.2); 
}

[data-theme="light"] {
  --bg-image: url('images/Background-light.png');
  --bg-surface: rgba(255, 255, 255, 0.35); 
  --text-primary: #0F172A; 
  --text-secondary: #475569;
  --accent-main: #059669; 
  --accent-muted: rgba(0, 0, 0, 0.05);
  --glass: rgba(255, 255, 255, 0.2); 
  --glass-border: rgba(255, 255, 255, 0.4); 
  --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
  --overlay: rgba(255, 255, 255, 0.1); 
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; font-family: 'Tajawal', sans-serif;
  background-color: var(--bg-surface);
  background-image: var(--bg-image);
  background-size: cover; background-position: center;
  background-attachment: fixed; background-repeat: no-repeat;
  color: var(--text-primary); display: flex; justify-content: center;
  padding: 20px 20px 100px; min-height: 100dvh;
  transition: color 0.3s ease, background-image 0.3s ease;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background: var(--overlay); z-index: -1; transition: background 0.3s ease;
}

.app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 16px; padding: 14px 16px;
}
.header-title { font-weight: bold; font-size: 18px; color: var(--text-primary); }
.icon-btn { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.icon-btn:active { opacity: 0.7; transform: scale(0.9); }

/* Cards */
.card {
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--glass-shadow); border-radius: 20px; padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
}
label { font-size: 14px; color: var(--accent-main); font-weight: bold; }

.custom-select-btn {
  padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: var(--bg-surface); color: var(--text-primary); font-size: 16px;
  font-family: inherit; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: border-color 0.3s, background 0.3s;
}
.custom-select-btn:active { background: var(--accent-muted); }
.custom-select-btn:after { content: '▼'; font-size: 12px; opacity: 0.6; }

/* Main Player Area */
.now { text-align: center; padding: 30px 20px; background: linear-gradient(145deg, var(--glass), var(--accent-muted)); }
.nowSurah { font-family: 'Amiri', serif; font-size: 26px; margin-bottom: 8px; color: var(--text-primary); }
.nowReciter { font-size: 15px; color: var(--text-secondary); }

/* Custom Progress Bar */
.progress-container { display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 20px;}
.time { font-size: 12px; color: var(--text-secondary); width: 40px; text-align: center; }
input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]:focus { outline: none; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: var(--accent-muted); border-radius: 4px; }
input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: var(--accent-main); cursor: pointer; -webkit-appearance: none; margin-top: -5px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }

/* Controls */
.controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 10px; }
.play-pause-btn {
  width: 60px; height: 60px; border-radius: 50%; background: var(--accent-main); color: #FFFFFF; border: none;
  display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s; flex-shrink: 0;
}
.play-pause-btn:active { transform: scale(0.92); }
.play-pause-btn svg { width: 26px; height: 26px; fill: currentColor; }

.action-btn {
  background: var(--accent-muted); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 50%; color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;
}
.action-btn:active { transform: scale(0.9); }
.action-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
.action-btn.active { background: var(--bg-surface); border-color: var(--accent-main); color: var(--accent-main); }
.action-btn.active svg { stroke: var(--accent-main); }
.action-btn.active.fill-icon svg { fill: var(--accent-main); }

/* Mini Player */
.mini {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border); box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 50; padding-bottom: max(12px, env(safe-area-inset-bottom));
}
.mini.show { transform: translateY(0); }
.miniInfo { display: flex; flex-direction: column; }
.miniSurah { font-weight: bold; font-size: 15px; margin-bottom: 2px; color: var(--text-primary);}
.miniReciter { font-size: 12px; color: var(--text-secondary); }
.mini-play-btn { background: var(--accent-main); color: #FFFFFF; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;}
.mini-play-btn svg { width: 20px; height: 20px; fill: currentColor; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
  background: var(--accent-main); color: #FFFFFF; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
  backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 1000;
}
.toast.show { transform: translate(-50%, 0); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  z-index: 9999; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.3s ease;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-content { display: flex; flex-direction: column; height: 100%; padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); padding-bottom: max(20px, env(safe-area-inset-bottom)); }
.modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); color: var(--text-primary); }
.close-btn { background: none; border: none; color: inherit; font-size: 1.5rem; cursor: pointer; padding: 5px; opacity: 0.8; }
.selection-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 5px; }
.selection-list::-webkit-scrollbar { width: 6px; }
.selection-list::-webkit-scrollbar-track { background: var(--accent-muted); border-radius: 10px; }
.selection-list::-webkit-scrollbar-thumb { background: var(--accent-main); border-radius: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
.selection-item { padding: 20px 15px; border-radius: 16px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 18px; font-weight: bold; text-align: center; transition: 0.2s; cursor: pointer; }
.selection-item:active { transform: scale(0.98); }
.selection-item.active { background: var(--accent-main); color: #fff; border-color: var(--accent-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.fav-item-container { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px; border-radius: 16px; border: 1px solid var(--glass-border); }
.fav-info { display: flex; flex-direction: column; gap: 6px; cursor: pointer; width: 85%; }
.fav-surah { font-weight: bold; color: var(--accent-main); font-size: 18px;}
.fav-reciter { font-size: 14px; color: var(--text-secondary); }
.delete-fav-btn { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: none; padding: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>

<body>

<div class="toast" id="toast">تم الإجراء بنجاح</div>

<div class="app">
  <div class="header">
    <div style="display: flex; gap: 10px;">
      <button class="icon-btn" onclick="window.location.href='index.html'" title="الرئيسية">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="تبديل المظهر">
        <svg id="sunIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="moonIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    <div class="header-title">الاستماع للقرآن</div>
    <button class="icon-btn" onclick="openFavModal()" title="قائمة المفضلة">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="card">
    <label>اختر القارئ</label>
    <div class="custom-select-btn" id="reciterSelectBtn" onclick="openReciterModal()">جاري التحميل...</div>
  </div>

  <div class="card">
    <label>اختر السورة / الجزء</label>
    <div class="custom-select-btn" id="juzSelectBtn" onclick="openJuzModal()">جاري التحميل...</div>
  </div>

  <div class="card now">
    <div class="nowSurah" id="nowSurah">اختر تلاوة للبدء</div>
    <div class="nowReciter" id="nowReciter">—</div>
    <div class="progress-container">
      <span class="time" id="currentTime">00:00</span>

    <div class="controls">
      <button class="action-btn" id="shuffleBtn" title="تشغيل عشوائي">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
      </button>
      <button class="action-btn fill-icon" id="favBtn" title="إضافة للمفضلة">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </button>
      <button class="play-pause-btn" id="mainPlayBtn">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
      <button class="action-btn" id="downloadBtn" title="تحميل">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>

      </button>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline></audio>
</div>

<div class="modal-overlay" id="selectionModal" onclick="if(event.target === this) closeSelectionModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span id="selectionModalTitle">العنوان</span>
      <button class="close-btn" onclick="closeSelectionModal()">✕</button>
    </div>
    <div class="selection-list" id="selectionList"></div>
  </div>
</div>

<div id="miniPlayer" class="mini">
  <div class="miniInfo">
    <span class="miniSurah" id="miniSurah"></span>
    <span class="miniReciter" id="miniReciter"></span>
  </div>
  <button class="mini-play-btn" id="miniPlayBtn">
     <svg id="miniPlayIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
     <svg id="miniPauseIcon" viewBox="0 0 24 24" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
  </button>
</div>

<script>
// --- Theme Logic ---
function updateThemeIcon(theme) {
  const sunIcon = document.getElementById('sunIcon');
  const moonIcon = document.getElementById('moonIcon');
  if(theme === 'light') { sunIcon.style.display = 'none'; moonIcon.style.display = 'block'; } 
  else { sunIcon.style.display = 'block'; moonIcon.style.display = 'none'; }
}
function toggleTheme() {
  const html = document.documentElement;
  const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem("themeMode", newTheme);
  updateThemeIcon(newTheme);
}

// Global App Data holding merged JSON files
let appData = { reciters: [] };
let selectedReciterIndex = 0;
let currentJuzData = [];
let selectedJuzIndex = 0;

let currentTrackUrl = "";
let isShuffle = false;
let isRepeat = false;

const audio = document.getElementById("audio");
const reciterSelectBtn = document.getElementById("reciterSelectBtn");
const juzSelectBtn = document.getElementById("juzSelectBtn");

const surahNames = [
  "الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"
];

// --- SMART PARALLEL JSON LOADER ---
// This function will automatically load audio-01.json, audio-02.json up to audio-20.json from /json/ folder
async function loadMultipleJSONs() {
  try {
    const fetchPromises = [];
    const maxFilesToCheck = 20; // يدعم حتى 20 ملف إضافي مستقبلاً
    
    for (let i = 1; i <= maxFilesToCheck; i++) {
      let fileNum = i < 10 ? '0' + i : i;
      // مسار المجلد الجديد الذي طلبته root/json/
      let filePath = `json/audio-${fileNum}.json?v=${new Date().getTime()}`;
      fetchPromises.push(fetch(filePath));
    }

    const responses = await Promise.allSettled(fetchPromises);

    for (let result of responses) {
      if (result.status === "fulfilled" && result.value.ok) {
        let data = await result.value.json();
        if (data && data.reciters) {
          appData.reciters.push(...data.reciters);
        }
      }
    }

    if (appData.reciters.length > 0) {
      initData();
    } else {
      throw new Error("لم يتم العثور على أي بيانات في المجلد");
    }

  } catch (error) {
    console.error("Error loading JSON arrays:", error);
    reciterSelectBtn.innerText = "تعذر تحميل البيانات";
    juzSelectBtn.innerText = "تأكد من مجلد json";
  }
}

function initData() {
  if (appData.reciters.length === 0) return;
  
  reciterSelectBtn.innerText = appData.reciters[selectedReciterIndex].name;
  buildJuzData();

  let lastTrack = localStorage.getItem("lastTrack");
  if (lastTrack && lastTrack !== "undefined" && lastTrack !== "null" && lastTrack.startsWith("http")) {
    currentTrackUrl = lastTrack; 
    audio.src = lastTrack;
    
    document.getElementById("nowSurah").innerText = localStorage.getItem("lastSurah") || "";
    document.getElementById("nowReciter").innerText = localStorage.getItem("lastReciter") || "";
    document.getElementById("miniSurah").innerText = localStorage.getItem("lastSurah") || "";
    document.getElementById("miniReciter").innerText = localStorage.getItem("lastReciter") || "";
    
    checkFavStatus();
    updateMediaSession(localStorage.getItem("lastSurah"), localStorage.getItem("lastReciter"));
  } else {
    localStorage.removeItem("lastTrack");
    prepareTrack();
  }
}

function buildJuzData() {
  currentJuzData = [];
  let reciter = appData.reciters[selectedReciterIndex];
  let arrayData = reciter.items || reciter.juz;
  
  if ((reciter.type === "juz" || !reciter.type) && arrayData) {
    currentJuzData = arrayData;
  } else if (reciter.type === "surah") {
    surahNames.forEach((name, index) => {
      let num = index + 1;
      let surahNumber = num < 10 ? '00' + num : num < 100 ? '0' + num : num; 
      currentJuzData.push({
        name: "سورة " + name,
        url: reciter.baseUrl + surahNumber + ".mp3"
      });
    });
  }
  selectedJuzIndex = 0;
  juzSelectBtn.innerText = currentJuzData[selectedJuzIndex].name;
}

function closeSelectionModal() { document.getElementById('selectionModal').classList.remove('active'); }

function openReciterModal() {
  if (appData.reciters.length === 0) return;
  document.getElementById('selectionModalTitle').innerText = "اختر القارئ";
  const list = document.getElementById('selectionList');
  list.innerHTML = '';
  appData.reciters.forEach((r, i) => {
    let div = document.createElement('div');
    div.className = 'selection-item' + (i === selectedReciterIndex ? ' active' : '');
    div.innerText = r.name;
    div.onclick = () => {
      selectedReciterIndex = i;
      reciterSelectBtn.innerText = r.name;
      buildJuzData(); prepareTrack(); closeSelectionModal();
    };
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
  scrollToActive(list);
}

function openJuzModal() {
  if (appData.reciters.length === 0) return;
  document.getElementById('selectionModalTitle').innerText = "اختر السورة / الجزء";
  const list = document.getElementById('selectionList');
  list.innerHTML = '';
  currentJuzData.forEach((j, i) => {
    let div = document.createElement('div');
    div.className = 'selection-item' + (i === selectedJuzIndex ? ' active' : '');
    div.innerText = j.name;
    div.onclick = () => {
      selectedJuzIndex = i; juzSelectBtn.innerText = j.name;
      closeSelectionModal(); prepareTrack();
      audio.play().catch(()=>{});
    };
    list.appendChild(div);
  });
  document.getElementById('selectionModal').classList.add('active');
  scrollToActive(list);
}

function scrollToActive(container) {
  setTimeout(() => {
    const activeItem = container.querySelector('.active');
    if(activeItem) activeItem.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 50);
}

function prepareTrack() {
  if(currentJuzData.length === 0) return; 

  let url = currentJuzData[selectedJuzIndex].url;
  let reciterName = appData.reciters[selectedReciterIndex].name;
  let juzName = currentJuzData[selectedJuzIndex].name;

  if(currentTrackUrl !== url) {
    audio.src = url;
    currentTrackUrl = url;
    
    document.getElementById("nowSurah").innerText = juzName;
    document.getElementById("nowReciter").innerText = reciterName;
    document.getElementById("miniSurah").innerText = juzName;
    document.getElementById("miniReciter").innerText = reciterName;
    
    document.getElementById("progress").value = 0; updateProgressFill();
    document.getElementById("currentTime").innerText = "00:00";
    document.getElementById("durationTime").innerText = "00:00";
    
    updatePlayPauseUI(false); checkFavStatus();

    localStorage.setItem("lastTrack", url);
    localStorage.setItem("lastSurah", juzName);
    localStorage.setItem("lastReciter", reciterName);
    
    updateMediaSession(juzName, reciterName);
  }
}

// --- Player Logic ---
function formatTime(seconds) {
  if (isNaN(seconds)) return "00:00";
  const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
  return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
}

function togglePlay() {
  if(!currentTrackUrl || currentTrackUrl === "undefined") return showToast("اختر مقطعاً أولاً");
  
  if (audio.paused) {
    audio.play().catch(e => { console.error(e); showToast("تعذر التشغيل، الرابط تالف"); });
  } else {
    audio.pause();
  }
}

document.getElementById("mainPlayBtn").onclick = togglePlay;
document.getElementById("miniPlayBtn").onclick = togglePlay;

document.getElementById("shuffleBtn").onclick = () => {
  isShuffle = !isShuffle;
  document.getElementById("shuffleBtn").classList.toggle("active", isShuffle);
  showToast(isShuffle ? "تم تفعيل العشوائي" : "تم إيقاف العشوائي");
};

document.getElementById("repeatBtn").onclick = () => {
  isRepeat = !isRepeat;
  document.getElementById("repeatBtn").classList.toggle("active", isRepeat);
  showToast(isRepeat ? "تكرار السورة مفعل" : "تم إيقاف التكرار");
};

document.getElementById("downloadBtn").onclick = () => {
  if(!currentTrackUrl) return showToast("لا يوجد مقطع للتحميل");
  let a = document.createElement("a");
  a.href = currentTrackUrl; a.download = "quran.mp3"; a.target = "_blank"; a.click();
};

function playNextTrack() {
  let nextIndex = selectedJuzIndex + 1;
  if (isShuffle) {
    let newIndex = selectedJuzIndex;
    if (currentJuzData.length > 1) {
      while (newIndex === selectedJuzIndex) { newIndex = Math.floor(Math.random() * currentJuzData.length); }
    }
    nextIndex = newIndex;
  } else if (nextIndex >= currentJuzData.length) { nextIndex = 0; }
  
  selectedJuzIndex = nextIndex;
  juzSelectBtn.innerText = currentJuzData[selectedJuzIndex].name;
  prepareTrack(); audio.play().catch(()=>{});
}

function playPrevTrack() {
  let prevIndex = selectedJuzIndex - 1;
  if (prevIndex < 0) prevIndex = currentJuzData.length - 1;
  selectedJuzIndex = prevIndex;
  juzSelectBtn.innerText = currentJuzData[selectedJuzIndex].name;
  prepareTrack(); audio.play().catch(()=>{});
}

audio.addEventListener('ended', () => {
  if (isRepeat) { audio.currentTime = 0; audio.play().catch(()=>{}); return; }
  playNextTrack();
});

// ================= MEDIA SESSION =================
function updateMediaSession(title, artist) {
  if ("mediaSession" in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || "الاستماع للقرآن",
      artist: artist || "زاد المسلم برو",
      album: "Zad Al-Muslim Pro",
      artwork: [
        { src: "icon/icon-192.png", sizes: "192x192", type: "image/png" },
        { src: "icon/icon-512.png", sizes: "512x512", type: "image/png" }
      ]
    });
    navigator.mediaSession.setActionHandler("play", () => audio.play());
    navigator.mediaSession.setActionHandler("pause", () => audio.pause());
    navigator.mediaSession.setActionHandler("previoustrack", () => playPrevTrack());
    navigator.mediaSession.setActionHandler("nexttrack", () => playNextTrack());
    navigator.mediaSession.setActionHandler("seekto", (details) => {
      if (details.fastSeek && ('fastSeek' in audio)) audio.fastSeek(details.seekTime);
      else audio.currentTime = details.seekTime;
    });
  }
}

audio.addEventListener('play', () => {
  updatePlayPauseUI(true);
  document.getElementById("miniPlayer").classList.add("show");
  updateMediaSession(document.getElementById("nowSurah").innerText, document.getElementById("nowReciter").innerText);
});

audio.addEventListener('pause', () => updatePlayPauseUI(false));
audio.addEventListener('error', (e) => { 
  if(currentTrackUrl) {
    console.error("Audio Load Error", e);
    document.getElementById("nowSurah").innerText = "خطأ في الرابط"; 
    updatePlayPauseUI(false);
  }
});
audio.addEventListener('loadedmetadata', () => { document.getElementById("durationTime").innerText = formatTime(audio.duration); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration) * 100;
  const progress = document.getElementById("progress");
  progress.value = percent; updateProgressFill();
  document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
});

function updatePlayPauseUI(isPlaying) {
  const playIcon = document.getElementById("playIcon");
  const pauseIcon = document.getElementById("pauseIcon");
  const miniPlayIcon = document.getElementById("miniPlayIcon");
  const miniPauseIcon = document.getElementById("miniPauseIcon");
  
  if (isPlaying) {
    playIcon.style.display = "none"; pauseIcon.style.display = "block";
    miniPlayIcon.style.display = "none"; miniPauseIcon.style.display = "block";
  } else {
    playIcon.style.display = "block"; pauseIcon.style.display = "none";
    miniPlayIcon.style.display = "block"; miniPauseIcon.style.display = "none";
  }
}

document.getElementById("progress").addEventListener('input', (e) => {
  const seekTime = (e.target.value / 100) * audio.duration;
  audio.currentTime = seekTime;
  updateProgressFill();
});

function updateProgressFill() {
  const progress = document.getElementById("progress");
  progress.style.background = `linear-gradient(to left, var(--accent-main) ${progress.value}%, var(--accent-muted) ${progress.value}%)`;
}

// --- Favorites ---
document.getElementById("favBtn").onclick = () => {
  if(!currentTrackUrl) return showToast("اختر سورة أولاً");
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  let existsIndex = favs.findIndex(f => f.url === currentTrackUrl);
  if(existsIndex === -1) {
    favs.push({ reciter: document.getElementById("nowReciter").innerText, surah: document.getElementById("nowSurah").innerText, url: currentTrackUrl });
    localStorage.setItem("favorites", JSON.stringify(favs));
    showToast("تمت الإضافة للمفضلة");
  } else {
    favs.splice(existsIndex, 1);
    localStorage.setItem("favorites", JSON.stringify(favs));
    showToast("تمت الإزالة من المفضلة");
  }
  checkFavStatus();
  if(document.getElementById('selectionModal').classList.contains('active')) openFavModal();
}

function checkFavStatus() {
   let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
   let exists = favs.find(f => f.url === currentTrackUrl);
   const favBtn = document.getElementById("favBtn");
   if(exists) favBtn.classList.add("active");
   else favBtn.classList.remove("active");
}

function openFavModal() {
  document.getElementById('selectionModalTitle').innerText = "مقاطعي المفضلة";
  const list = document.getElementById('selectionList');
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  list.innerHTML = '';
  
  if (favs.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5; color: var(--text-primary);">لا توجد مقاطع في المفضلة بعد</div>';
  } else {
    favs.forEach((fav, index) => {
      let div = document.createElement('div');
      div.className = 'fav-item-container';
      div.innerHTML = `
        <div class="fav-info" onclick="playFromFav('${fav.url}', '${fav.surah}', '${fav.reciter}')">
          <div class="fav-surah">${fav.surah}</div>
          <div class="fav-reciter">${fav.reciter}</div>
        </div>
        <button class="delete-fav-btn" onclick="removeFav(${index}, event)" title="حذف">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      `;
      list.appendChild(div);
    });
  }
  document.getElementById('selectionModal').classList.add('active');
}

function playFromFav(url, surah, reciter) {
  if(currentTrackUrl !== url) {
    audio.src = url; currentTrackUrl = url;
    document.getElementById("nowSurah").innerText = surah; 
    document.getElementById("nowReciter").innerText = reciter;
    document.getElementById("miniSurah").innerText = surah; 
    document.getElementById("miniReciter").innerText = reciter;
    
    document.getElementById("progress").value = 0; updateProgressFill();
    document.getElementById("currentTime").innerText = "00:00"; 
    document.getElementById("durationTime").innerText = "00:00";
    checkFavStatus(); updateMediaSession(surah, reciter);
  }
  audio.play().catch(()=>{}); closeSelectionModal();
}

function removeFav(index, event) {
  event.stopPropagation(); 
  let favs = JSON.parse(localStorage.getItem("favorites") || "[]");
  favs.splice(index, 1);
  localStorage.setItem("favorites", JSON.stringify(favs));
  openFavModal(); checkFavStatus(); showToast("تم الحذف بنجاح");
}

// --- App Launch ---
window.addEventListener("load", () => {
  let savedTheme = localStorage.getItem("themeMode");
  if(savedTheme !== 'light' && savedTheme !== 'dark') savedTheme = 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);

  // تشغيل دالة الجلب الذكية المتوازية
  loadMultipleJSONs();
});
</script>
