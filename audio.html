<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>الاستماع للقرآن</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{

--primary:#10b981;
--bg:#020617;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.1);
--text:#f8fafc;
--muted:#94a3b8;
--card-bg:rgba(30,41,59,0.7);

}

body.light{

--bg:#f1f5f9;
--text:#0f172a;
--card-bg:#ffffff;
--glass:rgba(0,0,0,0.04);
--border:rgba(0,0,0,0.08);

}

body.sepia{

--bg:#f4ecd8;
--text:#3b2f1e;
--card-bg:#fffaf0;
--glass:rgba(0,0,0,0.05);
--border:rgba(0,0,0,0.08);

}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

margin:0;
font-family:'Tajawal',sans-serif;

background:radial-gradient(circle at 50% 0%, #1e293b, var(--bg));

color:var(--text);

display:flex;

justify-content:center;

padding:20px 20px 100px;

min-height:100dvh;

}

.app{

width:100%;
max-width:480px;

display:flex;
flex-direction:column;
gap:16px;

}

.header{

display:flex;
align-items:center;
justify-content:space-between;

background:var(--glass);
border:1px solid var(--border);

backdrop-filter:blur(12px);

border-radius:16px;
padding:14px 16px;

}

.header-title{

font-weight:bold;
font-size:18px;

}

.icon-btn{

background:none;
border:none;

color:white;

cursor:pointer;

}

.card{

background:var(--card-bg);

border:1px solid var(--border);

backdrop-filter:blur(12px);

border-radius:20px;

padding:20px;

display:flex;

flex-direction:column;

gap:12px;

}

label{

font-size:14px;

color:var(--primary);

}

select{

padding:14px;

border-radius:12px;

background:rgba(0,0,0,0.2);

color:white;

border:none;

}

.now{

text-align:center;

padding:30px 20px;

}

.nowSurah{

font-family:'Amiri',serif;

font-size:26px;

}

.nowReciter{

font-size:15px;

color:var(--muted);

}

.controls{

display:flex;

justify-content:center;

align-items:center;

gap:12px;

margin-top:10px;

}

.play-pause-btn{

width:60px;

height:60px;

border-radius:50%;

background:var(--primary);

border:none;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

}

.play-pause-btn svg{

width:26px;
height:26px;

fill:currentColor;

}

.action-btn{

background:rgba(255,255,255,0.05);

border:1px solid var(--border);

width:44px;
height:44px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

.mini{

position:fixed;

bottom:0;
left:0;
right:0;

background:rgba(15,23,42,0.95);

border-top:1px solid var(--border);

padding:12px 20px;

display:flex;

align-items:center;
justify-content:space-between;

transform:translateY(100%);

transition:0.3s;

}

.mini.show{
transform:translateY(0);
}

.toast{

position:fixed;

top:20px;
left:50%;

transform:translate(-50%,-100px);

background:rgba(16,185,129,0.9);

color:white;

padding:12px 24px;

border-radius:30px;

transition:0.3s;

}

.toast.show{

transform:translate(-50%,0);

}

</style>

</head>

<body>

<div class="toast" id="toast">تم الإجراء</div>

<div class="app">

<div class="header">

<button class="icon-btn" onclick="location.href='index.html'">🏠</button>

<div class="header-title">الاستماع للقرآن</div>

<button class="icon-btn" onclick="openFavModal()">❤</button>

</div>

<div class="card">

<label>اختر القارئ</label>

<select id="reciterSelect"></select>

</div>

<div class="card">

<label>اختر السورة / الجزء</label>

<select id="juzSelect"></select>

</div>

<div class="card now">

<div class="nowSurah" id="nowSurah">جاري التحميل...</div>

<div class="nowReciter" id="nowReciter">—</div>

<div class="controls">

<button class="action-btn" id="shuffleBtn">🔀</button>

<button class="action-btn" id="favBtn">❤</button>

<button class="play-pause-btn" id="mainPlayBtn">

<svg id="playIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"></polygon></svg>

<svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>

</button>

<button class="action-btn" id="downloadBtn">⬇</button>

<button class="action-btn" id="repeatBtn">🔁</button>

</div>

</div>

<audio id="audio" preload="metadata" playsinline></audio>

</div>

<div id="miniPlayer" class="mini">

<div>

<div id="miniSurah"></div>

<div id="miniReciter"></div>

</div>

<button onclick="togglePlay()">▶</button>

</div>

<script>

/* THEME */

const savedTheme=localStorage.getItem("themeMode");

if(savedTheme==="light")document.body.classList.add("light");

if(savedTheme==="sepia")document.body.classList.add("sepia");

/* AUDIO FIX */

const audioElement=document.getElementById("audio");

if(!window.globalAudio){

window.globalAudio=audioElement;

}

const audio=window.globalAudio;

/* VARIABLES */

let data;

const reciterSelect=document.getElementById("reciterSelect");

const juzSelect=document.getElementById("juzSelect");

const playIcon=document.getElementById("playIcon");

const pauseIcon=document.getElementById("pauseIcon");

const mini=document.getElementById("miniPlayer");

const nowSurah=document.getElementById("nowSurah");

const nowReciter=document.getElementById("nowReciter");

const miniSurah=document.getElementById("miniSurah");

const miniReciter=document.getElementById("miniReciter");

let currentTrackUrl="";

/* LOAD JSON */

async function loadJSON(){

let res=await fetch("assets/audio.json");

data=await res.json();

data.reciters.forEach((r,i)=>{

let opt=document.createElement("option");

opt.value=i;

opt.textContent=r.name;

reciterSelect.appendChild(opt);

});

loadTracks();

}

/* LOAD TRACKS */

function loadTracks(){

juzSelect.innerHTML="";

let reciter=data.reciters[reciterSelect.value];

reciter.items.forEach(j=>{

let opt=document.createElement("option");

opt.value=j.url;

opt.textContent=j.name;

juzSelect.appendChild(opt);

});

prepareTrack();

}

/* PREPARE TRACK */

function prepareTrack(){

let url=juzSelect.value;

let name=juzSelect.options[juzSelect.selectedIndex].text;

let reciter=data.reciters[reciterSelect.value].name;

audio.src=url;

currentTrackUrl=url;

nowSurah.innerText=name;

nowReciter.innerText=reciter;

miniSurah.innerText=name;

miniReciter.innerText=reciter;

localStorage.setItem("lastTrack",url);

localStorage.setItem("lastSurah",name);

localStorage.setItem("lastReciter",reciter);

}

/* PLAY */

function togglePlay(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

/* MEDIA SESSION */

function updateMediaSession(title,reciter){

if(!("mediaSession"in navigator))return;

navigator.mediaSession.metadata=new MediaMetadata({

title:title,
artist:reciter,
album:"Zad Al-Muslim",

artwork:[
{src:"icon/icon-192.png",sizes:"192x192",type:"image/png"},
{src:"icon/icon-512.png",sizes:"512x512",type:"image/png"}
]

});

navigator.mediaSession.setActionHandler("play",()=>audio.play());

navigator.mediaSession.setActionHandler("pause",()=>audio.pause());

}

/* AUDIO EVENTS */

audio.addEventListener("play",()=>{

playIcon.style.display="none";

pauseIcon.style.display="block";

mini.classList.add("show");

updateMediaSession(nowSurah.innerText,nowReciter.innerText);

});

audio.addEventListener("pause",()=>{

playIcon.style.display="block";

pauseIcon.style.display="none";

});

audio.addEventListener("error",()=>{

nowSurah.innerText="إعادة الاتصال...";

setTimeout(()=>{

audio.src=currentTrackUrl;

audio.play().catch(()=>{});

},3000);

});

/* AUTO RESUME */

window.addEventListener("load",()=>{

const lastTrack=localStorage.getItem("lastTrack");

if(lastTrack){

audio.src=lastTrack;

currentTrackUrl=lastTrack;

nowSurah.innerText=localStorage.getItem("lastSurah")||"آخر تشغيل";

nowReciter.innerText=localStorage.getItem("lastReciter")||"";

miniSurah.innerText=nowSurah.innerText;

miniReciter.innerText=nowReciter.innerText;

}

});

/* EVENTS */

reciterSelect.onchange=loadTracks;

juzSelect.onchange=prepareTrack;

document.getElementById("mainPlayBtn").onclick=togglePlay;

/* TOAST */

function showToast(msg){

let t=document.getElementById("toast");

t.innerText=msg;

t.classList.add("show");

setTimeout(()=>t.classList.remove("show"),2500);

}

loadJSON();

</script>

</body>
</html>
