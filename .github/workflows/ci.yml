name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (vite)
        run: npx vite build

      - name: Verify service-worker precache references resolve
        run: node scripts/verify-precache.cjs

      - name: Verify all local HTML references resolve
        run: node scripts/audit-refs.cjs
