name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (errors block, warnings advisory)
        run: npx eslint .

      - name: Build (vite)
        run: npx vite build

      - name: Verify service-worker precache references resolve
        run: node scripts/verify-precache.cjs

      - name: Verify all local HTML references resolve
        run: node scripts/audit-refs.cjs

      - name: Verify i18n locale key parity
        run: node scripts/check-i18n.cjs

      - name: Verify tasmee .js twins match their .ts sources
        run: |
          node scripts/transpile-tasmee.cjs
          git diff --exit-code js/tasmee-engine.js js/tasmee-matcher.js js/tasmee-store.js
