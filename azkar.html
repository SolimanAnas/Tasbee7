<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Azkar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#10b981;
  --bg:#0b132b;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.15);
  --text:#f8fafc;
  --zikr-size:28px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Top Bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
  font-size:22px;
  flex-shrink:0;
}

.icon-btn{
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}

/* Main Layout – now items start from top */
.page-wrapper{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;  /* was center, now top-aligned */
  gap:12px;                    /* reduced gap */
  padding:5px 20px 20px;       /* small top padding, more at bottom */
  overflow-y:auto;              /* allow scrolling if content overflows */
}

/* Glass Zikr Container – slightly smaller height to fit buttons */
.zikr-container{
  width:100%;
  max-width:700px;
  height:280px;                 /* reduced from 320px */
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:24px;
  padding:25px 20px;
  overflow-y:auto;
  text-align:center;
  cursor:pointer;
  user-select:none;
  transition:.3s ease;
  margin-top:0;                 /* sits right below top bar */
}

.zikr-container.fade-out{
  opacity:0;
  transform:translateY(10px);
}

.zikr-container.fade-in{
  opacity:1;
  transform:translateY(0);
}

.zikr-text{
  font-family:'Amiri',serif;
  font-size:var(--zikr-size);
  line-height:2.3;
  white-space:pre-line;
}

/* Scrollbar */
.zikr-container::-webkit-scrollbar{
  width:6px;
}
.zikr-container::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:10px;
}

/* ===== Circle styles (from masbaha, slightly smaller) ===== */
.counter-anchor {
  position: relative;
  width: min(60vw, 260px);     /* a bit smaller */
  height: min(60vw, 260px);
  margin: 0 auto;
}

.progress-wrapper {
  width: 100%;
  height: 100%;
  cursor: pointer;
  transition: transform 0.1s;
  border-radius: 50%;
  box-shadow: 0 0 60px -20px rgba(16,185,129,0.4);
  position: relative;
  z-index: 1;
}

.progress-wrapper:active {
  transform: scale(0.97);
}

svg {
  transform: rotate(-90deg);
  width: 100%;
  height: 100%;
}

circle {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s ease;
}

.bg-circle {
  stroke: rgba(255,255,255,0.05);
}

.fg-circle {
  stroke: url(#gradient);
  filter: drop-shadow(0 0 4px var(--primary));
}

.counter-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.count-label {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 5px;
}

.count-number {
  font-size: clamp(36px, 10vw, 54px);
  font-weight: 700;
  line-height: 1;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Glow animation */
.progress-wrapper.glow {
  animation: glowPulse 0.6s ease;
}

@keyframes glowPulse {
  0% { filter: drop-shadow(0 0 0px #10b981); }
  50% { filter: drop-shadow(0 0 25px #10b981); }
  100% { filter: drop-shadow(0 0 0px #10b981); }
}
/* ======================================================== */

/* Buttons – now always visible */
.controls{
  display:flex;
  gap:12px;
  margin-top:5px;
  width:100%;
  justify-content:center;
  flex-wrap:wrap;               /* in case of very narrow screen */
}

.btn{
  padding:12px 20px;
  border-radius:16px;
  border:none;
  background:#1e293b;
  color:white;
  cursor:pointer;
  font-size:16px;
  -webkit-tap-highlight-color: transparent;
  flex:0 1 auto;
}

.btn.primary{
  background:var(--primary);
  color:#001e1b;
  font-weight:bold;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:1000;
}

.modal.active{
  opacity:1;
  pointer-events:all;
}

.modal-content{
  width:90%;
  max-width:600px;
  background:rgba(30,41,59,0.95);
  border-radius:24px;
  padding:30px;
  transform:translateY(30px);
  transition:.3s ease;
}

.modal.active .modal-content{
  transform:translateY(0);
}

#englishText {
  text-align: left;
  direction: ltr;
  font-family: 'Tajawal', sans-serif;
  line-height: 1.8;
}

.close{
  text-align:left;
  cursor:pointer;
  font-size:20px;
  margin-bottom:15px;
  -webkit-tap-highlight-color: transparent;
}

.settings-row {
  margin-bottom: 20px;
}
.settings-row h3 {
  color: var(--primary);
  margin: 0 0 10px 0;
}
.theme-buttons {
  display: flex;
  gap: 15px;
}
</style>
</head>

<body>

<!-- Top Bar with Home, Translation, and Settings -->
<div class="top-bar">
  <div class="icon-btn" onclick="goHome()">🏠</div>
  <div style="display: flex; gap: 15px;">
    <div class="icon-btn" onclick="openTranslation()">🌐</div>
    <div class="icon-btn" onclick="openSettings()">⚙️</div>
  </div>
</div>

<div class="page-wrapper">

  <!-- Zikr Text Container (now closer to top) -->
  <div class="zikr-container fade-in" onclick="increment()">
    <div class="zikr-text" id="arabicText"></div>
  </div>

  <!-- Progress Circle (slightly smaller) -->
  <div class="counter-anchor">
    <div class="progress-wrapper" onclick="increment()">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="gradient">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#059669"/>
          </linearGradient>
        </defs>
        <circle class="bg-circle" cx="100" cy="100" r="90"/>
        <circle class="fg-circle" id="progressCircle" cx="100" cy="100" r="90"/>
      </svg>
      <div class="counter-content">
        <span class="count-label">Remaining</span>
        <span class="count-number" id="counter">0</span>
      </div>
    </div>
  </div>

  <!-- Control Buttons (now guaranteed visible) -->
  <div class="controls">
    <button class="btn" onclick="prev()">Previous</button>
    <button class="btn primary" onclick="toggleAuto()">Auto</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<!-- Translation Modal -->
<div class="modal" id="translationModal" onclick="if(event.target===this) closeTranslation()">
  <div class="modal-content">
    <div class="close" onclick="closeTranslation()">✕</div>
    <div id="englishText"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal" onclick="if(event.target===this) closeSettings()">
  <div class="modal-content">
    <div class="close" onclick="closeSettings()">✕</div>
    
    <div class="settings-row">
      <h3>Font Size</h3>
      <input type="range" min="22" max="40" value="28" id="fontSizeSlider"
             oninput="changeFontSize(this.value)">
    </div>

    <div class="settings-row">
      <h3>Theme</h3>
      <div class="theme-buttons">
        <button class="btn" onclick="setTheme('dark')">Dark</button>
        <button class="btn" onclick="setTheme('light')">Light</button>
      </div>
    </div>
  </div>
</div>

<script>
let azkarData;
let currentIndex = 0;
let currentCount = 0;
let autoMode = false;
let touchStartX = 0;
let touchEndX = 0;
const fullCircle = 565.48;

const type = new URLSearchParams(window.location.search).get("type") || "morning";

fetch("azkar.json")
.then(res => res.json())
.then(data => {
  azkarData = data[type];
  loadZikr();
});

/* Swipe */
const swipeArea = document.querySelector(".zikr-container");
swipeArea.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
});
swipeArea.addEventListener("touchend", e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
});

function handleSwipe() {
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) < 50) return;
  diff > 0 ? next() : prev();
}

/* Load Zikr with fade */
function loadZikr() {
  const container = document.querySelector(".zikr-container");
  container.classList.remove("fade-in");
  container.classList.add("fade-out");

  setTimeout(() => {
    currentCount = 0;
    document.getElementById("arabicText").innerText = azkarData[currentIndex].arabic;
    document.getElementById("englishText").innerText = azkarData[currentIndex].english;
    updateProgress();
    container.classList.remove("fade-out");
    container.classList.add("fade-in");
  }, 200);
}

function updateProgress() {
  const target = azkarData[currentIndex].count;
  const remaining = target - currentCount;
  document.getElementById("counter").innerText = remaining;
  const percent = currentCount / target;
  const offset = fullCircle - (fullCircle * percent);
  document.getElementById("progressCircle").style.strokeDashoffset = offset;
}

function increment() {
  const target = azkarData[currentIndex].count;
  if (currentCount < target) {
    currentCount++;
    updateProgress();
    if (currentCount === target) {
      if (navigator.vibrate) {
        navigator.vibrate([30, 40, 60]);
      }
      triggerGlow();
      setTimeout(next, 600);
    }
  }
}

function triggerGlow() {
  const wrapper = document.querySelector(".progress-wrapper");
  wrapper.classList.add("glow");
  setTimeout(() => wrapper.classList.remove("glow"), 600);
}

function next() {
  if (currentIndex < azkarData.length - 1) {
    currentIndex++;
    loadZikr();
  }
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    loadZikr();
  }
}

function toggleAuto() {
  autoMode = !autoMode;
  if (autoMode) autoLoop();
}

function autoLoop() {
  if (!autoMode) return;
  increment();
  setTimeout(autoLoop, 800);
}

/* Translation Modal */
function openTranslation() {
  document.getElementById("translationModal").classList.add("active");
}

function closeTranslation() {
  document.getElementById("translationModal").classList.remove("active");
}

/* Settings Modal */
function openSettings() {
  document.getElementById("settingsModal").classList.add("active");
  // Load saved font size into slider
  const savedSize = localStorage.getItem("zikrFontSize") || 28;
  document.getElementById("fontSizeSlider").value = savedSize;
}

function closeSettings() {
  document.getElementById("settingsModal").classList.remove("active");
}

function changeFontSize(size) {
  document.documentElement.style.setProperty('--zikr-size', size + 'px');
  localStorage.setItem("zikrFontSize", size);
}

function setTheme(mode) {
  if (mode === 'light') {
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }
  localStorage.setItem("themeMode", mode);
}

/* Home */
function goHome() {
  window.location.href = "index.html";
}

/* Load saved preferences */
window.addEventListener("load", () => {
  const savedSize = localStorage.getItem("zikrFontSize");
  if (savedSize) {
    document.documentElement.style.setProperty('--zikr-size', savedSize + 'px');
    document.getElementById("fontSizeSlider").value = savedSize;
  }

  const savedTheme = localStorage.getItem("themeMode");
  if (savedTheme === 'light') {
    document.body.classList.add("light");
  }
});
</script>

</body>
</html>
