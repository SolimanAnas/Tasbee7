<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Azkar</title>

<style>
:root{
  --primary:#10b981;
  --bg:#0b132b;
  --card:#111c44;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Top Bar */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.home-btn{
  font-size:22px;
  cursor:pointer;
}

/* Title */
.section-title{
  text-align:center;
  font-size:14px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:15px;
}

/* Arabic */
.arabic{
  font-size:22px;
  line-height:2;
  text-align:center;
  margin-bottom:20px;
}

/* Counter Circle */
.circle-wrapper{
  display:flex;
  justify-content:center;
  margin:25px 0;
}

.circle{
  width:180px;
  height:180px;
  border-radius:50%;
  border:6px solid var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.circle:active{
  transform:scale(.95);
}

/* Buttons */
.controls{
  display:flex;
  justify-content:space-between;
  gap:15px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:16px;
  border-radius:16px;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

.btn.primary{
  background:var(--primary);
  color:#001e1b;
  font-weight:bold;
}

.translate-btn{
  margin-top:10px;
  background:#334155;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.modal-content{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  max-height:80vh;
  overflow:auto;
  color:#e2e8f0;
  line-height:1.7;
}

.close-modal{
  text-align:right;
  font-size:20px;
  cursor:pointer;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">
  <div class="home-btn" onclick="goHome()">🏠</div>
  <div id="modeTitle" class="section-title"></div>
</div>

<div class="arabic" id="arabicText"></div>

<div class="circle-wrapper">
  <div class="circle" onclick="increment()" id="counter">0</div>
</div>

<button class="btn translate-btn" onclick="openTranslation()">View Translation</button>

<div class="controls">
  <button class="btn" onclick="prev()">Previous</button>
  <button class="btn primary" onclick="toggleAuto()">Auto</button>
  <button class="btn" onclick="next()">Next</button>
</div>

<!-- Translation Modal -->
<div class="modal" id="translationModal">
  <div class="modal-content">
    <div class="close-modal" onclick="closeTranslation()">✕</div>
    <div id="englishText"></div>
  </div>
</div>

<script>
let azkarData;
let currentIndex = 0;
let currentCount = 0;
let autoMode = false;

const params = new URLSearchParams(window.location.search);
const type = params.get("type") || "morning";

fetch("azkar.json")
.then(res => res.json())
.then(data => {
  azkarData = data[type];
  document.getElementById("modeTitle").innerText = type.toUpperCase();
  loadZikr();
});

function loadZikr(){
  currentCount = 0;
  document.getElementById("counter").innerText = 0;
  document.getElementById("arabicText").innerText = azkarData[currentIndex].arabic;
  document.getElementById("englishText").innerText = azkarData[currentIndex].english;
}

function increment(){
  const target = azkarData[currentIndex].count;
  currentCount++;
  document.getElementById("counter").innerText = currentCount;

  if(currentCount >= target){
    setTimeout(()=> next(), 400);
  }
}

function next(){
  if(currentIndex < azkarData.length - 1){
    currentIndex++;
    loadZikr();
  }
}

function prev(){
  if(currentIndex > 0){
    currentIndex--;
    loadZikr();
  }
}

function toggleAuto(){
  autoMode = !autoMode;
  if(autoMode){
    autoLoop();
  }
}

function autoLoop(){
  if(!autoMode) return;
  increment();
  setTimeout(autoLoop, 800);
}

/* Translation */
function openTranslation(){
  document.getElementById("translationModal").style.display="flex";
}

function closeTranslation(){
  document.getElementById("translationModal").style.display="none";
}

/* Home */
function goHome(){
  window.location.href="index.html";
}
</script>

</body>
</html>
