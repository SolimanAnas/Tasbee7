<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Azkar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#10b981;
  --bg:#0b132b;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.15);
  --text:#f8fafc;
  --zikr-size:28px;
}

body{
  margin:0;
  font-family:'Tajawal',sans-serif;
  background:radial-gradient(circle at 50% 0%, #1e293b, var(--bg));
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Top Bar */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:22px;
}

.icon-btn{
  cursor:pointer;
  user-select:none;
}

/* Main centered layout */
.page-wrapper{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
  padding:20px;
}

/* Glass Zikr Container */
.zikr-container{
  width:100%;
  max-width:700px;
  height:260px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:24px;
  padding:30px;
  overflow-y:auto;
  text-align:center;
  cursor:pointer;
  user-select:none;
}

.zikr-text{
  font-family:'Amiri',serif;
  font-size:var(--zikr-size);
  line-height:2.3;
  white-space:pre-line;
}

/* Scrollbar subtle */
.zikr-container::-webkit-scrollbar{
  width:6px;
}
.zikr-container::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:10px;
}

/* Progress Circle */
.progress-wrapper{
  position:relative;
  width:200px;
  height:200px;
  cursor:pointer;
}

svg{
  transform:rotate(-90deg);
  width:100%;
  height:100%;
}

.bg-circle{
  fill:none;
  stroke:rgba(255,255,255,0.1);
  stroke-width:8;
}

.fg-circle{
  fill:none;
  stroke:url(#gradient);
  stroke-width:8;
  stroke-linecap:round;
  stroke-dasharray:565.48;
  stroke-dashoffset:565.48;
  transition:.3s ease;
}

.counter-content{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.count-number{
  font-size:50px;
  font-weight:bold;
}

/* Buttons */
.controls{
  display:flex;
  gap:15px;
}

.btn{
  padding:14px 22px;
  border-radius:16px;
  border:none;
  background:#1e293b;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.btn.primary{
  background:var(--primary);
  color:#001e1b;
  font-weight:bold;
}

.large-btn{
  padding:16px 40px;
  border-radius:20px;
  border:none;
  background:#334155;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* Premium Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
}

.modal.active{
  opacity:1;
  pointer-events:all;
}

.modal-content{
  width:90%;
  max-width:600px;
  background:rgba(30,41,59,0.95);
  border-radius:24px;
  padding:30px;
  transform:translateY(30px);
  transition:.3s ease;
}

.modal.active .modal-content{
  transform:translateY(0);
}

.close{
  text-align:left;
  cursor:pointer;
  font-size:20px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="icon-btn" onclick="goHome()">🏠</div>
  <div class="icon-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="page-wrapper">

  <!-- Glass Zikr -->
  <div class="zikr-container" onclick="increment()">
    <div class="zikr-text" id="arabicText"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrapper" onclick="increment()">
    <svg viewBox="0 0 200 200">
      <defs>
        <linearGradient id="gradient">
          <stop offset="0%" stop-color="#34d399"/>
          <stop offset="100%" stop-color="#059669"/>
        </linearGradient>
      </defs>
      <circle class="bg-circle" cx="100" cy="100" r="90"/>
      <circle class="fg-circle" id="progressCircle" cx="100" cy="100" r="90"/>
    </svg>
    <div class="counter-content">
      <div>Remaining</div>
      <div class="count-number" id="counter">0</div>
    </div>
  </div>

  <button class="large-btn" onclick="openTranslation()">View Translation</button>

  <div class="controls">
    <button class="btn" onclick="prev()">Previous</button>
    <button class="btn primary" onclick="toggleAuto()">Auto</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<!-- Translation Modal -->
<div class="modal" id="translationModal">
  <div class="modal-content">
    <div class="close" onclick="closeTranslation()">✕</div>
    <div id="englishText"></div>
  </div>
</div>

<script>
let azkarData;
let currentIndex = 0;
let currentCount = 0;
let autoMode = false;
const fullCircle = 565.48;

const type = new URLSearchParams(window.location.search).get("type") || "morning";

fetch("azkar.json")
.then(res=>res.json())
.then(data=>{
  azkarData = data[type];
  loadZikr();
});

function loadZikr(){
  currentCount=0;
  document.getElementById("arabicText").innerText=azkarData[currentIndex].arabic;
  document.getElementById("englishText").innerText=azkarData[currentIndex].english;
  updateProgress();
}

function updateProgress(){
  const target=azkarData[currentIndex].count;
  const remaining=target-currentCount;
  document.getElementById("counter").innerText=remaining;
  const percent=currentCount/target;
  const offset=fullCircle-(fullCircle*percent);
  document.getElementById("progressCircle").style.strokeDashoffset=offset;
}

function increment(){
  const target=azkarData[currentIndex].count;
  if(currentCount<target){
    currentCount++;
    updateProgress();
    if(currentCount>=target){
      setTimeout(next,400);
    }
  }
}

function next(){
  if(currentIndex<azkarData.length-1){
    currentIndex++;
    loadZikr();
  }
}

function prev(){
  if(currentIndex>0){
    currentIndex--;
    loadZikr();
  }
}

function toggleAuto(){
  autoMode=!autoMode;
  if(autoMode) autoLoop();
}

function autoLoop(){
  if(!autoMode) return;
  increment();
  setTimeout(autoLoop,800);
}

function openTranslation(){
  document.getElementById("translationModal").classList.add("active");
}

function closeTranslation(){
  document.getElementById("translationModal").classList.remove("active");
}

function goHome(){
  window.location.href="index.html";
}
</script>

</body>
</html>
