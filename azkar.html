<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Azkar</title>

<!-- External stylesheet with all styles (including progress ring) -->
<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- Top bar with home and settings -->
<div class="top-bar">
  <div class="icon-btn" onclick="goHome()">🏠</div>
  <div class="icon-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="page-center">

  <div class="arabic" id="arabicText"></div>

  <!-- SVG Circular Progress Ring -->
  <div class="progress-wrapper" onclick="increment()">
    <svg class="progress-ring" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#34d399" />
          <stop offset="100%" stop-color="#059669" />
        </linearGradient>
      </defs>
      <!-- Background circle -->
      <circle class="bg-circle" cx="100" cy="100" r="90" />
      <!-- Foreground progress circle -->
      <circle class="fg-circle" id="progressCircle" cx="100" cy="100" r="90"
              stroke-dasharray="565.48" stroke-dashoffset="565.48" />
    </svg>
    <div class="counter-content">
      <span class="count-label" id="countLabel">Remaining</span>
      <span class="count-number" id="counter">0</span>
      <div class="target-pill">Goal: <span id="targetDisplay">0</span></div>
    </div>
  </div>

  <button class="large-btn" onclick="openTranslation()">
    View Translation
  </button>

  <div class="controls">
    <button class="btn" onclick="prev()">Previous</button>
    <button class="btn primary" onclick="toggleAuto()">Auto</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<!-- Translation Modal -->
<div class="modal" id="translationModal">
  <div class="modal-content">
    <div class="close-modal" onclick="closeTranslation()">✕</div>
    <div id="englishText"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <div class="close" onclick="closeSettings()">✕</div>

    <h3>Font Size</h3>
    <input type="range" min="22" max="40" value="28"
      oninput="changeFontSize(this.value)">

    <h3 style="margin-top:20px;">Theme</h3>
    <button class="btn" onclick="setTheme('dark')">Dark</button>
    <button class="btn" onclick="setTheme('light')">Light</button>
  </div>
</div>

<script>
let azkarData;
let currentIndex = 0;
let currentCount = 0;
let autoMode = false;
const fullCircle = 565.48; // 2 * π * 90 ≈ 565.48

const params = new URLSearchParams(window.location.search);
const type = params.get("type") || "morning";

fetch("azkar.json")
.then(res => res.json())
.then(data => {
  azkarData = data[type];
  loadZikr();
});

function loadZikr(){
  currentCount = 0;
  const target = azkarData[currentIndex].count;
  document.getElementById("counter").innerText = currentCount;
  document.getElementById("targetDisplay").innerText = target;
  document.getElementById("arabicText").innerText = azkarData[currentIndex].arabic;
  document.getElementById("englishText").innerText = azkarData[currentIndex].english;
  updateProgress();
}

function updateProgress() {
  const target = azkarData[currentIndex].count;
  const remaining = target - currentCount;
  document.getElementById("counter").innerText = currentCount;
  // Calculate percent completed (0 to 1)
  const percent = target ? currentCount / target : 0;
  const offset = fullCircle - (fullCircle * percent);
  document.getElementById("progressCircle").style.strokeDashoffset = offset;
  
  // Change color when target reached
  if (currentCount > 0 && currentCount % target === 0) {
    document.getElementById("progressCircle").style.stroke = "#f59e0b";
  } else {
    document.getElementById("progressCircle").style.stroke = "url(#gradient)";
  }
}

function increment(){
  const target = azkarData[currentIndex].count;
  if (currentCount < target) {
    currentCount++;
    updateProgress();

    // Auto-next on completion
    if (currentCount >= target) {
      setTimeout(() => next(), 400);
    }
  }
}

function next(){
  if (currentIndex < azkarData.length - 1) {
    currentIndex++;
    loadZikr();
  }
}

function prev(){
  if (currentIndex > 0) {
    currentIndex--;
    loadZikr();
  }
}

function toggleAuto(){
  autoMode = !autoMode;
  if(autoMode){
    autoLoop();
  }
}

function autoLoop(){
  if(!autoMode) return;
  increment();
  setTimeout(autoLoop, 800);
}

/* Translation */
function openTranslation(){
  document.getElementById("translationModal").style.display="flex";
}

function closeTranslation(){
  document.getElementById("translationModal").style.display="none";
}

/* Home */
function goHome(){
  window.location.href = "index.html";
}

/* Settings */
function openSettings(){
  document.getElementById("settingsModal").style.display = "flex";
}

function closeSettings(){
  document.getElementById("settingsModal").style.display = "none";
}

function changeFontSize(size){
  document.documentElement.style.setProperty('--zikr-size', size + 'px');
  localStorage.setItem("zikrFontSize", size);
}

function setTheme(mode){
  if(mode === 'light'){
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }
  localStorage.setItem("themeMode", mode);
}

window.addEventListener("load", () => {
  const savedSize = localStorage.getItem("zikrFontSize");
  if(savedSize){
    document.documentElement.style.setProperty('--zikr-size', savedSize + 'px');
  }

  const savedTheme = localStorage.getItem("themeMode");
  if(savedTheme === 'light'){
    document.body.classList.add("light");
  }
});
</script>

</body>
</html>
