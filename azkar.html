<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Azkar</title>

<!-- Replace internal styles with external stylesheet -->
<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- New top bar with home and settings -->
<div class="top-bar">
  <div class="icon-btn" onclick="goHome()">🏠</div>
  <div class="icon-btn" onclick="openSettings()">⚙️</div>
</div>

<div class="page-center">

  <div class="arabic" id="arabicText"></div>

  <div class="circle" onclick="increment()" id="counter">0</div>

  <button class="large-btn" onclick="openTranslation()">
    View Translation
  </button>

  <div class="controls">
    <button class="btn" onclick="prev()">Previous</button>
    <button class="btn primary" onclick="toggleAuto()">Auto</button>
    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<!-- Translation Modal (unchanged, but ensure it's present) -->
<div class="modal" id="translationModal">
  <div class="modal-content">
    <div class="close-modal" onclick="closeTranslation()">✕</div>
    <div id="englishText"></div>
  </div>
</div>

<!-- New Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-content">
    <div class="close" onclick="closeSettings()">✕</div>

    <h3>Font Size</h3>
    <input type="range" min="22" max="40" value="28"
      oninput="changeFontSize(this.value)">

    <h3 style="margin-top:20px;">Theme</h3>
    <button class="btn" onclick="setTheme('dark')">Dark</button>
    <button class="btn" onclick="setTheme('light')">Light</button>
  </div>
</div>

<script>
let azkarData;
let currentIndex = 0;
let currentCount = 0;
let autoMode = false;

const params = new URLSearchParams(window.location.search);
const type = params.get("type") || "morning";

fetch("azkar.json")
.then(res => res.json())
.then(data => {
  azkarData = data[type];
  // Optionally set a title if you have an element with id "modeTitle"
  // document.getElementById("modeTitle").innerText = type.toUpperCase();
  loadZikr();
});

function loadZikr(){
  currentCount = 0;
  document.getElementById("counter").innerText = 0;
  document.getElementById("arabicText").innerText = azkarData[currentIndex].arabic;
  document.getElementById("englishText").innerText = azkarData[currentIndex].english;
}

function increment(){
  const target = azkarData[currentIndex].count;
  currentCount++;
  document.getElementById("counter").innerText = currentCount;

  if(currentCount >= target){
    setTimeout(()=> next(), 400);
  }
}

function next(){
  if(currentIndex < azkarData.length - 1){
    currentIndex++;
    loadZikr();
  }
}

function prev(){
  if(currentIndex > 0){
    currentIndex--;
    loadZikr();
  }
}

function toggleAuto(){
  autoMode = !autoMode;
  if(autoMode){
    autoLoop();
  }
}

function autoLoop(){
  if(!autoMode) return;
  increment();
  setTimeout(autoLoop, 800);
}

/* Translation */
function openTranslation(){
  document.getElementById("translationModal").style.display="flex";
}

function closeTranslation(){
  document.getElementById("translationModal").style.display="none";
}

/* Home */
function goHome(){
  window.location.href="index.html";
}

/* --- Settings functions (added) --- */
function openSettings(){
  document.getElementById("settingsModal").style.display="flex";
}

function closeSettings(){
  document.getElementById("settingsModal").style.display="none";
}

function changeFontSize(size){
  document.documentElement.style.setProperty('--zikr-size', size + 'px');
  localStorage.setItem("zikrFontSize", size);
}

function setTheme(mode){
  if(mode === 'light'){
    document.body.classList.add("light");
  } else {
    document.body.classList.remove("light");
  }
  localStorage.setItem("themeMode", mode);
}

window.addEventListener("load", () => {
  const savedSize = localStorage.getItem("zikrFontSize");
  if(savedSize){
    document.documentElement.style.setProperty('--zikr-size', savedSize + 'px');
  }

  const savedTheme = localStorage.getItem("themeMode");
  if(savedTheme === 'light'){
    document.body.classList.add("light");
  }
});
</script>

</body>
</html>
